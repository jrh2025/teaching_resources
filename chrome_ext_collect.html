<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chrome 擴充功能管理庫</title>

    <!-- 引入字體 (Noto Sans TC 提供乾淨俐落的無襯線專業感) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">

    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    },
                    colors: {
                        // 定義一系列沉穩、專業的棕色系
                        brown: {
                            50: '#fdf8f5',
                            100: '#f6ebe4',
                            200: '#EBE5E0', // 主要背景 (暖石灰)
                            300: '#dfb79e',
                            400: '#C4A484', // 輔助亮色
                            500: '#A67B5B', // 核心強調色 (雅緻金棕)
                            600: '#8B5A2B',
                            700: '#634332',
                            800: '#4A3324', // 卡片邊框或次深色
                            900: '#362419', // 深色面板
                            950: '#351e0f', // 極深色背景
                        }
                    }
                }
            }
        }
    </script>

    <!-- 引入 React 核心與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- 引入 Babel 進行瀏覽器端 JSX 編譯 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- 預期引入外部扁平化資料庫 (若不存在則使用系統預設值) -->
    <script src="chrome_ext_data.js" onerror="console.log('尚未建立外部資料檔，將使用預設資料。')"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #EBE5E0;
            /* 呼應 brown-200 */
        }

        /* 針對深色面板的自訂捲軸樣式 (棕色調) */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #4A3324;
            /* brown-800 */
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #634332;
            /* brown-700 */
        }

        /* 文本選取顏色 */
        ::selection {
            background-color: #A67B5B;
            color: #ffffff;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- 系統核心邏輯 -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ---------------------------------------------------------
        // 模組化 SVG 圖示元件 (Lucide-based)
        // ---------------------------------------------------------
        const Puzzle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19.439 7.85c-.049.322.059.648.289.878l1.568 1.568c.47.47.706 1.087.706 1.704s-.235 1.233-.706 1.704l-1.611 1.611a.98.98 0 0 0-.258.902l.156 1.25a2.4 2.4 0 0 1-2.382 2.697h-1.25a.98.98 0 0 0-.902.258l-1.612 1.612c-.47.47-1.086.706-1.703.706s-1.233-.235-1.704-.706l-1.568-1.568a1.026 1.026 0 0 0-.877-.29l-1.25.156A2.4 2.4 0 0 1 3.593 17.94l.156-1.25a.98.98 0 0 0-.258-.902l-1.611-1.611c-.94-.94-.94-2.469 0-3.408l1.611-1.612a.98.98 0 0 0 .258-.902l-.156-1.25a2.4 2.4 0 0 1 2.382-2.697h1.25a.98.98 0 0 0 .902-.258l1.612-1.612c.94-.94 2.469-.94 3.408 0l1.568 1.568c.23.23.556.338.877.29l1.25-.156a2.4 2.4 0 0 1 2.697 2.382l-.156 1.25z"></path></svg>
        );
        const Edit3 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
        );
        const Save = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        );
        const Plus = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const Trash2 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );
        const Terminal = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        );
        const FileText = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        );
        const LinkIcon = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        );
        const Bookmark = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        );
        const X = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const Download = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        );
        const Menu = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        );
        const Copy = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        );

        // ---------------------------------------------------------
        // 資料模型 (Initial State for Extensions)
        // ---------------------------------------------------------
        const defaultInitialData = [
            {
                id: '1',
                name: 'DevTools 增強面板',
                description: '專為前端工程師設計的 Chrome 開發者工具擴充面板。提供快速檢視 DOM 結構深度、React 元件效能分析以及 CSS 變數即時調色盤等功能。',
                installation: '1. 打開 Chrome 並前往 chrome://extensions/\n2. 開啟右上角的「開發人員模式」\n3. 點擊「載入未封裝項目」\n4. 選擇本專案的 /build 資料夾',
                downloadUrl: 'https://github.com/yourusername/devtools-enhancer',
                notes: '目前僅支援 Chrome 100 以上版本。未來預計加入 Vue 框架的支援。'
            },
            {
                id: '2',
                name: '專注模式遮罩器',
                description: '在特定工作時段，自動將 YouTube、社群媒體等容易分心的網站套用灰階濾鏡，並隱藏側邊欄推薦影片，幫助使用者保持深度專注。',
                installation: '目前處於 Alpha 測試階段，請直接下載壓縮檔，解壓縮後透過開發人員模式載入。',
                downloadUrl: 'D:\\Projects\\ChromeExtensions\\FocusMasker\\v0.1-alpha.zip',
                notes: '需特別注意 Content Security Policy (CSP) 的設定，避免遮罩器腳本被某些嚴格的網站阻擋。'
            }
        ];

        // ---------------------------------------------------------
        // 應用程式主體 (Main App Component)
        // ---------------------------------------------------------
        function App() {
            // 解析網址參數以決定是否開啟編輯權限 (?edit=1)
            const urlParams = new URLSearchParams(window.location.search);
            const allowEdit = urlParams.get('edit') === '1';

            // 讀取外部資料或使用預設資料
            const loadInitialData = () => {
                if (typeof window !== 'undefined' && window.CHROME_EXTENSIONS_DATA && Array.isArray(window.CHROME_EXTENSIONS_DATA) && window.CHROME_EXTENSIONS_DATA.length > 0) {
                    return window.CHROME_EXTENSIONS_DATA;
                }
                return defaultInitialData;
            };

            const [extensions, setExtensions] = useState(loadInitialData);
            const [activeId, setActiveId] = useState(extensions.length > 0 ? extensions[0].id : null);
            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            // 系統提示訊息狀態
            const [toastMessage, setToastMessage] = useState('');

            const activeExt = extensions.find(g => g.id === activeId) || extensions[0];

            // 顯示自訂訊息
            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => {
                    setToastMessage('');
                }, 3000);
            };

            // 安全的複製到剪貼簿功能
            const handleCopyText = (text) => {
                if (!text) return;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        showToast('✓ 內容已複製到剪貼簿');
                    } else {
                        showToast('✕ 複製失敗，請手動選取複製');
                    }
                } catch (err) {
                    showToast('✕ 複製失敗，您的瀏覽器可能不支援此功能');
                }
                document.body.removeChild(textArea);
            };

            // 解析網址並轉換為超連結元件
            const renderTextWithLinks = (text) => {
                if (!text) return <span className="text-brown-500 italic">無相關資訊</span>;
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const parts = text.split(urlRegex);

                return parts.map((part, i) => {
                    if (part.match(urlRegex)) {
                        return (
                            <a
                                key={i}
                                href={part}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="text-brown-400 hover:text-white underline underline-offset-4 decoration-brown-600 hover:decoration-brown-400 transition-colors break-all"
                            >
                                {part}
                            </a>
                        );
                    }
                    return <span key={i}>{part}</span>;
                });
            };

            const handleEditClick = () => {
                if (!allowEdit) return;
                setEditForm({ ...activeExt });
                setIsEditing(true);
            };

            const handleCancelEdit = () => {
                setIsEditing(false);
                setEditForm(null);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setEditForm(prev => ({ ...prev, [name]: value }));
            };

            const handleSave = () => {
                setExtensions(prev => prev.map(g => g.id === editForm.id ? editForm : g));
                setIsEditing(false);
                showToast('✓ 變更已儲存');
            };

            const handleAddExtension = () => {
                if (!allowEdit) return;
                const newExt = {
                    id: Date.now().toString(),
                    name: '未命名擴充功能',
                    description: '',
                    installation: '',
                    downloadUrl: '',
                    notes: ''
                };
                setExtensions([...extensions, newExt]);
                setActiveId(newExt.id);
                setEditForm({ ...newExt });
                setIsEditing(true);
                setIsSidebarOpen(false);
            };

            const handleDelete = (id) => {
                if (extensions.length <= 1) {
                    showToast('⚠️ 必須至少保留一筆紀錄。');
                    return;
                }
                const newExts = extensions.filter(g => g.id !== id);
                setExtensions(newExts);
                if (activeId === id) {
                    setActiveId(newExts[0].id);
                }
                setIsEditing(false);
                showToast('🗑️ 紀錄已刪除');
            };

            const handleExportJS = () => {
                if (!allowEdit) return;
                const dataStr = `window.CHROME_EXTENSIONS_DATA = ${JSON.stringify(extensions, null, 4)};`;
                const blob = new Blob([dataStr], { type: "application/javascript", endings: "native" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "chrome_ext_data.js";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast('💾 資料檔已匯出下載');
            };

            if (!activeExt) return <div className="p-8 text-center text-brown-900 font-bold">系統初始化中...</div>;

            return (
                <div className="flex flex-col md:flex-row h-screen bg-brown-200 overflow-hidden relative font-sans">

                    {/* 全域提示訊息 (Toast) */}
                    {toastMessage && (
                        <div className="fixed bottom-6 right-6 z-50 bg-brown-800 text-white px-5 py-3 rounded-lg shadow-2xl border border-brown-700 font-bold flex items-center gap-2 animate-in slide-in-from-bottom-5 fade-in duration-300">
                            {toastMessage}
                        </div>
                    )}

                    {/* 行動版頂部導覽列 (深棕色面板) */}
                    <div className="md:hidden flex items-center justify-between p-4 bg-brown-950 border-b border-brown-800 shadow-lg z-30 flex-shrink-0">
                        <div className="flex flex-col">
                            <h1 className="text-lg font-black tracking-wide text-white flex items-center gap-2">
                                <Puzzle size={20} className="text-brown-500" />
                                擴充功能庫
                            </h1>
                        </div>
                        <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-brown-300 hover:text-white hover:bg-brown-800 rounded-md transition-colors">
                            <Menu size={24} />
                        </button>
                    </div>

                    {/* 行動版側邊欄背景遮罩 */}
                    {isSidebarOpen && (
                        <div
                            className="fixed inset-0 bg-black/60 z-40 md:hidden backdrop-blur-sm transition-opacity duration-300"
                            onClick={() => setIsSidebarOpen(false)}
                        />
                    )}

                    {/* 左側導覽列 (極深棕色面板設計，創造立體專業感) */}
                    <div className={`fixed inset-y-0 left-0 z-50 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-300 ease-in-out w-72 bg-brown-950 border-r border-brown-800 flex flex-col shadow-2xl flex-shrink-0 h-full`}>
                        <div className="p-6 md:p-8 border-b border-brown-900 flex justify-between items-start bg-brown-950">
                            <div>
                                <h1 className="text-xl font-black tracking-wide text-white flex items-center gap-2">
                                    <Puzzle size={24} className="text-brown-500" />
                                    Chrome Extension
                                </h1>
                                <p className="text-xs text-brown-400 tracking-widest mt-2 uppercase font-medium">個人擴充功能管理庫</p>
                            </div>
                            <button className="md:hidden p-1 text-brown-500 hover:text-white rounded-md transition-colors" onClick={() => setIsSidebarOpen(false)}>
                                <X size={20} />
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto py-5">
                            <ul className="space-y-2 px-4">
                                {extensions.map((ext) => (
                                    <li key={ext.id}>
                                        <button
                                            onClick={() => {
                                                setActiveId(ext.id);
                                                setIsEditing(false);
                                                setIsSidebarOpen(false);
                                            }}
                                            className={`w-full text-left px-4 py-3 rounded-lg transition-all flex items-center gap-3 ${activeId === ext.id
                                                ? 'bg-brown-800 text-white font-bold shadow-md border-l-4 border-brown-500'
                                                : 'text-brown-300 hover:bg-brown-900 hover:text-brown-100'
                                                }`}
                                        >
                                            <Puzzle size={18} className={activeId === ext.id ? "text-brown-500" : "text-brown-600"} flex-shrink-0 />
                                            <span className="truncate text-sm">{ext.name}</span>
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* 下方控制區塊 (僅在 edit=1 時顯示) */}
                        {allowEdit && (
                            <div className="p-5 border-t border-brown-900 space-y-3 bg-brown-950">
                                <button
                                    onClick={handleAddExtension}
                                    className="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-transparent border border-dashed border-brown-700 rounded-lg text-brown-400 hover:bg-brown-900 hover:text-white hover:border-brown-500 transition-colors"
                                >
                                    <Plus size={18} />
                                    <span className="font-medium text-sm">登錄新項目</span>
                                </button>

                                <button
                                    onClick={handleExportJS}
                                    className="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-brown-500 rounded-lg text-white hover:bg-brown-400 shadow-lg transition-all text-sm font-black"
                                    title="下載並覆蓋原有的 chrome_ext_data.js"
                                >
                                    <Download size={16} />
                                    <span>儲存至外部檔案</span>
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 右側主要內容區 (以 brown-200 / 暖石灰為底色) */}
                    <div className="flex-1 overflow-y-auto bg-brown-200">
                        <div className="max-w-4xl mx-auto p-5 md:p-10">

                            {!isEditing ? (
                                /* 檢視模式 */
                                <div className="transition-opacity duration-500 animate-in fade-in slide-in-from-bottom-4">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                                        <div>
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className="p-2.5 bg-brown-950 border border-brown-800 text-brown-500 rounded-xl shadow-lg">
                                                    <Puzzle size={28} />
                                                </div>
                                                {/* 主標題採用極深棕色以對比背景 */}
                                                <h2 className="text-3xl md:text-4xl font-black text-brown-950 tracking-tight">{activeExt.name}</h2>
                                            </div>
                                            <p className="text-brown-700 text-sm tracking-widest uppercase ml-16 font-bold">
                                                Chrome Extension Details
                                            </p>
                                        </div>
                                        {/* 編輯內容按鈕 */}
                                        {allowEdit && (
                                            <button
                                                onClick={handleEditClick}
                                                className="w-full sm:w-auto justify-center flex items-center gap-2 px-6 py-2.5 bg-brown-900 border border-brown-800 rounded-full text-brown-200 hover:bg-brown-800 hover:text-white shadow-xl transition-all text-sm font-bold"
                                            >
                                                <Edit3 size={16} />
                                                編輯內容
                                            </button>
                                        )}
                                    </div>

                                    {/* 內容區塊 (深棕色卡片面板，提供極高的對比與專業感) */}
                                    <div className="grid grid-cols-1 gap-6">

                                        {/* 區塊 1: 功能說明 */}
                                        <div className="bg-brown-950 p-6 md:p-8 rounded-2xl shadow-xl border border-brown-800">
                                            <div className="flex justify-between items-center mb-5 border-b border-brown-800 pb-3">
                                                <h3 className="text-sm font-black text-brown-500 tracking-widest uppercase flex items-center gap-2">
                                                    <FileText size={18} /> 功能說明
                                                </h3>
                                                <button
                                                    onClick={() => handleCopyText(activeExt.description)}
                                                    className="flex items-center gap-1 text-xs text-brown-400 hover:text-brown-200 transition-colors bg-brown-900 hover:bg-brown-800 px-3 py-1.5 rounded-md border border-brown-800"
                                                    title="複製說明內容"
                                                >
                                                    <Copy size={14} /> 複製
                                                </button>
                                            </div>
                                            <p className="text-brown-100 leading-relaxed whitespace-pre-line text-[15px]">
                                                {activeExt.description || <span className="text-brown-600 italic">尚未填寫說明</span>}
                                            </p>
                                        </div>

                                        {/* 區塊 2: 安裝方式 */}
                                        <div className="bg-brown-950 p-6 md:p-8 rounded-2xl shadow-xl border border-brown-800">
                                            <div className="flex justify-between items-center mb-5 border-b border-brown-800 pb-3">
                                                <h3 className="text-sm font-black text-brown-500 tracking-widest uppercase flex items-center gap-2">
                                                    <Terminal size={18} /> 安裝方式
                                                </h3>
                                                <button
                                                    onClick={() => handleCopyText(activeExt.installation)}
                                                    className="flex items-center gap-1 text-xs text-brown-400 hover:text-brown-200 transition-colors bg-brown-900 hover:bg-brown-800 px-3 py-1.5 rounded-md border border-brown-800"
                                                    title="複製安裝方式"
                                                >
                                                    <Copy size={14} /> 複製
                                                </button>
                                            </div>
                                            <div className="bg-brown-900 p-5 rounded-xl border border-brown-800 shadow-inner">
                                                <p className="text-brown-100 leading-relaxed whitespace-pre-line font-mono text-sm">
                                                    {activeExt.installation || <span className="text-brown-600 italic">尚未填寫安裝方式</span>}
                                                </p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {/* 區塊 3: 下載位置 */}
                                            <div className="bg-brown-950 p-6 md:p-8 rounded-2xl shadow-xl border border-brown-800">
                                                <h3 className="text-sm font-black text-brown-500 tracking-widest uppercase mb-5 flex items-center gap-2 border-b border-brown-800 pb-3">
                                                    <LinkIcon size={18} /> 下載位置
                                                </h3>
                                                <div className="text-brown-100 leading-relaxed whitespace-pre-line text-[15px] break-all">
                                                    {renderTextWithLinks(activeExt.downloadUrl)}
                                                </div>
                                            </div>

                                            {/* 區塊 4: 備註 */}
                                            <div className="bg-brown-950 p-6 md:p-8 rounded-2xl shadow-xl border border-brown-800">
                                                <h3 className="text-sm font-black text-brown-500 tracking-widest uppercase mb-5 flex items-center gap-2 border-b border-brown-800 pb-3">
                                                    <Bookmark size={18} /> 備註
                                                </h3>
                                                <p className="text-brown-100 leading-relaxed whitespace-pre-line text-[15px]">
                                                    {activeExt.notes || <span className="text-brown-600 italic">無備註事項</span>}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                /* 編輯模式 (深棕色科技面板) */
                                <div className="bg-brown-950 rounded-2xl shadow-2xl border border-brown-800 p-6 md:p-10 animate-in zoom-in-95 duration-200">
                                    <div className="flex justify-between items-center mb-8 border-b border-brown-800 pb-5">
                                        <h2 className="text-xl md:text-2xl font-black text-white flex items-center gap-3">
                                            <Edit3 className="text-brown-500" />
                                            編輯擴充功能屬性
                                        </h2>
                                        <button
                                            onClick={handleCancelEdit}
                                            className="p-2 text-brown-400 hover:text-white hover:bg-brown-800 rounded-full transition-colors"
                                        >
                                            <X size={20} />
                                        </button>
                                    </div>

                                    <div className="space-y-6">
                                        <div>
                                            <label className="block text-sm font-bold text-brown-400 mb-2 tracking-wide">擴充功能名稱</label>
                                            <input
                                                type="text"
                                                name="name"
                                                value={editForm.name}
                                                onChange={handleInputChange}
                                                className="w-full px-4 py-3 bg-brown-900 border border-brown-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brown-500 focus:border-brown-500 transition-all text-white font-medium placeholder-brown-600"
                                                placeholder="輸入擴充功能的名稱..."
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-brown-400 mb-2 tracking-wide">功能說明</label>
                                            <textarea
                                                name="description"
                                                value={editForm.description}
                                                onChange={handleInputChange}
                                                rows="3"
                                                className="w-full px-4 py-3 bg-brown-900 border border-brown-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brown-500 focus:border-brown-500 transition-all text-white leading-relaxed placeholder-brown-600"
                                                placeholder="簡述此擴充功能的核心功能與解決的痛點..."
                                            ></textarea>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-brown-400 mb-2 tracking-wide">安裝方式</label>
                                            <textarea
                                                name="installation"
                                                value={editForm.installation}
                                                onChange={handleInputChange}
                                                rows="5"
                                                className="w-full px-4 py-3 bg-brown-900 border border-brown-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brown-500 focus:border-brown-500 transition-all text-white leading-relaxed font-mono text-sm placeholder-brown-600"
                                                placeholder="描述如何在 Chrome 中載入或安裝此專案..."
                                            ></textarea>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <label className="block text-sm font-bold text-brown-400 mb-2 tracking-wide">下載位置</label>
                                                <textarea
                                                    name="downloadUrl"
                                                    value={editForm.downloadUrl}
                                                    onChange={handleInputChange}
                                                    rows="3"
                                                    className="w-full px-4 py-3 bg-brown-900 border border-brown-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brown-500 focus:border-brown-500 transition-all text-white leading-relaxed placeholder-brown-600"
                                                    placeholder="輸入 GitHub 連結或本機路徑 (支援自動轉換超連結)..."
                                                ></textarea>
                                            </div>

                                            <div>
                                                <label className="block text-sm font-bold text-brown-400 mb-2 tracking-wide">備註</label>
                                                <textarea
                                                    name="notes"
                                                    value={editForm.notes}
                                                    onChange={handleInputChange}
                                                    rows="3"
                                                    className="w-full px-4 py-3 bg-brown-900 border border-brown-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-brown-500 focus:border-brown-500 transition-all text-white leading-relaxed placeholder-brown-600"
                                                    placeholder="補充版本資訊、依賴套件或注意事項..."
                                                ></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-10 pt-6 border-t border-brown-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                                        <button
                                            onClick={() => handleDelete(editForm.id)}
                                            disabled={extensions.length <= 1}
                                            className="w-full sm:w-auto flex items-center justify-center gap-2 px-5 py-2.5 text-red-400 hover:bg-red-950/50 rounded-xl transition-colors text-sm font-bold disabled:opacity-50 disabled:cursor-not-allowed order-2 sm:order-1"
                                        >
                                            <Trash2 size={18} />
                                            刪除此項目
                                        </button>

                                        <div className="w-full sm:w-auto flex flex-col sm:flex-row gap-3 order-1 sm:order-2">
                                            <button
                                                onClick={handleCancelEdit}
                                                className="w-full sm:w-auto px-7 py-2.5 bg-brown-800 text-brown-200 rounded-xl hover:bg-brown-700 transition-colors font-bold text-sm text-center"
                                            >
                                                取消
                                            </button>
                                            <button
                                                onClick={handleSave}
                                                className="w-full sm:w-auto flex items-center justify-center gap-2 px-7 py-2.5 bg-brown-500 text-white rounded-xl hover:bg-brown-400 shadow-lg transition-all font-black text-sm"
                                            >
                                                <Save size={18} />
                                                儲存變更
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        // 初始化與渲染
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
