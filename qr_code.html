<!DOCTYPE html>
<html lang="zh-TW" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Studio Pro - 專業 QR Code 設計與列印產生器</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- QR Code Styling CDN -->
    <script src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js"></script>
    <!-- jsPDF CDN (用於本地 PDF 批量排版與導出) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* 質感滾動條 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #3b82f6;
        }
    </style>
</head>

<body class="bg-slate-950 text-slate-100 font-sans min-h-full flex flex-col">

    <!-- 頂部導航欄 -->
    <header
        class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 z-10">
        <div class="flex items-center gap-3">
            <div class="bg-gradient-to-tr from-blue-500 to-indigo-600 p-2.5 rounded-xl shadow-lg">
                <i data-lucide="qr-code" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1
                    class="text-xl font-black bg-gradient-to-r from-blue-400 via-indigo-300 to-purple-400 bg-clip-text text-transparent">
                    QR Studio Pro</h1>
                <p class="text-xs text-slate-400">極速離線產生器、自訂備註附加與 PDF 批量排版系統</p>
            </div>
        </div>

        <!-- 隱私與安全保證 -->
        <div
            class="flex items-center gap-2 bg-emerald-950/40 border border-emerald-800/60 text-emerald-400 px-4 py-2 rounded-full text-xs">
            <i data-lucide="shield-check" class="w-4 h-4 text-emerald-400 shrink-0"></i>
            <span>安全保證：所有生成過程均在瀏覽器本機完成，100% 隱私保護。</span>
        </div>
    </header>

    <!-- 主區塊 -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-8 space-y-6">

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

            <!-- 左側：設定控制面板 -->
            <div class="lg:col-span-7 space-y-6">

                <!-- 1. 內容輸入 -->
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <div class="flex items-center gap-2 mb-4 text-blue-400 font-semibold text-base">
                        <i data-lucide="text-quote" class="w-5 h-5"></i>
                        <h2>1. 選擇類型並輸入內容</h2>
                    </div>

                    <!-- 模式切換按鈕 -->
                    <div class="flex bg-slate-950 p-1.5 rounded-xl border border-slate-800/80 mb-4">
                        <button id="btn-mode-text" onclick="setInputMode('text')"
                            class="flex-1 py-2 text-center text-xs font-bold rounded-lg bg-blue-600 text-white transition-all">一般文字
                            / 網址</button>
                        <button id="btn-mode-wifi" onclick="setInputMode('wifi')"
                            class="flex-1 py-2 text-center text-xs font-bold rounded-lg text-slate-400 hover:text-slate-300 transition-all">WiFi
                            網路設定</button>
                    </div>

                    <!-- 模式一：一般文字輸入 -->
                    <div id="panel-mode-text" class="space-y-2">
                        <textarea id="qr-data"
                            class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                            rows="3" placeholder="請輸入您想轉換成 QR Code 的網址 (例如：https://...) 或自訂文字..."></textarea>
                    </div>

                    <!-- 模式二：WiFi 欄位輸入 -->
                    <div id="panel-mode-wifi" class="hidden space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2">WiFi SSID (名稱) *</label>
                                <input type="text" id="wifi-ssid" placeholder="例如：Home_WiFi"
                                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-200 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2">安全加密類型</label>
                                <select id="wifi-security"
                                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-300 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    <option value="WPA" selected>WPA / WPA2 (推薦)</option>
                                    <option value="WEP">WEP (舊式加密)</option>
                                    <option value="nopass">無密碼 (Open)</option>
                                </select>
                            </div>
                        </div>
                        <div id="wifi-password-wrapper">
                            <label class="block text-xs font-semibold text-slate-400 mb-2">WiFi 密碼 *</label>
                            <input type="password" id="wifi-password" placeholder="請輸入 WiFi 連線密碼"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-200 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="wifi-hidden"
                                class="w-4 h-4 rounded bg-slate-900 border-slate-700 text-blue-500 focus:ring-blue-500 cursor-pointer">
                            <label for="wifi-hidden"
                                class="text-xs font-semibold text-slate-300 cursor-pointer select-none">這是隱藏的 SSID
                                網路</label>
                        </div>
                    </div>
                </div>

                <!-- 2. 設計與配色樣式 -->
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <div class="flex items-center gap-2 mb-4 text-indigo-400 font-semibold text-base">
                        <i data-lucide="palette" class="w-5 h-5"></i>
                        <h2>2. 自訂設計與配色樣式</h2>
                    </div>

                    <div class="space-y-4">
                        <!-- 碼眼與碼點設計樣式 -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2">QR Code 碼點樣式</label>
                                <select id="qr-dots-type"
                                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    <option value="square">經典方形 (Square)</option>
                                    <option value="rounded" selected>現代圓角 (Rounded)</option>
                                    <option value="dots">精緻圓點 (Dots)</option>
                                    <option value="classy">流線優雅 (Classy)</option>
                                    <option value="classy-rounded">優雅圓潤 (Classy Rounded)</option>
                                    <option value="extra-rounded">極致圓角 (Extra Rounded)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2">定位角 (碼眼) 外框</label>
                                <select id="qr-corners-type"
                                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    <option value="square">方形眼框</option>
                                    <option value="dot" selected>圓角眼框</option>
                                    <option value="extra-rounded">極限圓角眼框</option>
                                </select>
                            </div>
                        </div>

                        <!-- 色彩控制 -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2">QR Code 前景色彩模式</label>
                                <select id="qr-color-mode" onchange="toggleColorMode()"
                                    class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                    <option value="single">單一色彩 (Solid Color)</option>
                                    <option value="gradient">漸層色彩 (Gradient)</option>
                                </select>
                            </div>

                            <!-- 背景色 -->
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-2">背景色彩</label>
                                <div class="flex gap-2">
                                    <input type="color" id="qr-bg-color" value="#ffffff"
                                        class="w-10 h-10 rounded border-0 cursor-pointer bg-transparent">
                                    <input type="text" id="qr-bg-color-hex" value="#ffffff"
                                        class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-300 text-sm focus:outline-none uppercase">
                                </div>
                            </div>
                        </div>

                        <!-- 單一色彩 vs 漸層色 控制盤 -->
                        <div id="single-color-wrapper"
                            class="p-3 bg-slate-950/60 rounded-xl border border-slate-800/80">
                            <label class="block text-xs font-semibold text-slate-400 mb-2">前景色選擇</label>
                            <div class="flex gap-2">
                                <input type="color" id="qr-fg-color" value="#000000"
                                    class="w-10 h-10 rounded border-0 cursor-pointer bg-transparent">
                                <input type="text" id="qr-fg-color-hex" value="#000000"
                                    class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-300 text-sm focus:outline-none uppercase">
                            </div>
                        </div>

                        <div id="gradient-color-wrapper"
                            class="hidden p-3 bg-slate-950/60 rounded-xl border border-slate-800/80 space-y-3">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-xs font-semibold text-slate-400 mb-1">漸層起點色</label>
                                    <div class="flex gap-2">
                                        <input type="color" id="qr-grad-start" value="#1e3a8a"
                                            class="w-8 h-8 rounded border-0 cursor-pointer bg-transparent">
                                        <input type="text" id="qr-grad-start-hex" value="#1e3a8a"
                                            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-1 text-slate-300 text-xs focus:outline-none uppercase">
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-xs font-semibold text-slate-400 mb-1">漸層終點色</label>
                                    <div class="flex gap-2">
                                        <input type="color" id="qr-grad-end" value="#7c3aed"
                                            class="w-8 h-8 rounded border-0 cursor-pointer bg-transparent">
                                        <input type="text" id="qr-grad-end-hex" value="#7c3aed"
                                            class="w-full bg-slate-950 border border-slate-800 rounded-lg px-2 py-1 text-slate-300 text-xs focus:outline-none uppercase">
                                    </div>
                                </div>
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-1">漸層方向類型</label>
                                <select id="qr-grad-type"
                                    class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-1.5 text-slate-300 text-xs focus:outline-none">
                                    <option value="linear" selected>線性漸層 (Linear)</option>
                                    <option value="radial">放射漸層 (Radial)</option>
                                </select>
                            </div>
                        </div>

                        <!-- 錯誤修正等級 -->
                        <div>
                            <div class="flex items-center justify-between mb-1">
                                <label class="block text-xs font-semibold text-slate-400">容錯能力 (Error
                                    Correction)</label>
                                <span id="err-desc" class="text-xs text-slate-500">標準 L (約 7% 損毀容忍)</span>
                            </div>
                            <select id="qr-error-level" onchange="updateErrorLevelDesc()"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-slate-300 focus:outline-none focus:ring-1 focus:ring-blue-500">
                                <option value="L">L - 容錯率小 (適合純網址，條碼最精細)</option>
                                <option value="M">M - 中度容錯 (約 15% 容忍)</option>
                                <option value="Q">Q - 高度容錯 (約 25% 容忍)</option>
                                <option value="H" selected>H - 極高容錯 (約 30% 容忍，建議包含 LOGO 時使用)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 3. 中央 Logo 置入 -->
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-2 text-purple-400 font-semibold text-base">
                            <i data-lucide="image" class="w-5 h-5"></i>
                            <h2>3. 置入中央 Logo 標誌</h2>
                        </div>
                        <button onclick="clearLogo()" id="btn-clear-logo"
                            class="hidden text-xs text-rose-400 hover:text-rose-300 border border-rose-800/40 bg-rose-950/20 px-2 py-1 rounded transition">清除
                            LOGO</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-center">
                        <div class="md:col-span-5">
                            <label
                                class="w-full flex flex-col items-center justify-center border-2 border-dashed border-slate-800 hover:border-slate-700 bg-slate-950/40 rounded-xl py-6 cursor-pointer group transition">
                                <i data-lucide="upload-cloud"
                                    class="w-8 h-8 text-slate-500 group-hover:text-blue-400 transition mb-2"></i>
                                <span class="text-xs text-slate-400 group-hover:text-slate-300 transition">上傳自訂標誌</span>
                                <input type="file" id="logo-input" accept="image/*" class="hidden"
                                    onchange="handleLogoUpload(this)">
                            </label>
                        </div>
                        <div class="md:col-span-7 space-y-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-400 mb-1">預設經典品牌圖案快速載入</label>
                                <div class="flex flex-wrap gap-2">
                                    <button onclick="loadSampleLogo('line')"
                                        class="bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 px-2.5 py-1.5 rounded-lg border border-slate-700/50 transition">LINE</button>
                                    <button onclick="loadSampleLogo('fb')"
                                        class="bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 px-2.5 py-1.5 rounded-lg border border-slate-700/50 transition">Facebook</button>
                                    <button onclick="loadSampleLogo('x')"
                                        class="bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 px-2.5 py-1.5 rounded-lg border border-slate-700/50 transition">X
                                        (Twitter)</button>
                                    <button onclick="loadSampleLogo('wifi')"
                                        class="bg-blue-900/40 hover:bg-blue-900/60 text-xs text-blue-300 px-2.5 py-1.5 rounded-lg border border-blue-700/50 transition font-bold">WiFi
                                        圖標</button>
                                    <button onclick="loadSampleLogo('internet')"
                                        class="bg-indigo-900/40 hover:bg-indigo-900/60 text-xs text-indigo-300 px-2.5 py-1.5 rounded-lg border border-indigo-700/50 transition font-bold">全球資訊網</button>
                                    <button onclick="loadSampleLogo('mail')"
                                        class="bg-slate-800 hover:bg-slate-700 text-xs text-slate-300 px-2.5 py-1.5 rounded-lg border border-slate-700/50 transition">Email
                                        信箱</button>
                                </div>
                            </div>
                            <div>
                                <div class="flex justify-between text-xs text-slate-400 mb-1">
                                    <span>標誌大小比例 (相對大小)</span>
                                    <span id="logo-size-val">15%</span>
                                </div>
                                <input type="range" id="logo-size-slider" min="5" max="35" value="15"
                                    oninput="updateLogoSizeText()"
                                    class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 4. 附加文字與備註設定 -->
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl">
                    <div class="flex items-center gap-2 mb-4 text-emerald-400 font-semibold text-base">
                        <i data-lucide="align-left" class="w-5 h-5"></i>
                        <h2>4. 附加顯示內容與備註說明</h2>
                    </div>

                    <div class="space-y-4">
                        <!-- 顯示網址/輸入內容 checkbox -->
                        <div
                            class="flex items-center gap-2.5 bg-slate-950/60 p-3.5 rounded-xl border border-slate-800/80">
                            <input type="checkbox" id="qr-include-text" onchange="updateQR()"
                                class="w-4 h-4 rounded bg-slate-900 border-slate-700 text-blue-500 focus:ring-blue-500 cursor-pointer">
                            <label for="qr-include-text"
                                class="text-xs font-semibold text-slate-300 cursor-pointer select-none">
                                附加顯示輸入內容或網址 (自動解析 WiFi 格式)
                            </label>
                        </div>

                        <!-- 啟用自訂備註說明 checkbox -->
                        <div
                            class="flex items-center gap-2.5 bg-slate-950/60 p-3.5 rounded-xl border border-slate-800/80">
                            <input type="checkbox" id="qr-include-remarks" onchange="toggleRemarksInput()"
                                class="w-4 h-4 rounded bg-slate-900 border-slate-700 text-blue-500 focus:ring-blue-500 cursor-pointer">
                            <label for="qr-include-remarks"
                                class="text-xs font-semibold text-slate-300 cursor-pointer select-none">
                                附加顯示自訂備註說明 (標題、使用指南、注意事項)
                            </label>
                        </div>

                        <!-- 備註輸入框 -->
                        <div id="remarks-input-wrapper" class="hidden transition-all duration-300">
                            <label class="block text-xs font-semibold text-slate-400 mb-2">請輸入備註說明內容 (支援多行輸入)</label>
                            <textarea id="qr-remarks-data" oninput="updateQR()"
                                class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                                rows="3" placeholder="例如：&#10;歡迎掃描連接現場免費 WiFi！&#10;連線若有問題請洽詢服務台。"></textarea>
                        </div>
                    </div>
                </div>

            </div>

            <!-- 右側：即時預覽與導出分享 -->
            <div class="lg:col-span-5 space-y-6">

                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 shadow-xl flex flex-col items-center">
                    <h3 class="text-sm font-bold text-slate-400 self-start mb-4">即時預覽 (Live Preview)</h3>

                    <!-- QR Code 預覽框 (動態渲染含備註卡片) -->
                    <div class="relative bg-white p-6 rounded-2xl shadow-inner-lg flex items-center justify-center border border-slate-800 w-full"
                        style="min-height: 280px;">
                        <div id="qr-preview"
                            class="transition-transform duration-300 hover:scale-[1.02] flex items-center justify-center w-full">
                        </div>
                    </div>

                    <!-- 尺寸設定 (拉桿 + 快速按鈕) -->
                    <div class="w-full mt-6 space-y-4">
                        <div class="border-t border-slate-800 pt-4">
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-xs font-semibold text-slate-400">輸出圖檔尺寸調整 (像素 px)</label>
                                <div class="flex items-center gap-1.5">
                                    <input type="number" id="qr-size-input" value="500" min="100" max="4000"
                                        class="w-16 bg-slate-950 border border-slate-800 rounded px-2 py-0.5 text-center text-xs text-slate-200 focus:outline-none">
                                    <span class="text-xs text-slate-400">px</span>
                                </div>
                            </div>

                            <!-- 快捷按鈕 -->
                            <div class="grid grid-cols-4 gap-1.5 mb-2">
                                <button onclick="changeSize(300)"
                                    class="bg-slate-800 hover:bg-slate-700 active:bg-blue-600 text-xs text-slate-300 py-1 rounded transition">300px</button>
                                <button onclick="changeSize(500)"
                                    class="bg-slate-800 hover:bg-slate-700 active:bg-blue-600 text-xs text-slate-300 py-1 rounded transition">500px</button>
                                <button onclick="changeSize(1000)"
                                    class="bg-slate-800 hover:bg-slate-700 active:bg-blue-600 text-xs text-slate-300 py-1 rounded transition">1K
                                    px</button>
                                <button onclick="changeSize(2000)"
                                    class="bg-slate-800 hover:bg-slate-700 active:bg-blue-600 text-xs text-slate-300 py-1 rounded transition">2K
                                    px</button>
                            </div>
                            <input type="range" id="qr-size-slider" min="150" max="3000" step="50" value="500"
                                oninput="syncSize(this.value)"
                                class="w-full h-1.5 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-blue-500">
                        </div>

                        <!-- 格式導出 -->
                        <div class="space-y-2">
                            <span class="block text-xs font-semibold text-slate-400">單圖格式下載</span>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="downloadQR('png')"
                                    class="flex items-center justify-center gap-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-2.5 px-4 rounded-xl shadow-lg transition duration-200">
                                    <i data-lucide="download" class="w-4 h-4"></i>
                                    <span>下載 PNG</span>
                                </button>
                                <button onclick="downloadQR('jpeg')"
                                    class="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 px-4 rounded-xl border border-slate-700 transition duration-200">
                                    <span>下載 JPEG</span>
                                </button>
                                <button onclick="downloadQR('webp')"
                                    class="flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 px-4 rounded-xl border border-slate-700 transition duration-200">
                                    <span>下載 WEBP</span>

    <!-- 自訂提示 Toast 系統 -->

    <!-- ==================== MAIN SCRIPT & APP LOGIC ==================== -->
    <script>
        // 初始化 Lucide 圖標
        lucide.createIcons();

        // 狀態追蹤
        let currentLogoBase64 = null;
        let qrGeneratorInstance = null;
        let currentInputMode = 'text'; // 'text' 或 'wifi'

        // Toast 提示
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `flex items-center gap-2 px-4 py-3 rounded-xl shadow-2xl border text-sm transform translate-y-2 opacity-0 transition-all duration-300 pointer-events-auto ${type === 'success' ? 'bg-emerald-950 border-emerald-800 text-emerald-400' :
                type === 'error' ? 'bg-rose-950 border-rose-800 text-rose-400' :
                    'bg-slate-900 border-slate-800 text-slate-300'
                }`;

            const icon = type === 'success' ? 'check-circle' : type === 'error' ? 'alert-triangle' : 'info';
            toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4 shrink-0"></i> <span>${message}</span>`;
            toastContainer.appendChild(toast);
            lucide.createIcons();

            // 動畫顯現
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            // 移除
            setTimeout(() => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ================== 切換輸入類型 (一般文字 / WIFI) ==================
        function setInputMode(mode) {
            currentInputMode = mode;
            const btnText = document.getElementById('btn-mode-text');
            const btnWifi = document.getElementById('btn-mode-wifi');
            const panelText = document.getElementById('panel-mode-text');
            const panelWifi = document.getElementById('panel-mode-wifi');

            if (mode === 'text') {
                btnText.className = "flex-1 py-2 text-center text-xs font-bold rounded-lg bg-blue-600 text-white transition-all";
                btnWifi.className = "flex-1 py-2 text-center text-xs font-bold rounded-lg text-slate-400 hover:text-slate-300 transition-all";
                panelText.classList.remove('hidden');
                panelWifi.classList.add('hidden');
            } else {
                btnText.className = "flex-1 py-2 text-center text-xs font-bold rounded-lg text-slate-400 hover:text-slate-300 transition-all";
                btnWifi.className = "flex-1 py-2 text-center text-xs font-bold rounded-lg bg-blue-600 text-white transition-all";
                panelText.classList.add('hidden');
                panelWifi.classList.remove('hidden');
            }
            updateQR();
        }

        // 取得當前輸入的 QR Code 原始字串內容
        function getQRCodeDataString() {
            if (currentInputMode === 'text') {
                return document.getElementById('qr-data').value || "https://example.com";
            } else {
                const ssid = document.getElementById('wifi-ssid').value || "WiFi_Name";
                const sec = document.getElementById('wifi-security').value;
                const password = document.getElementById('wifi-password').value;
                const hidden = document.getElementById('wifi-hidden').checked;

                // WiFi 國際標準格式：WIFI:S:<SSID>;T:<WPA|WEP|nopass>;P:<PASSWORD>;H:<true|false>;;
                let wifiString = `WIFI:S:${ssid};T:${sec};`;
                if (sec !== 'nopass' && password) {
                    wifiString += `P:${password};`;
                } else {
                    wifiString += `P:;`;
                }
                wifiString += `H:${hidden ? 'true' : 'false'};;`;
                return wifiString;
            }
        }

        // 解析 WIFI 格式轉為好讀文字
        function parseWiFiFriendlyText(wifiStr) {
            try {
                const ssidMatch = wifiStr.match(/S:([^;]+);/);
                const secMatch = wifiStr.match(/T:([^;]+);/);
                const ssid = ssidMatch ? ssidMatch[1] : 'Unknown';
                const sec = secMatch ? secMatch[1] : 'None';
                return `WiFi: ${ssid} (${sec})`;
            } catch (e) {
                return "WiFi 連線 QR Code";
            }
        }

        // 備註說明框可見性切換
        function toggleRemarksInput() {
            const active = document.getElementById('qr-include-remarks').checked;
            const el = document.getElementById('remarks-input-wrapper');
            if (active) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
            updateQR();
        }

        // ================== QR CODE 產生與渲染 ==================

        // 初始化產生器並進行基本繪製
        function initQRGenerator() {
            const dataText = getQRCodeDataString();
            const sizeValue = parseInt(document.getElementById('qr-size-input').value) || 500;

            qrGeneratorInstance = new QRCodeStyling(getQRConfig(dataText, sizeValue));
            updateQR();
        }

        // 取得目前的 QR Code 基本設計參數
        function getQRConfig(text, sizeValue) {
            const dotsType = document.getElementById('qr-dots-type').value;
            const cornersType = document.getElementById('qr-corners-type').value;
            const bgColor = document.getElementById('qr-bg-color').value;
            const errorLevel = document.getElementById('qr-error-level').value;
            const colorMode = document.getElementById('qr-color-mode').value;
            const logoSize = parseFloat(document.getElementById('logo-size-slider').value) / 100;

            let dotsOptions = {
                type: dotsType
            };

            if (colorMode === 'single') {
                dotsOptions.color = document.getElementById('qr-fg-color').value;
            } else {
                dotsOptions.gradient = {
                    type: document.getElementById('qr-grad-type').value,
                    colorStops: [
                        { offset: 0, color: document.getElementById('qr-grad-start').value },
                        { offset: 1, color: document.getElementById('qr-grad-end').value }
                    ]
                };
            }

            const config = {
                width: sizeValue,
                height: sizeValue,
                type: "svg",
                data: text,
                image: currentLogoBase64 || "",
                dotsOptions: dotsOptions,
                backgroundOptions: {
                    color: bgColor,
                },
                cornersSquareOptions: {
                    type: cornersType,
                },
                imageOptions: {
                    crossOrigin: "anonymous",
                    margin: 6,
                    imageSizeFactor: logoSize
                },
                qrOptions: {
                    errorCorrectionLevel: errorLevel
                }
            };

            return config;
        }

        // 漢字及特殊字元在 Canvas 下的自動換行繪製函數
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const characters = text.split('');
            let line = '';
            for (let n = 0; n < characters.length; n++) {
                let testLine = line + characters[n];
                let metrics = ctx.measureText(testLine);
                let testWidth = metrics.width;
                if (testWidth > maxWidth && n > 0) {
                    ctx.fillText(line, x, y);
                    line = characters[n];
                    y += lineHeight;
                } else {
                    line = testLine;
                }
            }
            ctx.fillText(line, x, y);
            return y + lineHeight; // 回傳下一行 Y 軸起點
        }

        // 動態合成 QR Code 與文字備註的 Canvas 函數 (傳回 Promise)
        function createCombinedCanvas(sizeValue) {
            return new Promise((resolve) => {
                const dataText = getQRCodeDataString();
                const includeText = document.getElementById('qr-include-text').checked;
                const includeRemarks = document.getElementById('qr-include-remarks').checked;
                const remarksText = document.getElementById('qr-remarks-data').value.trim();

                // 建立高對比渲染用臨時設定
                const downloadConfig = Object.assign({}, getQRConfig(dataText, sizeValue), {
                    width: sizeValue,
                    height: sizeValue,
                    type: 'canvas'
                });

                const tempDiv = document.createElement('div');
                tempDiv.style.display = 'none';
                document.body.appendChild(tempDiv);

                const exporter = new QRCodeStyling(downloadConfig);
                exporter.append(tempDiv);

                // 延時等待 Canvas 及其內嵌 Logo 標誌載入完成
                setTimeout(() => {
                    const qrCanvas = tempDiv.querySelector('canvas');
                    if (!qrCanvas) {
                        document.body.removeChild(tempDiv);
                        resolve(null);
                        return;
                    }

                    const combinedCanvas = document.createElement('canvas');
                    const ctx = combinedCanvas.getContext('2d');

                    const originalWidth = qrCanvas.width;
                    const originalHeight = qrCanvas.height;

                    // 計算下方附加字與備註文字排版尺寸
                    const fontSize = Math.max(12, Math.round(sizeValue * 0.04));
                    const lineSpacing = Math.round(fontSize * 0.4);
                    const textMargin = Math.round(sizeValue * 0.06);

                    let extraHeight = 0;
                    let textLayouts = [];

                    if (includeText) {
                        let displayText = dataText;
                        if (displayText.startsWith("WIFI:")) {
                            displayText = parseWiFiFriendlyText(displayText);
                        }
                        textLayouts.push({ text: displayText, fontWeight: 'bold', fontSize: fontSize });
                        extraHeight += fontSize + lineSpacing;
                    }

                    if (includeRemarks && remarksText) {
                        const lines = remarksText.split('\n');
                        lines.forEach(line => {
                            textLayouts.push({ text: line, fontWeight: 'normal', fontSize: Math.round(fontSize * 0.85) });
                            extraHeight += Math.round(fontSize * 0.85) + lineSpacing;
                        });
                    }

                    if (textLayouts.length > 0) {
                        extraHeight += textMargin * 1.5; // 增加上下留白
                    }

                    combinedCanvas.width = originalWidth;
                    combinedCanvas.height = originalHeight + extraHeight;

                    // 滿版底色填充
                    ctx.fillStyle = downloadConfig.backgroundOptions.color || '#ffffff';
                    ctx.fillRect(0, 0, combinedCanvas.width, combinedCanvas.height);

                    // 繪製 QR 碼本身
                    ctx.drawImage(qrCanvas, 0, 0);

                    // 繪製文字與備註
                    if (textLayouts.length > 0) {
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'top';

                        let drawY = originalHeight + textMargin / 2;
                        textLayouts.forEach(layout => {
                            ctx.fillStyle = downloadConfig.dotsOptions.color || '#000000';
                            ctx.font = `${layout.fontWeight} ${layout.fontSize}px sans-serif`;

                            const maxWidth = originalWidth - (textMargin * 2);
                            drawY = wrapText(ctx, layout.text, originalWidth / 2, drawY, maxWidth, layout.fontSize + lineSpacing);
                        });
                    }

                    document.body.removeChild(tempDiv);
                    resolve(combinedCanvas);
                }, 300);
            });
        }

        // 重新繪製即時預覽畫面
        async function updateQR() {
            if (!qrGeneratorInstance) return;

            const sizeValue = 500; // 產生中等解析度畫布進行預覽繪製
            const combinedCanvas = await createCombinedCanvas(sizeValue);
            const previewContainer = document.getElementById('qr-preview');
            previewContainer.innerHTML = "";

            if (combinedCanvas) {
                combinedCanvas.style.maxWidth = "100%";
                combinedCanvas.style.height = "auto";
                combinedCanvas.style.maxHeight = "340px";
                combinedCanvas.style.objectFit = "contain";
                previewContainer.appendChild(combinedCanvas);
            } else {
                const dataText = getQRCodeDataString();
                qrGeneratorInstance.update(getQRConfig(dataText, 280));
                qrGeneratorInstance.append(previewContainer);
            }
        }

        // 綁定所有參數變更事件以驅動 Live 預覽
        const liveUpdateInputs = [
            'qr-data', 'qr-dots-type', 'qr-corners-type', 'qr-error-level', 'qr-bg-color',
            'qr-fg-color', 'qr-grad-start', 'qr-grad-end', 'qr-grad-type', 'logo-size-slider'
        ];
        liveUpdateInputs.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if (id === 'qr-bg-color') document.getElementById('qr-bg-color-hex').value = document.getElementById('qr-bg-color').value;
                if (id === 'qr-fg-color') document.getElementById('qr-fg-color-hex').value = document.getElementById('qr-fg-color').value;
                if (id === 'qr-grad-start') document.getElementById('qr-grad-start-hex').value = document.getElementById('qr-grad-start').value;
                if (id === 'qr-grad-end') document.getElementById('qr-grad-end-hex').value = document.getElementById('qr-grad-end').value;
                updateQR();
            });
        });

        // 綁定 WIFI 輸入元件更新事件
        const wifiInputs = ['wifi-ssid', 'wifi-password', 'wifi-security', 'wifi-hidden'];
        wifiInputs.forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                if (id === 'wifi-security') {
                    const sec = document.getElementById('wifi-security').value;
                    if (sec === 'nopass') {
                        document.getElementById('wifi-password-wrapper').classList.add('hidden');
                    } else {
                        document.getElementById('wifi-password-wrapper').classList.remove('hidden');
                    }
                }
                updateQR();
            });
        });

        // 綁定 Hex 輸入框手動輸入
        const hexColorInputs = ['qr-bg-color-hex', 'qr-fg-color-hex', 'qr-grad-start-hex', 'qr-grad-end-hex'];
        hexColorInputs.forEach(id => {
            document.getElementById(id).addEventListener('change', (e) => {
                let val = e.target.value;
                if (!val.startsWith('#')) val = '#' + val;
                if (/^#[0-9A-F]{6}$/i.test(val)) {
                    const pickerId = id.replace('-hex', '');
                    document.getElementById(pickerId).value = val;
                    updateQR();
                } else {
                    showToast('不正確的 Hex 色彩格式', 'error');
                }
            });
        });

        // 切換前景色模式 (單一色 / 漸層色)
        function toggleColorMode() {
            const mode = document.getElementById('qr-color-mode').value;
            if (mode === 'single') {
                document.getElementById('single-color-wrapper').classList.remove('hidden');
                document.getElementById('gradient-color-wrapper').classList.add('hidden');
            } else {
                document.getElementById('single-color-wrapper').classList.add('hidden');
                document.getElementById('gradient-color-wrapper').classList.remove('hidden');
            }
            updateQR();
        }

        // 容錯級別描述
        function updateErrorLevelDesc() {
            const level = document.getElementById('qr-error-level').value;
            const descSpan = document.getElementById('err-desc');
            if (level === 'L') descSpan.innerText = '標準 L (約 7% 損毀容忍)';
            if (level === 'M') descSpan.innerText = '中度 M (約 15% 損毀容忍)';
            if (level === 'Q') descSpan.innerText = '高度 Q (約 25% 損毀容忍)';
            if (level === 'H') descSpan.innerText = '極高 H (約 30% 損毀容忍，建議包含 LOGO 時使用)';
            updateQR();
        }

        // 處理自訂 Logo 上傳
        function handleLogoUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    currentLogoBase64 = e.target.result;
                    document.getElementById('btn-clear-logo').classList.remove('hidden');
                    updateQR();
                    showToast('成功上傳自訂 Logo 標誌', 'success');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearLogo() {
            currentLogoBase64 = null;
            document.getElementById('logo-input').value = "";

            updateQR();
            showToast('Logo 已移除');

        // ================== 單圖設計匯出功能 ==================
        async function downloadQR(format) {
            const dataText = getQRCodeDataString();
            const sizeValue = parseInt(document.getElementById('qr-size-input').value) || 500;
            const includeText = document.getElementById('qr-include-text').checked;
            const includeRemarks = document.getElementById('qr-include-remarks').checked;

            // 如果未啟用任何附加備註，利用庫內建方法極速下載
            if (!includeText && !includeRemarks) {
                const downloadConfig = getQRConfig(dataText, sizeValue);
                const exporter = new QRCodeStyling(downloadConfig);
                exporter.download({
                    name: "qrcode_" + Date.now(),
                    extension: format
                }).then(() => {
                    showToast(`成功下載 ${format.toUpperCase()} 圖片`, 'success');
                }).catch(err => {
                    showToast('下載失敗，請重試', 'error');
                });
                return;
            }

            // 如果有包含備註文字，使用 Canvas 合成導出技術
            try {
                const combinedCanvas = await createCombinedCanvas(sizeValue);
                if (!combinedCanvas) throw new Error("合成畫布失敗");

                if (format === 'svg') {
                    // 將畫布轉為嵌入式的完美向量 SVG
                    const svgString = `
            <svg xmlns="http://www.w3.org/2000/svg" width="${combinedCanvas.width}" height="${combinedCanvas.height}">
              <image href="${combinedCanvas.toDataURL('image/png')}" width="${combinedCanvas.width}" height="${combinedCanvas.height}" />
            </svg>
          `;
                    const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
                    const url = URL.createObjectURL(blob);
                    triggerDownload(url, `qrcode_${Date.now()}.svg`);
                    URL.revokeObjectURL(url);
                    showToast(`成功下載 SVG 圖片 (含文字)`, 'success');
                } else {
                    let mimeType = 'image/png';
                    if (format === 'jpeg' || format === 'jpg') mimeType = 'image/jpeg';
                    if (format === 'webp') mimeType = 'image/webp';

                    const dataUrl = combinedCanvas.toDataURL(mimeType, 0.95);
                    triggerDownload(dataUrl, `qrcode_${Date.now()}.${format}`);
                    showToast(`成功下載 ${format.toUpperCase()} 圖片 (含文字)`, 'success');
                }
            } catch (err) {
                console.error("文字合成下載失敗: ", err);
                showToast('下載失敗，改用標準方式輸出', 'error');
            }
        }

        function triggerDownload(url, filename) {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // ================== PDF 批量排版列印系統 ==================
        async function downloadPDF() {
            // 統一以高品質 800px 作為 PDF 排版的圖檔解析度
            const sizeValue = 800;
            showToast('正在進行高畫質 PDF 排版計算，請稍候...', 'info');

            const combinedCanvas = await createCombinedCanvas(sizeValue);
            if (!combinedCanvas) {
                showToast('高畫質影像計算失敗，請確認內容。', 'error');
                return;
            }

            const imgData = combinedCanvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;

            const doc = new jsPDF({
                orientation: 'portrait',
                unit: 'mm',
                format: 'a4'
            });

            const pdfMode = document.getElementById('pdf-layout-select').value; // '1', '2', '4', '8'
            const pageWidth = 210;
            const pageHeight = 297;

            // 依據含文字的卡片長寬比進行縮放比率計算
            const aspect = combinedCanvas.height / combinedCanvas.width;

            if (pdfMode === '1') {
                // 每頁 1 張 (特大)
                let w = 135;
                let h = w * aspect;
                // Bounding box 限制 (高度不得超過 240mm 以保留上下邊距)
                if (h > 240) {
                    h = 240;
                    w = h / aspect;
                }
                const x = (pageWidth - w) / 2;
                const y = (pageHeight - h) / 2;
                doc.addImage(imgData, 'PNG', x, y, w, h);
            }
            else if (pdfMode === '2') {
                // 每頁 2 張 (垂直均分併排)
                let w = 100;
                let h = w * aspect;
                // Bounding box 限制 (高度不得超過 120mm 以保證兩張併排加上安全邊距)
                if (h > 120) {
                    h = 120;
                    w = h / aspect;
                }
                const x = (pageWidth - w) / 2;
                const gapY = (pageHeight - (h * 2)) / 3;

                doc.addImage(imgData, 'PNG', x, gapY, w, h);
                doc.addImage(imgData, 'PNG', x, gapY * 2 + h, w, h);
            }
            else if (pdfMode === '4') {
                // 每頁 4 張 (2x2 網格配置)
                let w = 82;
                let h = w * aspect;
                // Bounding box 限制 (高度不得超過 115mm 以保證兩列網格安全)
                if (h > 115) {
                    h = 115;
                    w = h / aspect;
                }
                const gapX = (pageWidth - (w * 2)) / 3;
                const gapY = (pageHeight - (h * 2)) / 3;

                // 第一排
                doc.addImage(imgData, 'PNG', gapX, gapY, w, h);
                doc.addImage(imgData, 'PNG', gapX * 2 + w, gapY, w, h);
                // 第二排
                doc.addImage(imgData, 'PNG', gapX, gapY * 2 + h, w, h);
                doc.addImage(imgData, 'PNG', gapX * 2 + w, gapY * 2 + h, w, h);
            }
            else if (pdfMode === '8') {
                // 每頁 8 張 (2x4 網格配置)
                let w = 62;
                let h = w * aspect;
                // Bounding box 限制 (高度不得超過 58mm 以保證四列網格與安全上下邊距)
                if (h > 58) {
                    h = 58;
                    w = h / aspect;
                }
                const gapX = (pageWidth - (w * 2)) / 3;
                const gapY = (pageHeight - (h * 4)) / 5;

                for (let row = 0; row < 4; row++) {
                    const y = gapY + row * (h + gapY);
                    doc.addImage(imgData, 'PNG', gapX, y, w, h);
                    doc.addImage(imgData, 'PNG', gapX * 2 + w, y, w, h);
                }
            }

            doc.save(`qrcode_print_sheet_${pdfMode}up_${Date.now()}.pdf`);
            showToast('PDF 檔案排版列印檔已成功生成下載！', 'success');
        }

        // ================== 社群分享文案優化 ==================
        function shareSocial(platform) {
            const content = getQRCodeDataString();
            const toolUrl = window.location.href;

            const shareText = `【分享一個超好用的自訂 QR Code 設計工具！】\n\n這款工具完全在瀏覽器本機產生，保護隱私。不但支援「WIFI 連線 SSID 自動編碼」，還能為 QR 碼附加「多行備註說明文字」（非常適合標注桌號或警語）！\n更厲害的是，它還內建 A4 列印排版（1頁、2頁、4頁、8頁）一鍵匯出為 PDF 列印，簡真是行銷、店家與辦公室神物！\n\n👉 推薦給您：\n🔗 工具體驗連結：${toolUrl}`;
            const encodedText = encodeURIComponent(shareText);
            const encodedUrl = encodeURIComponent(toolUrl);

            let shareUrl = "";

            switch (platform) {
                case 'line':
                    shareUrl = `https://line.me/R/msg/text/?${encodedText}`;
                    break;
                case 'fb':
                    shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodedUrl}&quote=${encodedText}`;
                    break;
                case 'x':
                    shareUrl = `https://twitter.com/intent/tweet?text=${encodedText}`;
                    break;
            }
            window.open(shareUrl, '_blank');
        }

        // 一鍵複製
        function copyContent() {
            const content = getQRCodeDataString();
            if (!content || content === "https://example.com") {
                showToast('輸入框中無任何有效內容可供複製！', 'error');
                return;
            }

            const el = document.createElement('textarea');
            el.value = content;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('內容已成功複製至剪貼簿！', 'success');
        }

        // ================== 應用程式生命週期初始化 ==================
        window.onload = function () {
            initQRGenerator();
        };
    </script>
