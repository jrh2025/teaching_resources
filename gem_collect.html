<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Gem 收集盒</title>

    <!-- 引入字體 (Noto Sans TC 提供乾淨俐落的無襯線科技感) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap"
        rel="stylesheet">

    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- 引入 React 核心與 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- 引入 Babel 進行瀏覽器端 JSX 編譯 -->
    <script src="https://unpkg.com/@babel/standalone@7.15.0/babel.min.js"></script>

    <!-- 引入外部扁平化資料庫 -->
    <script src="gem_collect.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #A9A9A9;
            /* 將主背景設定為指定的科技灰 */
        }

        /* 針對深色面板的自訂捲軸樣式 */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #52525b;
            /* zinc-600 */
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #71717a;
            /* zinc-500 */
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- 系統核心邏輯 -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ---------------------------------------------------------
        // 模組化 SVG 圖示元件
        // ---------------------------------------------------------
        const Bot = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line></svg>
        );
        const Edit3 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
        );
        const Save = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        );
        const Plus = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const Trash2 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );
        const Terminal = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
        );
        const FileText = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        );
        const Wrench = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
        );
        const Info = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
        );
        const X = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );
        const Download = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        );
        const Menu = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        );
        const Copy = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        );

        // ---------------------------------------------------------
        // 資料模型 (Initial State for Gems)
        // ---------------------------------------------------------
        const defaultInitialGems = [
            {
                id: '1',
                name: 'Python 程式碼審查專家',
                description: '這是一個專門用於審查 Python 程式碼並提供結構最佳化與效能改進建議的 Gem。',
                instructions: '1. 將您的 Python 程式碼貼上對話框。\n2. 簡述您目前遇到的錯誤或希望優化的具體方向（例如：提升執行速度、降低記憶體佔用）。\n3. Gem 會返回重構後的程式碼與修改說明。',
                tools: 'Code Execution, Web Browsing (用於查詢最新 PEP 規範)',
                info: '參考標準：PEP 8、Python 3.12 新特性。適合中高階開發者進行 Code Review。參考網址：https://peps.python.org/pep-0008/'
            },
            {
                id: '2',
                name: '行銷文案撰寫助理',
                description: '專為社群媒體與電子報設計，能快速產出具備吸引力與轉換率的行銷文案。',
                instructions: '提供以下資訊：\n- 產品或服務名稱\n- 目標客群 (TA)\n- 核心賣點或主打優惠\n- 期望的語氣 (例如：幽默、專業、感性)',
                tools: '無預設工具',
                info: '預設使用 AIDA 框架 (Attention, Interest, Desire, Action) 進行文案架構設計。'
            }
        ];

        // ---------------------------------------------------------
        // 應用程式主體 (Main App Component)
        // ---------------------------------------------------------
        function App() {
            const urlParams = new URLSearchParams(window.location.search);
            const allowEdit = urlParams.get('edit') === '1';

            const loadInitialData = () => {
                if (typeof window !== 'undefined' && window.GEMINI_GEMS_DATA && Array.isArray(window.GEMINI_GEMS_DATA) && window.GEMINI_GEMS_DATA.length > 0) {
                    return window.GEMINI_GEMS_DATA;
                }
                return defaultInitialGems;
            };

            const [gems, setGems] = useState(loadInitialData);
            const [activeId, setActiveId] = useState(gems.length > 0 ? gems[0].id : null);
            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);

            // 系統提示訊息狀態
            const [toastMessage, setToastMessage] = useState('');

            const activeGem = gems.find(g => g.id === activeId) || gems[0];

            // 顯示自訂訊息
            const showToast = (message) => {
                setToastMessage(message);
                setTimeout(() => {
                    setToastMessage('');
                }, 3000);
            };

            // 安全的複製到剪貼簿功能 (相容 iFrame 環境)
            const handleCopyText = (text) => {
                if (!text) return;

                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();

                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        showToast('✓ 內容已複製到剪貼簿');
                    } else {
                        showToast('✕ 複製失敗，請手動選取複製');
                    }
                } catch (err) {
                    showToast('✕ 複製失敗，您的瀏覽器可能不支援此功能');
                }

                document.body.removeChild(textArea);
            };

            // 解析網址並轉換為超連結元件
            const renderTextWithLinks = (text) => {
                if (!text) return <span className="text-zinc-600 italic">無相關資訊</span>;

                // 簡易網址正規表達式
                const urlRegex = /(https?:\/\/[^\s]+)/g;
                const parts = text.split(urlRegex);

                return parts.map((part, i) => {
                    if (part.match(urlRegex)) {
                        return (
                            <a
                                key={i}
                                href={part}
                                target="_blank"
                                rel="noopener noreferrer"
                                className="text-[#A9A9A9] hover:text-white underline underline-offset-4 decoration-zinc-600 hover:decoration-[#A9A9A9] transition-colors break-all"
                            >
                                {part}
                            </a>
                        );
                    }
                    return <span key={i}>{part}</span>;
                });
            };

            const handleEditClick = () => {
                if (!allowEdit) return;
                setEditForm({ ...activeGem });
                setIsEditing(true);
            };

            const handleCancelEdit = () => {
                setIsEditing(false);
                setEditForm(null);
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setEditForm(prev => ({ ...prev, [name]: value }));
            };

            const handleSave = () => {
                setGems(prev => prev.map(g => g.id === editForm.id ? editForm : g));
                setIsEditing(false);
                showToast('✓ 變更已儲存');
            };

            const handleAddGem = () => {
                if (!allowEdit) return;
                const newGem = {
                    id: Date.now().toString(),
                    name: '未命名 Gem',
                    description: '',
                    instructions: '',
                    tools: '',
                    info: ''
                };
                setGems([...gems, newGem]);
                setActiveId(newGem.id);
                setEditForm({ ...newGem });
                setIsEditing(true);
                setIsSidebarOpen(false);
            };

            const handleDelete = (id) => {
                if (gems.length <= 1) {
                    showToast('⚠️ 必須至少保留一個 Gem。');
                    return;
                }
                const newGems = gems.filter(g => g.id !== id);
                setGems(newGems);
                if (activeId === id) {
                    setActiveId(newGems[0].id);
                }
                setIsEditing(false);
                showToast('🗑️ Gem 已刪除');
            };

            const handleExportJS = () => {
                if (!allowEdit) return;
                const dataStr = `window.GEMINI_GEMS_DATA = ${JSON.stringify(gems, null, 4)};`;
                const blob = new Blob([dataStr], { type: "application/javascript", endings: "native" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "gem_collect.js";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            if (!activeGem) return <div className="p-8 text-center text-zinc-900 font-bold">系統初始化中...</div>;

            return (
                <div className="flex flex-col md:flex-row h-screen bg-[#A9A9A9] overflow-hidden relative font-sans">

                    {/* 全域提示訊息 (Toast) */}
                    {toastMessage && (
                        <div className="fixed bottom-6 right-6 z-50 bg-zinc-800 text-white px-5 py-3 rounded-lg shadow-2xl border border-zinc-700 font-bold flex items-center gap-2 animate-in slide-in-from-bottom-5 fade-in duration-300">
                            {toastMessage}
                        </div>
                    )}

                    {/* 行動版頂部導覽列 (科技深色面板) */}
                    <div className="md:hidden flex items-center justify-between p-4 bg-zinc-950 border-b border-zinc-800 shadow-lg z-30 flex-shrink-0">
                        <div className="flex flex-col">
                            <h1 className="text-lg font-black tracking-wide text-white flex items-center gap-2">
                                <Bot size={20} className="text-[#A9A9A9]" />
                                Gemini Gems
                            </h1>
                            <p className="text-[10px] text-zinc-400 tracking-widest uppercase mt-1">智慧提示詞收集盒</p>
                        </div>
                        <button onClick={() => setIsSidebarOpen(true)} className="p-2 text-zinc-300 hover:text-white hover:bg-zinc-800 rounded-md transition-colors">
                            <Menu size={24} />
                        </button>
                    </div>

                    {/* 行動版側邊欄背景遮罩 */}
                    {isSidebarOpen && (
                        <div
                            className="fixed inset-0 bg-zinc-950/60 z-40 md:hidden backdrop-blur-sm transition-opacity duration-300"
                            onClick={() => setIsSidebarOpen(false)}
                        />
                    )}

                    {/* 左側導覽列 (深色面板設計，創造立體科技感) */}
                    <div className={`fixed inset-y-0 left-0 z-50 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} md:relative md:translate-x-0 transition-transform duration-300 ease-in-out w-72 bg-zinc-950 border-r border-zinc-800 flex flex-col shadow-2xl flex-shrink-0 h-full`}>
                        <div className="p-6 md:p-8 border-b border-zinc-900 flex justify-between items-start bg-zinc-950">
                            <div>
                                <h1 className="text-xl font-black tracking-wide text-white flex items-center gap-2">
                                    <Bot size={24} className="text-[#A9A9A9]" />
                                    Gemini Gems
                                </h1>
                                <p className="text-xs text-zinc-400 tracking-widest mt-2 uppercase font-medium">收集盒管理系統</p>
                            </div>
                            <button className="md:hidden p-1 text-zinc-500 hover:text-white rounded-md transition-colors" onClick={() => setIsSidebarOpen(false)}>
                                <X size={20} />
                            </button>
                        </div>

                        <div className="flex-1 overflow-y-auto py-5">
                            <ul className="space-y-2 px-4">
                                {gems.map((gem) => (
                                    <li key={gem.id}>
                                        <button
                                            onClick={() => {
                                                setActiveId(gem.id);
                                                setIsEditing(false);
                                                setIsSidebarOpen(false);
                                            }}
                                            className={`w-full text-left px-4 py-3 rounded-lg transition-all flex items-center gap-3 ${activeId === gem.id
                                                ? 'bg-zinc-800 text-white font-bold shadow-md border-l-4 border-[#A9A9A9]'
                                                : 'text-zinc-400 hover:bg-zinc-900 hover:text-zinc-200'
                                                }`}
                                        >
                                            <Bot size={18} className={activeId === gem.id ? "text-[#A9A9A9]" : "text-zinc-500"} flex-shrink-0 />
                                            <span className="truncate text-sm">{gem.name}</span>
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* 下方控制區塊 (僅在 edit=1 時顯示) */}
                        {allowEdit && (
                            <div className="p-5 border-t border-zinc-900 space-y-3 bg-zinc-950">
                                <button
                                    onClick={handleAddGem}
                                    className="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-transparent border border-dashed border-zinc-700 rounded-lg text-zinc-400 hover:bg-zinc-900 hover:text-white hover:border-[#A9A9A9] transition-colors"
                                >
                                    <Plus size={18} />
                                    <span className="font-medium text-sm">新增 Gem</span>
                                </button>

                                <button
                                    onClick={handleExportJS}
                                    className="w-full flex items-center justify-center gap-2 py-2.5 px-4 bg-[#A9A9A9] rounded-lg text-zinc-950 hover:brightness-110 shadow-lg transition-all text-sm font-black"
                                    title="下載並覆蓋原有的 gem_collect.js"
                                >
                                    <Download size={16} />
                                    <span>儲存至 gem_collect.js</span>
                                </button>
                            </div>
                        )}
                    </div>

                    {/* 右側主要內容區 (以 #A9A9A9 為底色) */}
                    <div className="flex-1 overflow-y-auto bg-[#A9A9A9]">
                        <div className="max-w-4xl mx-auto p-5 md:p-10">

                            {!isEditing ? (
                                /* 檢視模式 */
                                <div className="transition-opacity duration-500 animate-in fade-in slide-in-from-bottom-4">
                                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                                        <div>
                                            <div className="flex items-center gap-3 mb-2">
                                                <div className="p-2.5 bg-zinc-950 border border-zinc-800 text-[#A9A9A9] rounded-xl shadow-lg">
                                                    <Bot size={28} />
                                                </div>
                                                {/* 主標題採用極深灰以對比 #A9A9A9 背景 */}
                                                <h2 className="text-3xl md:text-4xl font-black text-zinc-900 tracking-tight">{activeGem.name}</h2>
                                            </div>
                                            <p className="text-zinc-800 text-sm tracking-widest uppercase ml-16 font-bold">
                                                Gemini Prompt Collection
                                            </p>
                                        </div>
                                        {/* 編輯內容按鈕 */}
                                        {allowEdit && (
                                            <button
                                                onClick={handleEditClick}
                                                className="w-full sm:w-auto justify-center flex items-center gap-2 px-6 py-2.5 bg-zinc-950 border border-zinc-800 rounded-full text-[#A9A9A9] hover:bg-zinc-800 hover:text-white shadow-xl transition-all text-sm font-bold"
                                            >
                                                <Edit3 size={16} />
                                                編輯內容
                                            </button>
                                        )}
                                    </div>

                                    {/* 內容區塊 (深色科技面板) */}
                                    <div className="grid grid-cols-1 gap-6">
                                        {/* 區塊 1: Gem 說明 */}
                                        <div className="bg-zinc-950 p-6 md:p-8 rounded-2xl shadow-xl border border-zinc-800">
                                            <div className="flex justify-between items-center mb-5 border-b border-zinc-800 pb-3">
                                                <h3 className="text-sm font-black text-[#A9A9A9] tracking-widest uppercase flex items-center gap-2">
                                                    <FileText size={18} /> Gem 說明
                                                </h3>
                                                <button
                                                    onClick={() => handleCopyText(activeGem.description)}
                                                    className="flex items-center gap-1 text-xs text-zinc-500 hover:text-[#A9A9A9] transition-colors bg-zinc-900 hover:bg-zinc-800 px-3 py-1.5 rounded-md border border-zinc-800"
                                                    title="複製說明內容"
                                                >
                                                    <Copy size={14} /> 一鍵複製
                                                </button>
                                            </div>
                                            <p className="text-zinc-300 leading-relaxed whitespace-pre-line text-[15px]">
                                                {activeGem.description || <span className="text-zinc-600 italic">尚未填寫說明</span>}
                                            </p>
                                        </div>

                                        {/* 區塊 2: Gem 使用說明 */}
                                        <div className="bg-zinc-950 p-6 md:p-8 rounded-2xl shadow-xl border border-zinc-800">
                                            <div className="flex justify-between items-center mb-5 border-b border-zinc-800 pb-3">
                                                <h3 className="text-sm font-black text-[#A9A9A9] tracking-widest uppercase flex items-center gap-2">
                                                    <Terminal size={18} /> Gem 使用說明
                                                </h3>
                                                <button
                                                    onClick={() => handleCopyText(activeGem.instructions)}
                                                    className="flex items-center gap-1 text-xs text-zinc-500 hover:text-[#A9A9A9] transition-colors bg-zinc-900 hover:bg-zinc-800 px-3 py-1.5 rounded-md border border-zinc-800"
                                                    title="複製使用說明"
                                                >
                                                    <Copy size={14} /> 一鍵複製
                                                </button>
                                            </div>
                                            <div className="bg-zinc-900 p-5 rounded-xl border border-zinc-800 shadow-inner">
                                                {/* 調整為 leading-normal 避免換行時視覺過寬 */}
                                                <p className="text-zinc-300 leading-normal whitespace-pre-line font-mono text-sm">
                                                    {activeGem.instructions || <span className="text-zinc-600 italic">尚未填寫使用說明</span>}
                                                </p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {/* 區塊 3: Gem 預設工具 */}
                                            <div className="bg-zinc-950 p-6 md:p-8 rounded-2xl shadow-xl border border-zinc-800">
                                                <h3 className="text-sm font-black text-[#A9A9A9] tracking-widest uppercase mb-5 flex items-center gap-2 border-b border-zinc-800 pb-3">
                                                    <Wrench size={18} /> Gem 預設工具
                                                </h3>
                                                <p className="text-zinc-300 leading-relaxed whitespace-pre-line text-[15px]">
                                                    {activeGem.tools || <span className="text-zinc-600 italic">無</span>}
                                                </p>
                                            </div>

                                            {/* 區塊 4: Gem 相關資訊 */}
                                            <div className="bg-zinc-950 p-6 md:p-8 rounded-2xl shadow-xl border border-zinc-800">
                                                <h3 className="text-sm font-black text-[#A9A9A9] tracking-widest uppercase mb-5 flex items-center gap-2 border-b border-zinc-800 pb-3">
                                                    <Info size={18} /> Gem 相關資訊
                                                </h3>
                                                <div className="text-zinc-300 leading-relaxed whitespace-pre-line text-[15px]">
                                                    {renderTextWithLinks(activeGem.info)}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                /* 編輯模式 (CMS介面 - 深層科技面板) */
                                <div className="bg-zinc-950 rounded-2xl shadow-2xl border border-zinc-800 p-6 md:p-10 animate-in zoom-in-95 duration-200">
                                    <div className="flex justify-between items-center mb-8 border-b border-zinc-800 pb-5">
                                        <h2 className="text-xl md:text-2xl font-black text-white flex items-center gap-3">
                                            <Edit3 className="text-[#A9A9A9]" />
                                            編輯 Gem 屬性
                                        </h2>
                                        <button
                                            onClick={handleCancelEdit}
                                            className="p-2 text-zinc-500 hover:text-white hover:bg-zinc-800 rounded-full transition-colors"
                                        >
                                            <X size={20} />
                                        </button>
                                    </div>

                                    <div className="space-y-6">
                                        <div>
                                            <label className="block text-sm font-bold text-[#A9A9A9] mb-2 tracking-wide">Gem 名稱</label>
                                            <input
                                                type="text"
                                                name="name"
                                                value={editForm.name}
                                                onChange={handleInputChange}
                                                className="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#A9A9A9] focus:border-[#A9A9A9] transition-all text-white font-medium placeholder-zinc-600"
                                                placeholder="輸入這個 Gem 的專屬名稱..."
                                            />
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-[#A9A9A9] mb-2 tracking-wide">Gem 說明</label>
                                            <textarea
                                                name="description"
                                                value={editForm.description}
                                                onChange={handleInputChange}
                                                rows="3"
                                                className="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#A9A9A9] focus:border-[#A9A9A9] transition-all text-white leading-relaxed placeholder-zinc-600"
                                                placeholder="簡述這個 Gem 的核心功能與應用場景..."
                                            ></textarea>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-bold text-[#A9A9A9] mb-2 tracking-wide">Gem 使用說明</label>
                                            <textarea
                                                name="instructions"
                                                value={editForm.instructions}
                                                onChange={handleInputChange}
                                                rows="6"
                                                /* 一併將編輯區的行高改為 leading-normal 保持與顯示一致 */
                                                className="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#A9A9A9] focus:border-[#A9A9A9] transition-all text-white leading-normal font-mono text-sm placeholder-zinc-600"
                                                placeholder="詳細定義這個 Gem 應該如何與使用者互動、需要輸入哪些條件..."
                                            ></textarea>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <div>
                                                <label className="block text-sm font-bold text-[#A9A9A9] mb-2 tracking-wide">Gem 預設工具</label>
                                                <input
                                                    type="text"
                                                    name="tools"
                                                    value={editForm.tools}
                                                    onChange={handleInputChange}
                                                    className="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#A9A9A9] focus:border-[#A9A9A9] transition-all text-white placeholder-zinc-600"
                                                    placeholder="例如：Web Browsing, Code Execution..."
                                                />
                                            </div>

                                            <div>
                                                <label className="block text-sm font-bold text-[#A9A9A9] mb-2 tracking-wide">Gem 相關資訊</label>
                                                {/* 將單行 input 改為多行 textarea 以支援排版換行 */}
                                                <textarea
                                                    name="info"
                                                    value={editForm.info}
                                                    onChange={handleInputChange}
                                                    rows="3"
                                                    className="w-full px-4 py-3 bg-zinc-900 border border-zinc-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#A9A9A9] focus:border-[#A9A9A9] transition-all text-white leading-relaxed placeholder-zinc-600"
                                                    placeholder="補充資訊、參考連結或注意事項..."
                                                ></textarea>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-10 pt-6 border-t border-zinc-800 flex flex-col sm:flex-row justify-between items-center gap-4">
                                        <button
                                            onClick={() => handleDelete(editForm.id)}
                                            disabled={gems.length <= 1}
                                            className="w-full sm:w-auto flex items-center justify-center gap-2 px-5 py-2.5 text-red-400 hover:bg-red-950/50 rounded-xl transition-colors text-sm font-bold disabled:opacity-50 disabled:cursor-not-allowed order-2 sm:order-1"
                                        >
                                            <Trash2 size={18} />
                                            刪除此 Gem
                                        </button>

                                        <div className="w-full sm:w-auto flex flex-col sm:flex-row gap-3 order-1 sm:order-2">
                                            <button
                                                onClick={handleCancelEdit}
                                                className="w-full sm:w-auto px-7 py-2.5 bg-zinc-800 text-zinc-300 rounded-xl hover:bg-zinc-700 transition-colors font-bold text-sm text-center"
                                            >
                                                取消
                                            </button>
                                            <button
                                                onClick={handleSave}
                                                className="w-full sm:w-auto flex items-center justify-center gap-2 px-7 py-2.5 bg-[#A9A9A9] text-zinc-950 rounded-xl hover:brightness-110 shadow-lg transition-all font-black text-sm"
                                            >
                                                <Save size={18} />
                                                儲存變更
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        // 初始化與渲染
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
