            const fileInputRef = useRef(null);

            // 當前選中的簡報風格
            const activeStyle = useMemo(() => {
                return styles.find(s => s.id === activeId) || null;
            }, [styles, activeId]);

            // 自動替換變數後的提示詞輸出
            const generatedPrompt = useMemo(() => {
                if (!activeStyle) return '';
                return activeStyle.instructions
                    .replace(/\{\{THEME_TITLE\}\}/g, userTitle || '[未命名簡報主題]')
                    .replace(/\{\{TARGET_PAGES\}\}/g, userPages || '8');
            }, [activeStyle, userTitle, userPages]);

            // 1. 初始化權限狀態：網址包含 ?edit=1 則啟動編輯功能
            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                if (params.get('edit') === '1') {
                    setIsEditMode(true);
                }
            }, []);

            // 2. 資料讀取序列優先序：
            //    (1) 若處於編輯模式，先試試 LocalStorage 草稿
            //    (2) 網頁最頂層載入的 notebooklm_style.js 全域變數 window.notebookStylesData
            //    (3) fallback 的內建 13 種經典風格
            useEffect(() => {
                let initialData = null;

                const params = new URLSearchParams(window.location.search);
                const editParamActive = params.get('edit') === '1';

                if (editParamActive) {
                    const savedDraft = localStorage.getItem('notebooklm_styles_draft_local');
                    if (savedDraft) {
                        try {
                            initialData = JSON.parse(savedDraft);
                        } catch (e) {
                            console.error("解析本機草稿錯誤", e);
                        }
                    }
                }

                if (!initialData) {
                    if (typeof window.notebookStylesData !== 'undefined' && Array.isArray(window.notebookStylesData)) {
                        initialData = window.notebookStylesData;
                    } else {
                        initialData = defaultStyleDatabase;
                    }
                }

                setStyles(initialData);
                if (initialData.length > 0) {
                    setActiveId(initialData[0].id);
                }
            }, []);

            // 3. 只要風格清單有異動，且為編輯模式，同步寫入本機備份
            const updateStylesList = (newStyles) => {
                setStyles(newStyles);
                if (isEditMode) {
                    localStorage.setItem('notebooklm_styles_draft_local', JSON.stringify(newStyles));
                }
            };

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(''), 3000);
            };

            // 相容 iframe 剪貼簿複製
            const handleCopyText = (text) => {
                if (!text) return;
                try {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    const successful = document.execCommand('copy');
                    document.body.removeChild(textArea);
                    if (successful) {
                        showToast('✨ 專屬簡報風格提示詞已成功複製到剪貼簿！');
                    } else {
                        throw new Error('Copy failed');
                    }
                } catch (err) {
                    showToast('⚠️ 複製失敗，請手動圈選複製文字。');
                }
            };

            // 搜尋與標籤分類過濾
            const filteredStyles = useMemo(() => {
                return styles.filter(item => {
                    const matchesSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        item.description.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        item.applicable.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesTag = selectedTag === 'All' || item.tag === selectedTag;
                    return matchesSearch && matchesTag;
                });
            }, [styles, searchQuery, selectedTag]);

            // ==========================================
            // CRUD 核心邏輯
            // ==========================================
            const handleAdd = () => {
                const newStyle = {
                    id: 'style-' + Date.now(),
                    tag: '商務科技',
                    name: '🆕 自訂簡報風格',
                    description: '簡單敘述您的風格美學調性與適合的主題場域。',
                    applicable: '科技新創提案、季度業務進度匯報',
                    instructions: `# ==========================================\n# 自訂風格提示詞\n# ==========================================\n\n# 🛠️ 1. 簡報基本資訊\npresentation_info:\n  title: "{{THEME_TITLE}}"\n  target_pages: "{{TARGET_PAGES}}"\n\n# 🎨 2. 簡報視覺佈局約束\nvisual_constraints:\n  vibes: "請輸入視覺限制"\n\n# ✍️ 3. 內容精簡與文案規則\ncontent_rules:\n  word_count_limit_per_slide: 45\n\n# 📑 4. 簡報推進邏輯\nflow_logic:\n  sequence:\n    - "步驟 1"\n    - "步驟 2"`
                };
                const updated = [...styles, newStyle];
                updateStylesList(updated);
                setActiveId(newStyle.id);
                setEditForm({ ...newStyle });
                setIsEditing(true);
            };

            const handleEdit = () => {
                setEditForm({ ...activeStyle });
                setIsEditing(true);
            };

            const handleSave = () => {
                if (!editForm.name.trim()) {
                    showToast('⚠️ 請輸入風格名稱！');
                    return;
                }
                const updated = styles.map(s => s.id === editForm.id ? editForm : s);
                updateStylesList(updated);
                setIsEditing(false);
                showToast('💾 變更成功！請記得匯出 JS 檔覆蓋原檔案。');
            };

            const handleDelete = (id) => {
                const updated = styles.filter(s => s.id !== id);
                updateStylesList(updated);
                if (activeId === id) {
                    setActiveId(updated[0]?.id || '');
                }
                setIsEditing(false);
                showToast('🗑️ 簡報風格已順利刪除。');
            };

            // ==========================================
            // 匯出 / 匯入核心邏輯
            // ==========================================
            const handleExportJS = () => {
                // 生成含有 global 變數定義的 js 檔案內容
                const dataStr = `window.notebookStylesData = ${JSON.stringify(styles, null, 4)};`;
                const blob = new Blob([dataStr], { type: "application/javascript;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "notebooklm_style.js";
                link.click();
                URL.revokeObjectURL(url);
                showToast('📦 notebooklm_style.js 匯出成功！請將此檔覆蓋網頁目錄。');
            };

            const handleExportJSON = () => {
                // 僅備份單純的 JSON 陣列，方便分享或部分載入
                const dataStr = JSON.stringify(styles, null, 4);
                const blob = new Blob([dataStr], { type: "application/json;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "notebook_styles_backup.json";
                link.click();
                URL.revokeObjectURL(url);
                showToast('📥 JSON 備份檔案已成功下載！');
            };

            const handleImportClick = () => {
                fileInputRef.current?.click();
            };

            const handleImportFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        let content = event.target.result.trim();

                        // 處理相容：使用者如果直接上傳含有 window.notebookStylesData 的 JS 檔案
                        if (content.includes('window.notebookStylesData')) {
                            const startIndex = content.indexOf('[');
                            const endIndex = content.lastIndexOf(']');
                            if (startIndex !== -1 && endIndex !== -1) {
                                content = content.slice(startIndex, endIndex + 1);
                            }
                        }

                        const parsed = JSON.parse(content);
                        if (Array.isArray(parsed) && parsed.length > 0 && parsed[0].instructions) {
                            updateStylesList(parsed);
                            setActiveId(parsed[0].id);
                            setIsEditing(false);
                            showToast(`📥 成功匯入 ${parsed.length} 個簡報風格！`);
                        } else {
                            showToast('⚠️ 格式不合規：未偵測到正確的簡報風格陣列！');
                        }
                    } catch (err) {
                        showToast('⚠️ 檔案解析失敗：請確定為正確的 .json 或 .js 備份檔！');
                    }
                };
                reader.readAsText(file);
                // 重置 file input
                e.target.value = '';
            };

            const handleResetDefault = () => {
                if (confirm('確定要將風格資料還原為初始 13 種官方美學風格嗎？自訂風格將會遺失。')) {
                    updateStylesList(defaultStyleDatabase);
                    setActiveId(defaultStyleDatabase[0].id);
                    setIsEditing(false);
                    showToast('🔄 已重新加載官方 13 款簡報風格！');
                }
            };

            return (
                <div className="min-h-screen flex flex-col bg-slate-50/70">
                    {/* 全域提示框 */}
                    {toast && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-[100] bg-indigo-600 text-white px-8 py-4 rounded-2xl shadow-xl shadow-indigo-100 font-bold flex items-center gap-3 animate-fade-in text-base border border-indigo-500">
                            <i className="ph-fill ph-check-circle text-2xl"></i>
                            {toast}
                        </div>
                    )}

                    {/* 隱藏的檔案上傳點 */}
                    <input
                        type="file"
                        ref={fileInputRef}
                        onChange={handleImportFile}
                        accept=".js,.json"
                        className="hidden"
                    />

                    {/* 頂部維護模式橫幅：只有在網址後綴加上 ?edit=1 才會低調且富有設計感地亮起 */}
                    {isEditMode && (
                        <div className="bg-emerald-500 text-white px-6 py-2.5 flex flex-col sm:flex-row items-center justify-between text-xs sm:text-sm font-semibold tracking-wide border-b border-emerald-600 shadow-sm animate-fade-in">
                            <div className="flex items-center gap-2.5">
                                <span className="flex h-2.5 w-2.5 relative">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                                    <span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-white"></span>
                                </span>
                                <span><strong>系統維護與編輯模式已啟用</strong>：現在可任意新增、修改或刪除，變更會即時保存在本機與檔案中。</span>
                            </div>
                            <div className="flex gap-4 mt-2 sm:mt-0">
                                <button onClick={handleResetDefault} className="hover:underline flex items-center gap-1">
                                    <i className="ph-bold ph-arrow-counter-clockwise"></i> 還原官方預設
                                </button>
                                <button onClick={handleImportClick} className="hover:underline flex items-center gap-1">
                                    <i className="ph-bold ph-file-arrow-up"></i> 匯入設定檔
                                </button>
                                <button onClick={handleExportJSON} className="hover:underline flex items-center gap-1">
                                    <i className="ph-bold ph-file-arrow-down"></i> 匯出備份 (JSON)
                                </button>
                                <button onClick={handleExportJS} className="bg-white text-emerald-700 px-3 py-1 rounded-lg font-bold shadow-sm hover:bg-emerald-50 transition-colors flex items-center gap-1">
                                    <i className="ph-bold ph-export"></i> 匯出為 notebooklm_style.js
                                </button>
                            </div>
                        </div>
                    )}

                    {/* 清爽明亮的現代風導航列 */}
                    <nav className="bg-white border-b border-indigo-50 shadow-sm sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-6 py-5 flex flex-col md:flex-row items-center justify-between gap-5">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-50 rounded-2xl text-indigo-600">
                                    <i className="ph-fill ph-presentation-chart text-3xl"></i>
                                </div>
                                <div>
                                    <h1 className="font-extrabold text-slate-900 text-2xl tracking-tight flex items-center gap-2">
                                        NotebookLM 簡報風格實驗室
                                        <span className="text-xs font-semibold px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-full">
                                            v2026.1
                                        </span>
                                    </h1>
                                    <p className="text-xs text-slate-400 font-medium mt-1">
                                        為 NotebookLM 簡報生成深度優化的 YAML 美學控制面板
                                    </p>
                                </div>
                            </div>

                            {/* 年輕活潑的馬卡龍過濾器 */}
                            <div className="flex flex-wrap bg-slate-100 p-1 rounded-2xl border border-slate-200/50">
                                {['All', '活力數位', '文青質感', '商務科技', '麥肯錫高階'].map((tag) => (
                                    <button
                                        key={tag}
                                        onClick={() => setSelectedTag(tag)}
                                        className={`px-4 py-2 rounded-xl text-xs sm:text-sm font-bold transition-all ${selectedTag === tag
                                                ? 'bg-white text-indigo-600 shadow-sm'
                                                : 'text-slate-500 hover:text-slate-800'
                                            }`}
                                    >
                                        {tag === 'All' ? '全部風格' : tag}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* 主版面區塊 */}
                    <main className="flex-1 max-w-7xl w-full mx-auto px-6 py-8 flex flex-col lg:flex-row gap-8">

                        {/* 左側欄：搜尋與風格滾動卡片清單 (字體及介面全面大尺寸化) */}
                        <div className="w-full lg:w-[420px] flex flex-col gap-5 shrink-0">

                            {/* 搜尋卡 */}
                            <div className="bg-white p-5 rounded-[1.8rem] border border-indigo-50 shadow-sm flex flex-col gap-4">
                                <div className="relative">
                                    <i className="ph-bold ph-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                                    <input
                                        type="text"
                                        placeholder="搜尋簡報風格、適用主題..."
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        className="w-full pl-12 pr-4 py-3 bg-slate-50 border border-slate-200/80 rounded-xl text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all font-medium"
                                    />
                                </div>

                                <div className="flex items-center justify-between text-xs sm:text-sm text-slate-500 font-bold px-1">
                                    <span>共篩選出 {filteredStyles.length} 款設計美學</span>
                                    {isEditMode && (
                                        <button
                                            onClick={handleAdd}
                                            className="px-3.5 py-1.5 bg-indigo-50 text-indigo-600 hover:bg-indigo-600 hover:text-white rounded-xl transition-all flex items-center gap-1.5 font-extrabold text-xs"
                                        >
                                            <i className="ph-bold ph-plus-circle"></i> 新增自訂風格
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* 風格滾動清單 */}
                            <div className="bg-white/60 rounded-[2rem] border border-indigo-50 p-3 max-h-[550px] lg:max-h-[750px] overflow-y-auto space-y-2.5">
                                {filteredStyles.length === 0 ? (
                                    <div className="text-center py-16 text-slate-400">
                                        <i className="ph-fill ph-mask-happy text-5xl mb-3 opacity-35"></i>
                                        <p className="text-sm font-bold">找不到相符的風格美學</p>
                                    </div>
                                ) : (
                                    filteredStyles.map((item) => (
                                        <button
                                            key={item.id}
                                            onClick={() => { setActiveId(item.id); setIsEditing(false); }}
                                            className={`w-full text-left p-4.5 rounded-2xl transition-all flex flex-col gap-2 border-2 ${activeId === item.id && !isEditing
                                                    ? 'bg-indigo-50/50 border-indigo-400 shadow-sm translate-x-1'
                                                    : 'bg-white text-slate-600 hover:bg-indigo-50/10 border-transparent shadow-sm hover:border-slate-200/50'
                                                }`}
                                        >
                                            <div className="flex items-center justify-between w-full">
                                                <span className={`text-base font-extrabold ${activeId === item.id ? 'text-indigo-700' : 'text-slate-800'}`}>
                                                    {item.name}
                                                </span>
                                                <span className={`text-[10px] px-2.5 py-1 rounded-lg font-bold font-mono ${item.tag === '麥肯錫高階' ? 'bg-rose-50 text-rose-600' :
                                                        item.tag === '商務科技' ? 'bg-cyan-50 text-cyan-600' :
                                                            item.tag === '文青質感' ? 'bg-teal-50 text-teal-600' : 'bg-purple-50 text-purple-600'
                                                    }`}>
                                                    {item.tag}
                                                </span>
                                            </div>
                                            <p className="text-xs text-slate-500 leading-relaxed line-clamp-2">
                                                {item.description}
                                            </p>
                                        </button>
                                    ))
                                )}
                            </div>
                        </div>

                        {/* 右側欄：主展示/編輯面板 (字體全面放大以利閱讀) */}
                        <div className="flex-1 min-w-0 bg-white rounded-[2.5rem] border border-indigo-50 p-6 md:p-10 flex flex-col shadow-sm">
                            {(!activeStyle && !isEditing) ? (
                                <div className="flex-1 flex flex-col items-center justify-center text-slate-400 py-32">
                                    <i className="ph-fill ph-magic-wand text-7xl mb-4 opacity-25 text-indigo-400"></i>
                                    <p className="text-base font-bold">請從左側點選一款您要套用至 NotebookLM 的簡報風格</p>
                                </div>
                            ) : isEditing ? (
                                // --- 編輯模式介面 ---
                                <div className="h-full flex flex-col gap-6 animate-scale-up">
                                    <div className="flex items-center justify-between pb-5 border-b border-slate-100">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-2xl bg-indigo-50 text-indigo-600 flex items-center justify-center border border-indigo-100">
                                                <i className="ph-fill ph-pencil-simple text-2xl"></i>
                                            </div>
                                            <div>
                                                <h2 className="text-xl font-extrabold text-slate-800">編輯簡報風格提示詞</h2>
                                                <p className="text-xs text-slate-400 mt-1">此配置會暫存於網頁記憶體與瀏覽器快取中</p>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div>
                                            <label className="block text-xs font-extrabold text-slate-500 mb-2">🎨 風格名稱</label>
                                            <input
                                                type="text"
                                                value={editForm.name}
                                                onChange={e => setEditForm({ ...editForm, name: e.target.value })}
                                                placeholder="例: 💥 新創能量風格"
                                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-extrabold text-slate-500 mb-2">🏷️ 分類標籤</label>
                                            <select
                                                value={editForm.tag}
                                                onChange={e => setEditForm({ ...editForm, tag: e.target.value })}
                                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-200"
                                            >
                                                <option value="活力數位">活力數位</option>
                                                <option value="文青質感">文青質感</option>
                                                <option value="商務科技">商務科技</option>
                                                <option value="麥肯錫高階">麥肯錫高階</option>
                                            </select>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-extrabold text-slate-500 mb-2">📝 視覺細節簡介</label>
                                            <input
                                                type="text"
                                                value={editForm.description}
                                                onChange={e => setEditForm({ ...editForm, description: e.target.value })}
                                                placeholder="一句話描述該美學特徵..."
                                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 focus:outline-none"
                                            />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="block text-xs font-extrabold text-slate-500 mb-2">🎯 適用報告類型 (以頓號隔開)</label>
                                            <input
                                                type="text"
                                                value={editForm.applicable}
                                                onChange={e => setEditForm({ ...editForm, applicable: e.target.value })}
                                                placeholder="例如: 行銷企劃、產品發表"
                                                className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-700 focus:outline-none"
                                            />
                                        </div>
                                    </div>

                                    <div className="flex-1 flex flex-col min-h-[300px]">
                                        <div className="flex justify-between items-center mb-2">
                                            <label className="text-xs font-extrabold text-slate-500 flex items-center gap-1">
                                                <i className="ph-bold ph-terminal-window text-indigo-500"></i>
                                                NotebookLM YAML 提示詞原始碼
                                            </label>
                                            <span className="text-[11px] text-indigo-600 font-bold bg-indigo-50 px-2 py-0.5 rounded-md">
                                                支援變數: {"{{THEME_TITLE}}"} 與 {"{{TARGET_PAGES}}"}
                                            </span>
                                        </div>
                                        <textarea
                                            value={editForm.instructions}
                                            onChange={e => setEditForm({ ...editForm, instructions: e.target.value })}
                                            placeholder="請輸入完整的 NotebookLM 控制指令內容..."
                                            className="w-full flex-1 p-5 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-mono text-slate-700 leading-relaxed focus:outline-none focus:ring-2 focus:ring-indigo-100 resize-none overflow-y-auto"
                                        ></textarea>
                                    </div>

                                    <div className="pt-5 border-t border-slate-100 flex justify-between items-center">
                                        <button
                                            onClick={() => handleDelete(editForm.id)}
                                            className="px-4.5 py-2.5 bg-rose-50 hover:bg-rose-600 text-rose-600 hover:text-white rounded-xl text-xs sm:text-sm font-bold transition-all flex items-center gap-1.5"
                                        >
                                            <i className="ph-bold ph-trash"></i> 刪除此風格
                                        </button>
                                        <div className="flex gap-3">
                                            <button
                                                onClick={() => setIsEditing(false)}
                                                className="px-6 py-2.5 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 text-xs sm:text-sm font-bold transition-colors"
                                            >
                                                取消
                                            </button>
                                            <button
                                                onClick={handleSave}
                                                className="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs sm:text-sm font-bold transition-colors shadow-md shadow-indigo-100 flex items-center gap-1.5"
                                            >
                                                <i className="ph-bold ph-floppy-disk"></i> 暫存修改
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                // --- 檢視模式與即時客製化面板 ---
                                <div className="h-full flex flex-col animate-scale-up gap-6">

                                    {/* 頂部風格資料與編輯開關 */}
                                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pb-5 border-b border-slate-100">
                                        <div>
                                            <div className="flex items-center gap-3">
                                                <h2 className="text-2xl sm:text-3xl font-black text-slate-900 leading-tight">
                                                    {activeStyle.name}
                                                </h2>
                                                <span className="text-xs px-3 py-1 rounded-full bg-indigo-50 border border-indigo-100 text-indigo-600 font-extrabold whitespace-nowrap">
                                                    {activeStyle.tag}
                                                </span>
                                            </div>
                                            <p className="text-sm sm:text-base text-slate-500 mt-2 font-medium">
                                                {activeStyle.description}
                                            </p>
                                        </div>

                                        {isEditMode && (
                                            <button
                                                onClick={handleEdit}
                                                className="px-4 py-2.5 bg-slate-100 text-slate-600 hover:bg-indigo-600 hover:text-white rounded-xl text-xs sm:text-sm font-bold transition-all flex items-center gap-1.5 self-start whitespace-nowrap"
                                            >
                                                <i className="ph-fill ph-pencil-simple text-base"></i> 編輯風格設定
                                            </button>
                                        )}
                                    </div>

                                    {/* 適合對象小標籤 */}
                                    <div className="flex flex-wrap items-center gap-2 text-sm">
                                        <span className="text-slate-400 font-bold mr-1 flex items-center gap-1">
                                            <i className="ph-bold ph-crosshair text-indigo-500"></i> 適合報告場景:
                                        </span>
                                        {activeStyle.applicable.split('、').map((app, idx) => (
                                            <span key={idx} className="bg-slate-100 text-slate-600 px-3.5 py-1.5 rounded-xl text-xs sm:text-sm font-bold border border-slate-200/50">
                                                {app}
                                            </span>
                                        ))}
                                    </div>

                                    {/* 即時注入變數客製盒 (清爽卡片設計) */}
                                    <div className="bg-indigo-50/20 rounded-[1.8rem] border border-indigo-100/60 p-6 grid grid-cols-1 md:grid-cols-3 gap-5 shadow-inner">
                                        <div className="md:col-span-2">
                                            <label className="block text-xs sm:text-sm font-extrabold text-slate-600 mb-2 flex items-center gap-1.5">
                                                <i className="ph-bold ph-cursor-text text-indigo-500"></i> 1. 請填入您的簡報主題
                                            </label>
                                            <input
                                                type="text"
                                                value={userTitle}
                                                onChange={(e) => setUserTitle(e.target.value)}
                                                placeholder="例如: 2026年永續發展計畫藍圖"
                                                className="w-full px-4.5 py-3 bg-white border border-indigo-100 rounded-xl text-sm font-bold text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all shadow-sm"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs sm:text-sm font-extrabold text-slate-600 mb-2 flex items-center gap-1.5">
                                                <i className="ph-bold ph-copy-simple text-indigo-500"></i> 2. 預計生成頁數
                                            </label>
                                            <input
                                                type="number"
                                                value={userPages}
                                                onChange={(e) => setUserPages(e.target.value)}
                                                min="1"
                                                max="40"
                                                className="w-full px-4 py-3 bg-white border border-indigo-100 rounded-xl text-sm font-bold font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-500 transition-all shadow-sm"
                                            />
                                        </div>
                                    </div>

                                    {/* 生成的 YAML 預覽輸出區 (加大字體，亮色排版極具細節) */}
                                    <div className="flex-1 flex flex-col bg-slate-50 border border-indigo-50 rounded-3xl overflow-hidden relative group shadow-inner">
                                        <div className="bg-indigo-50/40 px-5 sm:px-6 py-4 flex items-center justify-between border-b border-indigo-100">
                                            <span className="text-xs sm:text-sm font-extrabold text-slate-600 flex items-center gap-2">
                                                <span className="h-2.5 w-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
                                                客製化後的 NotebookLM 格式提示詞
                                            </span>
                                            <button
                                                onClick={() => handleCopyText(generatedPrompt)}
                                                className="px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl shadow-md hover:shadow-indigo-200/50 font-extrabold text-xs sm:text-sm flex items-center gap-2 transition-all"
                                            >
                                                <i className="ph-bold ph-copy text-base"></i> 一鍵複製提示詞
                                            </button>
                                        </div>

                                        {/* 大字體、高閱讀舒適性之提示碼預覽區 */}
                                        <div className="flex-1 p-6 font-mono text-sm sm:text-base text-slate-700 leading-relaxed overflow-y-auto whitespace-pre-wrap max-h-[380px] bg-white">
                                            {generatedPrompt}
                                        </div>
                                    </div>

                                    {/* 年輕化小插圖風格步驟引導 */}
                                    <div className="p-5 bg-gradient-to-br from-indigo-50/40 to-purple-50/40 rounded-[1.8rem] border border-indigo-100/50">
                                        <h4 className="text-sm font-black text-indigo-900 mb-2.5 flex items-center gap-2">
                                            <i className="ph-bold ph-rocket-launch text-lg text-indigo-500"></i>
                                            如何套用至 NotebookLM？
                                        </h4>
                                        <ol className="list-decimal list-inside text-xs sm:text-sm text-slate-600 space-y-1.5 leading-relaxed font-medium">
                                            <li>點擊上方 <strong className="text-indigo-600">「一鍵複製風格提示詞」</strong>。</li>
                                            <li>開啟您在 NotebookLM 的筆記，點擊「簡報生成」選項右方的 <strong>✏️ (編輯) 鉛筆符號</strong>。</li>
                                            <li>在彈出的 <strong>「說明欄 (Instructions)」</strong> 中直接貼上此提示詞，立刻生成高美學簡報！</li>
                                        </ol>
                                    </div>

                                </div>
                            )}
                        </div>
                    </main>

                    {/* 清爽頁尾 */}
                    <footer className="text-center text-slate-400 text-xs sm:text-sm py-8 mt-auto border-t border-indigo-50">
                        NotebookLM Prompt Box &copy; 2026. Made for Presentation Designers and AI Copilots.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
