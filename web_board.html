<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧電子白板 - Smart Whiteboard</title>
    <!-- Tailwind CSS 適用於現代化 UI 設計 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fabric.js 用於強大的向量畫布與物件操作 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <style>
        body {
            overflow: hidden;
            user-select: none;
            background-color: #1e1e1e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* 隱藏 Fabric.js 產生的外層容器框線 */
        .canvas-container {
            margin: 0 auto;
            position: absolute !important;
            top: 0;
            left: 0;
        }

        /* 放大鏡鏡片樣式 */
        #magnifier-lens {
            position: absolute;
            border: 4px solid #4b5563;
            border-radius: 50%;
            cursor: none;
            width: 180px;
            height: 180px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            display: none;
            z-index: 50;
            overflow: hidden;
            background-color: white;
        }

        #magnifier-canvas {
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 聚光燈遮罩樣式 */
        #spotlight-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 40;
            display: none;
        }

        /* 自訂滾動條 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        /* 載入中動畫 */
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="relative w-screen h-screen overflow-hidden">

    <!-- 主畫布 -->
    <canvas id="whiteboard"></canvas>

    <!-- 局部放大鏡視窗 -->
    <div id="magnifier-lens">
        <canvas id="magnifier-canvas" width="180" height="180"></canvas>
    </div>

    <!-- 聚光燈遮罩 Canvas -->
    <canvas id="spotlight-overlay"></canvas>

    <!-- 頂部狀態與操作面板 -->
    <header id="top-header"
        class="absolute top-4 left-1/2 transform -translate-x-1/2 z-30 flex items-center gap-3 px-4 py-2 bg-slate-900/90 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-700/50 text-white transition-all duration-300 translate-y-0 opacity-100">
        <div class="flex items-center gap-2 pr-3 border-r border-slate-700">
            <span class="w-3 h-3 rounded-full bg-emerald-500 animate-pulse"></span>
            <span class="text-xs font-semibold tracking-wider text-slate-300">智慧電子白板 v2.0</span>
        </div>

        <!-- 功能狀態看板 (HUD Badge) -->
        <div class="flex items-center gap-2 px-3 py-1 bg-blue-950/80 border border-blue-500/30 rounded-xl shadow-inner">
            <span class="text-[10px] font-bold text-blue-400 tracking-wider whitespace-nowrap">目前功能</span>
            <span id="current-mode-badge" class="text-xs font-extrabold text-white tracking-wide whitespace-nowrap">✏️
                自由手繪筆記</span>
        </div>

        <div class="h-6 w-px bg-slate-700"></div>

        <!-- 復原 / 重做 -->
        <div class="flex items-center gap-1">
            <button id="btn-undo"
                class="p-2 hover:bg-slate-800 rounded-lg text-slate-300 hover:text-white transition disabled:opacity-40"
                title="復原 (Ctrl+Z)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"></path>
                </svg>
            </button>
            <button id="btn-redo"
                class="p-2 hover:bg-slate-800 rounded-lg text-slate-300 hover:text-white transition disabled:opacity-40"
                title="重做 (Ctrl+Y)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 10H11a8 8 0 00-8 8v2m18-10l-6 6m6-6l-6-6"></path>
                </svg>
            </button>
            <button id="btn-clear" class="p-2 hover:bg-red-950 hover:text-red-400 rounded-lg text-slate-300 transition"
                title="清空全部">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                    </path>
                </svg>
            </button>
        </div>

        <div class="h-6 w-px bg-slate-700"></div>

        <!-- 教學場景切換 -->
        <div class="flex items-center gap-1.5" id="bg-selector">
            <button data-bg="white"
                class="w-7 h-7 rounded-full border-2 border-slate-300 bg-white shadow-inner transform hover:scale-110 transition cursor-pointer"
                title="純白白板"></button>
            <button data-bg="green"
                class="w-7 h-7 rounded-full border-2 border-slate-600 bg-[#1E3F20] shadow-inner transform hover:scale-110 transition cursor-pointer"
                title="經典綠板"></button>
            <button data-bg="sepia"
                class="w-7 h-7 rounded-full border-2 border-slate-400 bg-[#F4EAD4] shadow-inner transform hover:scale-110 transition cursor-pointer"
                title="復原護眼黃"></button>
        </div>

        <div class="h-6 w-px bg-slate-700"></div>

        <!-- 檔案操作 -->
        <div class="flex items-center gap-2">
            <!-- 匯入圖片 -->
            <button id="btn-import"
                class="flex items-center gap-1.5 px-3 py-1.5 bg-indigo-600 hover:bg-indigo-500 text-xs font-semibold rounded-lg shadow-md transition"
                title="匯入本機圖檔 (支援拖曳)">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z">
                    </path>
                </svg>
                <span>匯入圖片</span>
            </button>
            <input type="file" id="file-input" accept="image/*" class="hidden">

            <!-- 匯出快照 -->
            <button id="btn-snapshot"
                class="flex items-center gap-1.5 px-3 py-1.5 bg-emerald-600 hover:bg-emerald-500 text-xs font-semibold rounded-lg shadow-md transition"
                title="儲存當前畫面至本機">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4">
                    </path>
                </svg>
                <span>快照存檔</span>
            </button>

            <!-- 全螢幕功能 -->
            <button id="btn-fullscreen"
                class="flex items-center gap-1.5 px-3 py-1.5 bg-slate-700 hover:bg-slate-600 text-xs font-semibold rounded-lg shadow-md transition"
                title="切換全螢幕 (F)">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path id="fs-icon-path" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4" />
                </svg>
                <span id="fs-text">全螢幕</span>
            </button>
        </div>
    </header>

    <!-- 側邊浮動工具列控制按鈕 (細緻半透明) -->
    <button id="btn-toggle-ui"
        class="absolute right-4 top-1/2 transform -translate-y-1/2 z-40 p-2.5 bg-slate-900/60 backdrop-blur-sm text-slate-300 hover:text-white rounded-full shadow-lg border border-slate-700/30 hover:bg-slate-800/80 hover:scale-110 transition duration-300 focus:outline-none"
        title="顯示/隱藏所有工具列 (H)">
        <svg id="ui-toggle-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
        </svg>
    </button>

    <!-- 【新增】文字格式控制面板 (文字模式或點選文字物件時自動顯示) -->
    <div id="text-control-panel"
        class="hidden absolute bottom-24 left-1/2 transform -translate-x-1/2 z-30 flex items-center gap-3 px-4 py-2 bg-slate-900/95 backdrop-blur-md rounded-xl shadow-2xl border border-slate-700/50 text-white transition-all duration-300">
        <!-- 字體選擇 -->
        <div class="flex items-center gap-1.5">
            <span class="text-xs font-semibold text-slate-400">字體:</span>
            <select id="text-font-family"
                class="bg-slate-950 border border-slate-700 rounded-lg px-2 py-1 text-xs text-slate-200 focus:outline-none focus:border-blue-500 cursor-pointer">
                <option value="微軟正黑體" style="font-family: '微軟正黑體';">微軟正黑體</option>
                <option value="DFKai-SB" style="font-family: 'DFKai-SB', '標楷體';">標楷體</option>
                <option value="PMingLiU" style="font-family: 'PMingLiU', '新細明體';">新細明體</option>
                <option value="Arial" style="font-family: 'Arial';">Arial</option>
                <option value="Times New Roman" style="font-family: 'Times New Roman';">Times New Roman</option>
                <option value="Courier New" style="font-family: 'Courier New';">等寬體</option>
            </select>
        </div>

        <div class="h-4 w-px bg-slate-700"></div>

        <!-- 書寫方向 -->
        <div class="flex items-center gap-1.5">
            <span class="text-xs font-semibold text-slate-400">方向:</span>
            <div class="flex bg-slate-950 p-0.5 rounded-lg border border-slate-700">
                <button id="btn-text-dir-horiz"
                    class="px-2 py-1 rounded-md text-xs font-semibold bg-blue-600 text-white transition"
                    title="橫書排版">橫書</button>
                <button id="btn-text-dir-vert"
                    class="px-2 py-1 rounded-md text-xs font-semibold hover:bg-slate-800 text-slate-400 transition"
                    title="直書排版">直書</button>
            </div>
        </div>

        <div class="h-4 w-px bg-slate-700"></div>

        <!-- 字型大小控制 -->
        <div class="flex items-center gap-1.5">
            <span class="text-xs font-semibold text-slate-400">大小:</span>
            <input type="number" id="text-font-size" min="12" max="120" value="28"
                class="w-14 bg-slate-950 border border-slate-700 rounded-lg px-2 py-1 text-xs text-slate-200 focus:outline-none text-center">
            <span class="text-[10px] text-slate-500">pt</span>
        </div>
    </div>

    <!-- 懸浮主功能工具列 (底部居中) -->
    <nav id="bottom-nav"
        class="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-30 flex items-center gap-2 p-2 bg-slate-900/90 backdrop-blur-md rounded-2xl shadow-2xl border border-slate-700/50 text-white transition-all duration-300 translate-y-0 opacity-100">
        <!-- 選擇/拖曳工具 -->
        <button id="tool-select"
            class="tool-btn p-3 rounded-xl hover:bg-slate-800 text-slate-300 transition-all duration-200"
            title="選擇與編輯物件 (S)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-1.5H5.25a2.25 2.25 0 00-2.25 2.25v10.5a2.25 2.25 0 002.25 2.25h10.5a2.25 2.25 0 002.25-2.25V11.5">
                </path>
            </svg>
        </button>

        <!-- 自由塗鴉 -->
        <button id="tool-draw"
            class="tool-btn p-3 rounded-xl hover:bg-slate-800 text-slate-300 transition-all duration-200"
            title="自由手繪筆記 (D)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-1.5H5.25a2.25 2.25 0 00-2.25 2.25v10.5a2.25 2.25 0 002.25 2.25h10.5a2.25 2.25 0 002.25-2.25V11.5M9 15.5l.008-.008M12 12l3 3m-3.5-3.5L19 4">
                </path>
            </svg>
        </button>

        <!-- 智慧手繪形狀修正 (Magic Pen) -->
        <button id="tool-magic"
            class="tool-btn p-3 rounded-xl hover:bg-slate-800 text-slate-300 transition-all duration-200 relative"
            title="智慧幾何圖形校正筆 (M)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9.813 15.904L9 21l5.096-.813a2 2 0 001.414-.586l4.904-4.904a2 2 0 000-2.828l-1.414-1.414a2 2 0 00-2.828 0l-4.904 4.904a2 2 0 00-.586 1.414zM17 14l-3-3m-6 6h.01">
                </path>
            </svg>
            <span class="absolute top-1 right-1 w-2 h-2 rounded-full bg-indigo-500 animate-ping"></span>
        </button>

        <!-- 幾何形狀面板觸發器 -->
        <div class="relative">
            <button id="tool-shape"
                class="tool-btn p-3 rounded-xl hover:bg-slate-800 text-slate-300 transition-all duration-200"
                title="選擇幾何圖形 (G)">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 5a1 1 0 011-1h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5z"></path>
                </svg>
            </button>
            <!-- 幾何圖形彈出選單 -->
            <div id="shape-dropdown"
                class="hidden absolute bottom-16 left-1/2 transform -translate-x-1/2 flex-col bg-slate-950 border border-slate-700 rounded-xl p-2 shadow-xl gap-2 z-50 min-w-[130px]">
                <button data-shape="line"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <span class="w-4 h-0.5 bg-white block"></span> 直線
                </button>
                <button data-shape="line-dashed"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <span class="w-4 h-0.5 border-t-2 border-dashed border-white block"></span> 虛線
                </button>
                <button data-shape="arrow"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 8l4 4m0 0l-4 4m4-4H3"></path>
                    </svg> 箭頭
                </button>
                <button data-shape="rect"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <span class="w-4 h-3 border-2 border-white rounded-sm block"></span> 矩形
                </button>
                <button data-shape="circle"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <span class="w-4 h-4 border-2 border-white rounded-full block"></span> 圓形
                </button>
                <button data-shape="triangle"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4l9 16H3L12 4z">
                        </path>
                    </svg> 三角形
                </button>
                <button data-shape="parallelogram"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18l4-12h8l-4 12z">
                        </path>
                    </svg> 平行四邊形
                </button>
                <button data-shape="trapezoid"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18l3-12h6l3 12z">
                        </path>
                    </svg> 梯形
                </button>
                <button data-shape="arc"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 15a8 8 0 0112-6.9">
                        </path>
                    </svg> 圓弧
                </button>
                <button data-shape="sector"
                    class="shape-opt-btn flex items-center gap-2 px-3 py-1.5 hover:bg-slate-800 rounded-lg text-xs text-slate-200 transition text-left">
                    <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 12L4 12 A 8 8 0 0 1 12 4 Z"></path>
                    </svg> 扇形
                </button>
            </div>
        </div>

        <!-- 打字輸入工具 (Text Tool) -->
        <button id="tool-text"
            class="tool-btn p-3 rounded-xl hover:bg-slate-800 text-slate-300 transition-all duration-200"
            title="打字輸入工具 (中英文輸入法) (T)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M12 6v14M9 20h6"></path>
            </svg>
        </button>

        <!-- 橡皮擦 -->
        <button id="tool-eraser"
            class="tool-btn p-3 rounded-xl hover:bg-slate-800 text-slate-300 transition-all duration-200"
            title="擦除物件 (E)">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                </path>
            </svg>
        </button>

        <div class="h-8 w-px bg-slate-700"></div>

        <!-- 光學輔助工具 (雷射筆、放大鏡、聚光燈) -->
        <div class="flex items-center gap-1 bg-slate-950 p-1 rounded-xl border border-slate-800">
            <button id="tool-laser"
                class="aux-btn p-2 rounded-lg hover:bg-slate-800 text-slate-400 transition-all duration-200"
                title="簡報雷射筆">
                <span class="relative flex h-5 w-5 justify-center items-center">
                    <span
                        class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-600"></span>
                </span>
            </button>
            <button id="tool-magnify"
                class="aux-btn p-2 rounded-lg hover:bg-slate-800 text-slate-400 transition-all duration-200"
                title="區域放大鏡">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"></path>
                </svg>
            </button>
            <button id="tool-spotlight"
                class="aux-btn p-2 rounded-lg hover:bg-slate-800 text-slate-400 transition-all duration-200"
                title="聚光燈模式">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 113.536 0V21h2v-5.464M12 7V5">
                    </path>
                </svg>
            </button>
        </div>

        <div class="h-8 w-px bg-slate-700"></div>

        <!-- 畫筆調色盤與粗細設定 -->
        <div class="flex items-center gap-3 px-2">
            <!-- 快速顏色切換 -->
            <div class="flex items-center gap-1">
                <button
                    class="color-swatch w-5 h-5 rounded-full bg-white border border-slate-600 active-swatch ring-2 ring-blue-500"
                    data-color="#FFFFFF"></button>
                <button class="color-swatch w-5 h-5 rounded-full bg-[#1e293b] border border-slate-600"
                    data-color="#1e293b"></button>
                <button class="color-swatch w-5 h-5 rounded-full bg-red-500" data-color="#ef4444"></button>
                <button class="color-swatch w-5 h-5 rounded-full bg-blue-500" data-color="#3b82f6"></button>
                <button class="color-swatch w-5 h-5 rounded-full bg-yellow-400" data-color="#facc15"></button>
                <!-- 自訂色彩選擇 -->
                <div
                    class="relative w-5 h-5 rounded-full overflow-hidden border border-slate-600 bg-gradient-to-tr from-pink-500 via-red-500 to-yellow-500">
                    <input type="color" id="custom-color"
                        class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                </div>
            </div>

            <!-- 畫筆粗細控制 -->
            <div class="flex items-center gap-2">
                <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7">
                    </path>
                </svg>
                <input type="range" id="brush-width" min="1" max="50" value="5"
                    class="w-20 accent-blue-500 cursor-pointer">
                <span id="brush-val" class="text-xs font-mono text-slate-400 w-6 text-right">5px</span>
            </div>
        </div>
    </nav>

    <!-- 自訂輕量化吐司通知提示 -->
    <div id="toast-container" class="fixed top-20 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        // =========================================================================
        // 1. 全域變數與歷史紀錄堆疊
        // =========================================================================
        let canvas;
        let isRedoing = false;
        const stateHistory = [];
        let historyIndex = -1;
        const maxHistory = 30;

        // 當前模式與工具狀態
        let currentMode = 'draw';
        let selectedShape = 'line';
        let brushColor = '#FFFFFF';
        let brushWidth = 5;
        let backgroundColor = '#FFFFFF';

        // 特效與手繪臨時狀態
        let laserTimer = null;
        let laserPoints = [];
        let isDrawingShape = false;
        let activeShapeObj = null;
        let shapeStartX, shapeStartY;

        // 文字排列方向：'horizontal' (橫書) 或 'vertical' (直書)
        let currentTextDirection = 'horizontal';

        // UI 工具列顯示狀態
        let isUiHidden = false;

        // =========================================================================
        // 2. 基礎輔助工具函數與核心控制器 (優先宣告)
        // =========================================================================

        // 更新當前激活顏色及調色盤邊框回饋
        function updateActiveColor(color) {
            brushColor = color;
            if (canvas && canvas.freeDrawingBrush) {
                canvas.freeDrawingBrush.color = brushColor;
            }
            const customIndicator = document.getElementById('custom-color');
            if (customIndicator && customIndicator.parentElement) {
                customIndicator.parentElement.style.borderColor = color;
            }
        }

        // 動態中文功能對照名稱
        function getModeDisplayName(mode) {
            const shapeNames = {
                'line': '直線',
                'line-dashed': '虛線',
                'arrow': '箭頭',
                'rect': '矩形',
                'circle': '圓形',
                'triangle': '三角形',
                'parallelogram': '平行四邊形',
                'trapezoid': '梯形',
                'arc': '圓弧',
                'sector': '扇形'
            };
            switch (mode) {
                case 'select': return "🎯 物件選取與拖曳";
                case 'draw': return "✏️ 自由手繪筆記";
                case 'magic': return "🪄 智慧幾何校正筆";
                case 'shape': return `📐 幾何圖形 (${shapeNames[selectedShape] || '圖形'})`;
                case 'text': return "⌨️ 打字輸入模式";
                case 'eraser': return "🧹 橡皮擦 (點擊擦除)";
                case 'laser': return "🔴 簡報高亮雷射筆";
                case 'magnifier': return "🔎 區域局部放大鏡";
                case 'spotlight': return "💡 教學焦點聚光燈";
                default: return "未知模式";
            }
        }

        // 獲取與模式對應的 DOM 按鈕
        function getButtonByMode(mode) {
            switch (mode) {
                case 'select': return document.getElementById('tool-select');
                case 'draw': return document.getElementById('tool-draw');
                case 'magic': return document.getElementById('tool-magic');
                case 'shape': return document.getElementById('tool-shape');
                case 'text': return document.getElementById('tool-text');
                case 'eraser': return document.getElementById('tool-eraser');
                case 'laser': return document.getElementById('tool-laser');
                case 'magnifier': return document.getElementById('tool-magnify');
                case 'spotlight': return document.getElementById('tool-spotlight');
                default: return null;
            }
        }

        // 輕量化通知組件
        function showToast(message) {
            const container = document.getElementById('toast-container');
            if (!container) return;
            const toast = document.createElement('div');
            toast.className = "flex items-center gap-2.5 px-4 py-3 bg-slate-900/95 border border-slate-700/60 text-slate-200 text-xs font-medium rounded-xl shadow-xl transform translate-x-12 opacity-0 transition-all duration-300";
            toast.innerHTML = `
                <svg class="w-4 h-4 text-blue-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span>${message}</span>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-x-12', 'opacity-0');
            }, 50);

            setTimeout(() => {
                toast.classList.add('translate-x-12', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // 解構並標準化鼠標與觸控事件的座標資訊
        function getEventCoords(e) {
            let clientX = window.innerWidth / 2;
            let clientY = window.innerHeight / 2;
            if (e) {
                if (e.clientX !== undefined && e.clientX !== 0) {
                    clientX = e.clientX;
                    clientY = e.clientY;
                } else if (e.touches && e.touches[0]) {
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                } else if (e.pointerX !== undefined) {
                    clientX = e.pointerX;
                    clientY = e.pointerY;
                }
            }
            return { clientX, clientY };
        }

        // 關閉雷射筆、放大鏡、聚光燈的額外視窗覆蓋
        function disableSpecialVisualModes() {
            const lens = document.getElementById('magnifier-lens');
            const spotlight = document.getElementById('spotlight-overlay');
            if (lens) lens.style.display = 'none';
            if (spotlight) spotlight.style.display = 'none';
            if (laserTimer) {
                clearInterval(laserTimer);
                laserTimer = null;
            }
            laserPoints = [];
            if (canvas) {
                canvas.getObjects().forEach(obj => {
                    if (obj.id === 'laser-line' || obj.id === 'laser-dot') {
                        canvas.remove(obj);
                    }
                });
                canvas.renderAll();
            }
        }

        // 顯示文字屬性控制面板
        function showTextControlPanel(obj) {
            const panel = document.getElementById('text-control-panel');
            if (!panel) return;

            panel.classList.remove('hidden');

            if (obj) {
                // 如果有選取特定文字，將面板控制項的值與物件同步
                document.getElementById('text-font-family').value = obj.fontFamily || '微軟正黑體';
                document.getElementById('text-font-size').value = obj.fontSize || 28;

                const dir = obj.splitByGrapheme ? 'vertical' : 'horizontal';
                updateTextDirectionUI(dir);
            }
        }

        // 隱藏文字屬性控制面板
        function hideTextControlPanel() {
            const panel = document.getElementById('text-control-panel');
            if (panel) {
                panel.classList.add('hidden');
            }
        }

        // 更新文字排列方向按鈕樣式
        function updateTextDirectionUI(dir) {
            const horizBtn = document.getElementById('btn-text-dir-horiz');
            const vertBtn = document.getElementById('btn-text-dir-vert');
            if (!horizBtn || !vertBtn) return;

            if (dir === 'horizontal') {
                horizBtn.className = "px-2 py-1 rounded-md text-xs font-semibold bg-blue-600 text-white transition";
                vertBtn.className = "px-2 py-1 rounded-md text-xs font-semibold hover:bg-slate-800 text-slate-400 transition";
            } else {
                vertBtn.className = "px-2 py-1 rounded-md text-xs font-semibold bg-blue-600 text-white transition";
                horizBtn.className = "px-2 py-1 rounded-md text-xs font-semibold hover:bg-slate-800 text-slate-400 transition";
            }
        }

        // 工具模式調配中心
        function setMode(mode) {
            currentMode = mode;
            disableSpecialVisualModes();

            if (!canvas) return;

            canvas.isDrawingMode = false;
            canvas.selection = true;
            canvas.defaultCursor = 'default';

            document.querySelectorAll('.tool-btn, .aux-btn').forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'scale-110', 'shadow-lg', 'ring-2', 'ring-blue-400/50', 'border-transparent');
                btn.classList.add('text-slate-300', 'hover:bg-slate-800');
            });

            const badge = document.getElementById('current-mode-badge');
            if (badge) badge.innerText = getModeDisplayName(mode);

            const activeBtn = getButtonByMode(mode);
            if (activeBtn) {
                activeBtn.classList.remove('text-slate-300', 'hover:bg-slate-800');
                activeBtn.classList.add('bg-blue-600', 'text-white', 'scale-110', 'shadow-lg', 'ring-2', 'ring-blue-400/50', 'border-transparent');
            }

            canvas.discardActiveObject();
            if (mode === 'select') {
                canvas.isDrawingMode = false;
                canvas.selection = true;
                canvas.skipTargetFind = false;
                canvas.getObjects().forEach(obj => {
                    if (obj.id !== 'laser-dot' && obj.id !== 'laser-line') {
                        obj.set({ selectable: true, evented: true });
                    }
                });
            } else if (mode === 'text') {
                // 打字模式
                canvas.isDrawingMode = false;
                canvas.selection = false;
                canvas.skipTargetFind = false;
                canvas.defaultCursor = 'text';
                canvas.getObjects().forEach(obj => {
                    if (obj.type === 'textbox' || obj.type === 'i-text') {
                        obj.set({ selectable: true, evented: true });
                    } else {
                        obj.set({ selectable: false, evented: false });
                    }
                });
            } else {
                canvas.isDrawingMode = (mode === 'draw' || mode === 'magic');
                canvas.selection = false;

                if (mode === 'eraser') {
                    canvas.skipTargetFind = false;
                    canvas.getObjects().forEach(obj => {
                        obj.set({ selectable: false, evented: true });
                    });
                } else {
                    canvas.skipTargetFind = true;
                    canvas.getObjects().forEach(obj => {
                        obj.set({ selectable: false });
                    });
                }
            }

            if (mode === 'magnifier') {
                const lens = document.getElementById('magnifier-lens');
                if (lens) lens.style.display = 'block';
                canvas.defaultCursor = 'none';
                renderMagnifier(null);
            } else if (mode === 'spotlight') {
                const spotlight = document.getElementById('spotlight-overlay');
                if (spotlight) spotlight.style.display = 'block';
                canvas.defaultCursor = 'none';
                initSpotlightCanvas();
            }

            if (mode === 'text') {
                showToast("打字模式：在畫布空白處點擊即可開始打字，或點擊已有文字進行修改。");
                showTextControlPanel(null); // 以當前預設設定開啟控制面板
            } else {
                // 若離開文字模式且未選取任何文字物件，則隱藏面板
                const activeObj = canvas.getActiveObject();
                if (!activeObj || (activeObj.type !== 'textbox' && activeObj.type !== 'i-text')) {
                    hideTextControlPanel();
                }
            }

            canvas.renderAll();
        }

        // =========================================================================
        // 3. 頁面生命週期與初始化
        // =========================================================================
        window.onload = function () {
            initCanvas();
            initEventHandlers();
            setupBackground('white');
            saveState(); // 初始狀態
            setMode('draw'); // 設為預設模式
            showToast("智慧電子白板已準備就緒，您可以開始書寫。");
        };

        // 3.1 初始化 Fabric 畫布
        function initCanvas() {
            const canvasEl = document.getElementById('whiteboard');
            canvasEl.width = window.innerWidth;
            canvasEl.height = window.innerHeight;

            canvas = new fabric.Canvas('whiteboard', {
                width: window.innerWidth,
                height: window.innerHeight,
                isDrawingMode: true,
                selection: true,
                preserveObjectStacking: true
            });

            // 設定預設畫筆參數
            canvas.freeDrawingBrush.color = brushColor;
            canvas.freeDrawingBrush.width = brushWidth;
            canvas.freeDrawingBrush.strokeLineCap = 'round';
            canvas.freeDrawingBrush.strokeLineJoin = 'round';

            // 響應式視窗縮放
            window.addEventListener('resize', () => {
                if (canvas) {
                    canvas.setWidth(window.innerWidth);
                    canvas.setHeight(window.innerHeight);
                    canvas.renderAll();
                }
                initSpotlightCanvas(); // 重新配置聚光燈大小
            });
        }

        // 3.2 切換背景與預設配色優化
        function setupBackground(theme) {
            const bgConfig = {
                white: { color: '#FFFFFF', defaultPen: '#1e293b' },
                green: { color: '#1E3F20', defaultPen: '#FFFFFF' },
                sepia: { color: '#F4EAD4', defaultPen: '#451a03' }
            };

            const config = bgConfig[theme];
            backgroundColor = config.color;
            if (canvas) {
                canvas.setBackgroundColor(backgroundColor, canvas.renderAll.bind(canvas));
            }

            // 更新背景按鈕激活樣式
            document.querySelectorAll('#bg-selector button').forEach(btn => {
                if (btn.dataset.bg === theme) {
                    btn.classList.add('ring-4', 'ring-blue-400');
                } else {
                    btn.classList.remove('ring-4', 'ring-blue-400');
                }
            });

            // 智慧調整初始畫筆配色 (如果與底色衝突)
            updateActiveColor(config.defaultPen);
            saveState();
        }

        // 3.3 事件控制器綁定
        function initEventHandlers() {
            // 背景選擇事件
            document.getElementById('bg-selector').addEventListener('click', (e) => {
                const btn = e.target.closest('button');
                if (btn) setupBackground(btn.dataset.bg);
            });

            // 幾何形狀穩定下拉選單邏輯 (點擊開關與防閃退)
            const shapeBtn = document.getElementById('tool-shape');
            const shapeDropdown = document.getElementById('shape-dropdown');

            shapeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                shapeDropdown.classList.toggle('hidden');
            });

            // 點擊外部自動收起幾何選單
            window.addEventListener('click', (e) => {
                if (shapeBtn && !shapeBtn.contains(e.target) && shapeDropdown && !shapeDropdown.contains(e.target)) {
                    shapeDropdown.classList.add('hidden');
                }
            });

            // 顏色與筆觸粗細綁定
            document.querySelectorAll('.color-swatch').forEach(swatch => {
                swatch.addEventListener('click', (e) => {
                    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('ring-2', 'ring-blue-500', 'active-swatch'));
                    e.target.classList.add('ring-2', 'ring-blue-500', 'active-swatch');
                    updateActiveColor(e.target.dataset.color);
                });
            });

            const customColorInput = document.getElementById('custom-color');
            customColorInput.addEventListener('input', (e) => {
                updateActiveColor(e.target.value);
            });

            const brushWidthSlider = document.getElementById('brush-width');
            brushWidthSlider.addEventListener('input', (e) => {
                brushWidth = parseInt(e.target.value);
                document.getElementById('brush-val').innerText = brushWidth + 'px';
                if (canvas && canvas.freeDrawingBrush) {
                    canvas.freeDrawingBrush.width = brushWidth;
                }
            });

            // 工具切換
            document.getElementById('tool-select').addEventListener('click', () => setMode('select'));
            document.getElementById('tool-draw').addEventListener('click', () => setMode('draw'));
            document.getElementById('tool-magic').addEventListener('click', () => setMode('magic'));
            document.getElementById('tool-text').addEventListener('click', () => setMode('text'));
            document.getElementById('tool-eraser').addEventListener('click', () => setMode('eraser'));

            // 輔助工具切換
            document.getElementById('tool-laser').addEventListener('click', () => setMode('laser'));
            document.getElementById('tool-magnify').addEventListener('click', () => setMode('magnifier'));
            document.getElementById('tool-spotlight').addEventListener('click', () => setMode('spotlight'));

            // UI 工具列隱藏與顯示事件
            document.getElementById('btn-toggle-ui').addEventListener('click', toggleUI);

            // 全螢幕事件
            document.getElementById('btn-fullscreen').addEventListener('click', toggleFullscreen);
            document.addEventListener('fullscreenchange', handleFullscreenChange);

            // 【新增】文字格式控制面板事件綁定
            document.getElementById('text-font-family').addEventListener('change', (e) => {
                const fontFamily = e.target.value;
                const activeObj = canvas.getActiveObject();
                if (activeObj && (activeObj.type === 'textbox' || activeObj.type === 'i-text')) {
                    activeObj.set({ fontFamily: fontFamily });
                    canvas.renderAll();
                    saveState();
                }
            });

            document.getElementById('text-font-size').addEventListener('input', (e) => {
                const fontSize = parseInt(e.target.value) || 28;
                const activeObj = canvas.getActiveObject();
                if (activeObj && (activeObj.type === 'textbox' || activeObj.type === 'i-text')) {
                    activeObj.set({ fontSize: fontSize });
                    // 如果為直書排版，需要同步調整包圍盒寬度以利完美單字換行
                    if (activeObj.splitByGrapheme) {
                        activeObj.set({ width: fontSize * 1.2 });
                    }
                    canvas.renderAll();
                    saveState();
                }
            });

            document.getElementById('btn-text-dir-horiz').addEventListener('click', () => {
                applyTextDirection('horizontal');
            });

            document.getElementById('btn-text-dir-vert').addEventListener('click', () => {
                applyTextDirection('vertical');
            });

            function applyTextDirection(dir) {
                currentTextDirection = dir;
                updateTextDirectionUI(dir);

                const activeObj = canvas.getActiveObject();
                if (activeObj && (activeObj.type === 'textbox' || activeObj.type === 'i-text')) {
                    const fSize = activeObj.fontSize || 28;
                    if (dir === 'vertical') {
                        activeObj.set({
                            splitByGrapheme: true,
                            width: fSize * 1.2 // 窄度寬度迫使 CJK 字符逐字垂直折行
                        });
                    } else {
                        activeObj.set({
                            splitByGrapheme: false,
                            width: 300 // 恢復常規橫向寬度
                        });
                    }
                    canvas.renderAll();
                    saveState();
                }
            }

            // 幾何形狀面板點擊選擇
            document.querySelectorAll('.shape-opt-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const optBtn = e.target.closest('button');
                    selectedShape = optBtn.dataset.shape;
                    setMode('shape');
                    shapeDropdown.classList.add('hidden'); // 選擇後立即收起
                    showToast(`已選擇幾何圖形: ${optBtn.innerText.trim()}`);
                });
            });

            // 復原、重做、清空與檔案操作
            document.getElementById('btn-undo').addEventListener('click', undo);
            document.getElementById('btn-redo').addEventListener('click', redo);
            document.getElementById('btn-clear').addEventListener('click', clearBoard);
            document.getElementById('btn-import').addEventListener('click', () => document.getElementById('file-input').click());
            document.getElementById('file-input').addEventListener('change', handleFileImport);
            document.getElementById('btn-snapshot').addEventListener('click', exportSnapshot);

            // 鍵盤快捷鍵支援
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
                else if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
                else if (e.key === 's' || e.key === 'S') setMode('select');
                else if (e.key === 'd' || e.key === 'D') setMode('draw');
                else if (e.key === 'm' || e.key === 'M') setMode('magic');
                else if (e.key === 't' || e.key === 'T') setMode('text');
                else if (e.key === 'e' || e.key === 'E') setMode('eraser');
                else if (e.key === 'g' || e.key === 'G') {
                    e.preventDefault();
                    shapeDropdown.classList.toggle('hidden');
                }
                else if (e.key === 'h' || e.key === 'H') { e.preventDefault(); toggleUI(); }
                else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); }
                else if (e.key === 'Escape') setMode('select');
            });

            // 畫布物件與選擇事件監聽
            if (canvas) {
                canvas.on('object:added', () => { if (!isRedoing) saveState(); });
                canvas.on('object:modified', () => { if (!isRedoing) saveState(); });
                canvas.on('object:removed', () => { if (!isRedoing) saveState(); });

                // 【新增】點選物件時的文字控制面板動態交互
                canvas.on('selection:created', () => {
                    const activeObj = canvas.getActiveObject();
                    if (activeObj && (activeObj.type === 'textbox' || activeObj.type === 'i-text')) {
                        showTextControlPanel(activeObj);
                    }
                });
                canvas.on('selection:updated', () => {
                    const activeObj = canvas.getActiveObject();
                    if (activeObj && (activeObj.type === 'textbox' || activeObj.type === 'i-text')) {
                        showTextControlPanel(activeObj);
                    }
                });
                canvas.on('selection:cleared', () => {
                    if (currentMode !== 'text') {
                        hideTextControlPanel();
                    }
                });
            }

            initCanvasInteractiveLogic();

            window.addEventListener('dragover', (e) => e.preventDefault());
            window.addEventListener('drop', (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type.startsWith('image/')) {
                    loadImageToCanvas(files[0]);
                }
            });
        }

        // =========================================================================
        // 4. 繪圖與物理交互
        // =========================================================================
        function initCanvasInteractiveLogic() {
            if (!canvas) return;

            canvas.on('mouse:down', function (options) {
                const pointer = canvas.getPointer(options.e);

                if (currentMode === 'shape') {
                    isDrawingShape = true;
                    shapeStartX = pointer.x;
                    shapeStartY = pointer.y;
                    createShapePlaceholder(pointer);
                } else if (currentMode === 'text') {
                    // 打字輸入模式
                    if (options.target && (options.target.type === 'textbox' || options.target.type === 'i-text')) {
                        // 點選已有文字物件，進入編輯狀態
                        options.target.enterEditing();
                        options.target.hiddenTextarea.focus();
                    } else if (!options.target) {
                        // 點選空白處，原地創建全新文字物件 (採用具備自動換行與直書適配之 Textbox)
                        const resolvedFill = (brushColor.toUpperCase() === '#FFFFFF' && backgroundColor.toUpperCase() === '#FFFFFF') ? '#1E293B' : brushColor;

                        // 讀取當前面板設定的預設格式
                        const defaultFontSize = parseInt(document.getElementById('text-font-size').value) || 28;
                        const defaultFontFamily = document.getElementById('text-font-family').value || '微軟正黑體';
                        const isVertical = (currentTextDirection === 'vertical');

                        const textObj = new fabric.Textbox('', {
                            left: pointer.x,
                            top: pointer.y - 15, // 稍微上移以對齊光標
                            fontFamily: defaultFontFamily,
                            fontSize: defaultFontSize,
                            fill: resolvedFill,
                            selectable: true,
                            hasControls: true,
                            editable: true,
                            splitByGrapheme: isVertical,
                            width: isVertical ? defaultFontSize * 1.2 : 300
                        });

                        canvas.add(textObj);
                        canvas.setActiveObject(textObj);
                        textObj.enterEditing();
                        if (textObj.hiddenTextarea) {
                            textObj.hiddenTextarea.focus();
                        }
                        canvas.renderAll();

                        // 當點擊其他位置結束打字時，防呆防空檢查
                        textObj.on('editing:exited', function () {
                            if (textObj.text.trim() === '') {
                                canvas.remove(textObj);
                                canvas.renderAll();
                            } else {
                                saveState();
                            }
                        });
                    }
                } else if (currentMode === 'eraser') {
                    if (options.target) {
                        canvas.remove(options.target);
                        canvas.discardActiveObject();
                        canvas.renderAll();
                    }
                } else if (currentMode === 'laser') {
                    drawLaserDot(pointer);
                    if (!laserTimer) {
                        laserTimer = setInterval(fadeLaserPoints, 60);
                    }
                }
            });

            canvas.on('mouse:move', function (options) {
                const pointer = canvas.getPointer(options.e);

                if (currentMode === 'magnifier') {
                    renderMagnifier(options.e);
                } else if (currentMode === 'spotlight') {
                    renderSpotlight(options.e);
                }

                if (isDrawingShape && activeShapeObj) {
                    const width = pointer.x - shapeStartX;
                    const height = pointer.y - shapeStartY;
                    updateShapePlaceholder(width, height, pointer);
                    canvas.renderAll();
                } else if (currentMode === 'laser' && options.e.buttons === 1) {
                    drawLaserDot(pointer);
                }
            });

            canvas.on('mouse:up', function (options) {
                if (isDrawingShape) {
                    isDrawingShape = false;
                    activeShapeObj = null;
                    saveState();
                }
            });

            canvas.on('path:created', function (options) {
                if (currentMode === 'magic') {
                    const originalPath = options.path;
                    const recognizedShape = analyzeHandwrittenPath(originalPath);

                    if (recognizedShape) {
                        canvas.remove(originalPath);
                        canvas.add(recognizedShape);
                        recognizedShape.setCoords();
                        canvas.setActiveObject(recognizedShape);
                        canvas.renderAll();
                        showToast("智慧辨識成功：已自動優化手寫圖形結構！");
                    }
                }
            });
        }

        // A. 預設幾何形狀建立器
        function createShapePlaceholder(pointer) {
            if (!canvas) return;
            const commonProps = {
                stroke: brushColor,
                strokeWidth: brushWidth,
                fill: 'transparent',
                selectable: true
            };

            switch (selectedShape) {
                case 'line':
                    activeShapeObj = new fabric.Line([pointer.x, pointer.y, pointer.x, pointer.y], commonProps);
                    break;
                case 'line-dashed':
                    activeShapeObj = new fabric.Line([pointer.x, pointer.y, pointer.x, pointer.y], {
                        ...commonProps,
                        strokeDashArray: [12, 6]
                    });
                    break;
                case 'rect':
                    activeShapeObj = new fabric.Rect({ left: pointer.x, top: pointer.y, width: 0, height: 0, ...commonProps });
                    break;
                case 'circle':
                    activeShapeObj = new fabric.Circle({ left: pointer.x, top: pointer.y, radius: 0, ...commonProps });
                    break;
                case 'triangle':
                    activeShapeObj = new fabric.Triangle({ left: pointer.x, top: pointer.y, width: 0, height: 0, ...commonProps });
                    break;
                case 'parallelogram':
                    activeShapeObj = new fabric.Polygon([{ x: 0, y: 0 }], { left: pointer.x, top: pointer.y, ...commonProps });
                    break;
                case 'trapezoid':
                    activeShapeObj = new fabric.Polygon([{ x: 0, y: 0 }], { left: pointer.x, top: pointer.y, ...commonProps });
                    break;
                case 'arc':
                    activeShapeObj = new fabric.Path(`M ${pointer.x} ${pointer.y} Q ${pointer.x} ${pointer.y} ${pointer.x} ${pointer.y}`, commonProps);
                    break;
                case 'sector':
                    activeShapeObj = new fabric.Path(`M ${pointer.x} ${pointer.y} L ${pointer.x} ${pointer.y} Z`, commonProps);
                    break;
                case 'arrow':
                    activeShapeObj = new fabric.Path('M 0 0 L 0 0', commonProps);
                    activeShapeObj.set({ left: pointer.x, top: pointer.y });
                    break;
            }
            if (activeShapeObj) canvas.add(activeShapeObj);
        }

        // B. 預設幾何形狀動態更新
        function updateShapePlaceholder(w, h, pointer) {
            if (!activeShapeObj || !canvas) return;

            const commonProps = {
                stroke: brushColor,
                strokeWidth: brushWidth,
                fill: 'transparent'
            };

            switch (selectedShape) {
                case 'line':
                case 'line-dashed':
                    activeShapeObj.set({ x2: pointer.x, y2: pointer.y });
                    break;
                case 'rect':
                    if (w < 0) activeShapeObj.set({ left: pointer.x });
                    if (h < 0) activeShapeObj.set({ top: pointer.y });
                    activeShapeObj.set({ width: Math.abs(w), height: Math.abs(h) });
                    break;
                case 'circle':
                    const radius = Math.sqrt(w * w + h * h) / 2;
                    activeShapeObj.set({
                        radius: radius,
                        left: w < 0 ? pointer.x : shapeStartX,
                        top: h < 0 ? pointer.y : shapeStartY
                    });
                    break;
                case 'triangle':
                    if (w < 0) activeShapeObj.set({ left: pointer.x });
                    if (h < 0) activeShapeObj.set({ top: pointer.y });
                    activeShapeObj.set({ width: Math.abs(w), height: Math.abs(h) });
                    break;
                case 'parallelogram':
                    const pSkew = Math.abs(w) * 0.25;
                    const pLeft = w < 0 ? pointer.x : shapeStartX;
                    const pTop = h < 0 ? pointer.y : shapeStartY;
                    canvas.remove(activeShapeObj);
                    activeShapeObj = new fabric.Polygon([
                        { x: pSkew, y: 0 },
                        { x: Math.abs(w), y: 0 },
                        { x: Math.abs(w) - pSkew, y: Math.abs(h) },
                        { x: 0, y: Math.abs(h) }
                    ], { left: pLeft, top: pTop, ...commonProps });
                    canvas.add(activeShapeObj);
                    break;
                case 'trapezoid':
                    const tCut = Math.abs(w) * 0.2;
                    const tLeft = w < 0 ? pointer.x : shapeStartX;
                    const tTop = h < 0 ? pointer.y : shapeStartY;
                    canvas.remove(activeShapeObj);
                    activeShapeObj = new fabric.Polygon([
                        { x: tCut, y: 0 },
                        { x: Math.abs(w) - tCut, y: 0 },
                        { x: Math.abs(w), y: Math.abs(h) },
                        { x: 0, y: Math.abs(h) }
                    ], { left: tLeft, top: tTop, ...commonProps });
                    canvas.add(activeShapeObj);
                    break;
                case 'arc':
                    const ax1 = shapeStartX, ay1 = shapeStartY;
                    const ax2 = pointer.x, ay2 = pointer.y;
                    const amidX = (ax1 + ax2) / 2 + (ay2 - ay1) * 0.15;
                    const amidY = (ay1 + ay2) / 2 - (ax2 - ax1) * 0.15;
                    canvas.remove(activeShapeObj);
                    activeShapeObj = new fabric.Path(`M ${ax1} ${ay1} Q ${amidX} ${amidY} ${ax2} ${ay2}`, commonProps);
                    canvas.add(activeShapeObj);
                    break;
                case 'sector':
                    const sx1 = shapeStartX, sy1 = shapeStartY;
                    const sx2 = pointer.x, sy2 = pointer.y;
                    const sRadius = Math.sqrt(w * w + h * h);
                    const sAngle = Math.atan2(h, w);
                    const sAngleStart = sAngle - Math.PI / 6;
                    const sAngleEnd = sAngle + Math.PI / 6;
                    const arc1X = sx1 + sRadius * Math.cos(sAngleStart);
                    const arc1Y = sy1 + sRadius * Math.sin(sAngleStart);
                    const arc2X = sx1 + sRadius * Math.cos(sAngleEnd);
                    const arc2Y = sy1 + sRadius * Math.sin(sAngleEnd);
                    canvas.remove(activeShapeObj);
                    activeShapeObj = new fabric.Path(`M ${sx1} ${sy1} L ${arc1X} ${arc1Y} A ${sRadius} ${sRadius} 0 0 1 ${arc2X} ${arc2Y} Z`, commonProps);
                    canvas.add(activeShapeObj);
                    break;
                case 'arrow':
                    const x1 = shapeStartX, y1 = shapeStartY;
                    const x2 = pointer.x, y2 = pointer.y;
                    const dx = x2 - x1, dy = y2 - y1;
                    const angle = Math.atan2(dy, dx);
                    const headLength = 15 + brushWidth;
                    const ax = x2 - headLength * Math.cos(angle - Math.PI / 6);
                    const ay = y2 - headLength * Math.sin(angle - Math.PI / 6);
                    const bx = x2 - headLength * Math.cos(angle + Math.PI / 6);
                    const by = y2 - headLength * Math.sin(angle + Math.PI / 6);
                    const pathString = `M ${x1} ${y1} L ${x2} ${y2} M ${x2} ${y2} L ${ax} ${ay} M ${x2} ${y2} L ${bx} ${by}`;
                    canvas.remove(activeShapeObj);
                    activeShapeObj = new fabric.Path(pathString, commonProps);
                    canvas.add(activeShapeObj);
                    break;
            }

            activeShapeObj.setCoords();
        }

        // =========================================================================
        // 5. 核心 AI 模組 A：手繪幾何形狀自動校正 (Shape Beautifier)
        // =========================================================================
        function analyzeHandwrittenPath(fabricPath) {
            const pathData = fabricPath.path;
            const points = [];
            pathData.forEach(p => {
                if (p[0] === 'M' || p[0] === 'L') {
                    points.push({ x: p[1], y: p[2] });
                } else if (p[0] === 'Q') {
                    points.push({ x: p[3], y: p[4] });
                }
            });

            if (points.length < 8) return null;

            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            points.forEach(p => {
                if (p.x < minX) minX = p.x;
                if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.y > maxY) maxY = p.y;
            });

            const w = maxX - minX;
            const h = maxY - minY;
            const cx = minX + w / 2;
            const cy = minY + h / 2;

            if (w < 20 || h < 20) return null;

            const pStart = points[0];
            const pEnd = points[points.length - 1];
            const startEndDist = Math.sqrt(Math.pow(pStart.x - pEnd.x, 2) + Math.pow(pStart.y - pEnd.y, 2));
            const isClosed = startEndDist < (w + h) * 0.25;

            const commonProps = {
                stroke: brushColor,
                strokeWidth: brushWidth,
                fill: 'transparent',
                selectable: true
            };

            const corners = simplifyDouglasPeucker(points, 14);
            if (corners.length > 1) {
                const first = corners[0];
                const last = corners[corners.length - 1];
                const d = Math.sqrt(Math.pow(last.x - first.x, 2) + Math.pow(last.y - first.y, 2));
                if (d < 30) corners.pop();
            }

            const cornerCount = corners.length;

            if (!isClosed) {
                if (cornerCount <= 2) {
                    return new fabric.Line([pStart.x, pStart.y, pEnd.x, pEnd.y], commonProps);
                }
                let totalR = 0;
                points.forEach(p => totalR += Math.sqrt(Math.pow(p.x - cx, 2) + Math.pow(p.y - cy, 2)));
                const meanR = totalR / points.length;
                let rVar = 0;
                points.forEach(p => rVar += Math.pow(Math.sqrt(Math.pow(p.x - cx, 2) + Math.pow(p.y - cy, 2)) - meanR, 2));
                if (Math.sqrt(rVar / points.length) / meanR < 0.22) {
                    const midPt = points[Math.floor(points.length / 2)];
                    const cpX = 2 * midPt.x - 0.5 * (pStart.x + pEnd.x);
                    const cpY = 2 * midPt.y - 0.5 * (pStart.y + pEnd.y);
                    return new fabric.Path(`M ${pStart.x} ${pStart.y} Q ${cpX} ${cpY} ${pEnd.x} ${pEnd.y}`, commonProps);
                }
                return null;
            }

            let totalRadius = 0;
            points.forEach(p => totalRadius += Math.sqrt(Math.pow(p.x - cx, 2) + Math.pow(p.y - cy, 2)));
            const meanRadius = totalRadius / points.length;
            let rVariance = 0;
            points.forEach(p => rVariance += Math.pow(Math.sqrt(Math.pow(p.x - cx, 2) + Math.pow(p.y - cy, 2)) - meanRadius, 2));
            if (Math.sqrt(rVariance / points.length) / meanRadius < 0.15) {
                return new fabric.Circle({
                    ...commonProps,
                    left: minX,
                    top: minY,
                    radius: meanRadius
                });
            }

            if (cornerCount === 3) {
                return new fabric.Triangle({
                    ...commonProps,
                    left: minX,
                    top: minY,
                    width: w,
                    height: h
                });
            }

            if (cornerCount === 4 && isHanddrawnSector(corners, points)) {
                const sRadius = Math.max(w, h) / 2;
                const sAngleStart = -Math.PI / 6;
                const sAngleEnd = Math.PI / 6;
                const arc1X = cx + sRadius * Math.cos(sAngleStart);
                const arc1Y = cy + sRadius * Math.sin(sAngleStart);
                const arc2X = cx + sRadius * Math.cos(sAngleEnd);
                const arc2Y = cy + sRadius * Math.sin(sAngleEnd);
                return new fabric.Path(`M ${cx} ${cy} L ${arc1X} ${arc1Y} A ${sRadius} ${sRadius} 0 0 1 ${arc2X} ${arc2Y} Z`, {
                    ...commonProps,
                    left: minX,
                    top: minY
                });
            }

            if (cornerCount === 4 && canvas) {
                const p0 = corners[0], p1 = corners[1], p2 = corners[2], p3 = corners[3];
                const v0 = { x: p1.x - p0.x, y: p1.y - p0.y };
                const v1 = { x: p2.x - p1.x, y: p2.y - p1.y };
                const v2 = { x: p3.x - p2.x, y: p3.y - p2.y };
                const v3 = { x: p0.x - p3.x, y: p0.y - p3.y };

                const cosAngle = (a, b) => {
                    const dot = a.x * b.x + a.y * b.y;
                    return dot / (Math.sqrt(a.x * a.x + a.y * a.y) * Math.sqrt(b.x * b.x + b.y * b.y));
                };

                const cosOpp1 = Math.abs(cosAngle(v0, { x: -v2.x, y: -v2.y }));
                const cosOpp2 = Math.abs(cosAngle(v1, { x: -v3.x, y: -v3.y }));

                const pair1Parallel = cosOpp1 > 0.85;
                const pair2Parallel = cosOpp2 > 0.85;

                if (pair1Parallel && pair2Parallel) {
                    const cosCorner = Math.abs(cosAngle(v0, v1));
                    if (cosCorner < 0.22) {
                        return new fabric.Rect({ ...commonProps, left: minX, top: minY, width: w, height: h });
                    } else {
                        const pSkew = w * 0.25;
                        return new fabric.Polygon([
                            { x: pSkew, y: 0 },
                            { x: w, y: 0 },
                            { x: w - pSkew, y: h },
                            { x: 0, y: h }
                        ], { ...commonProps, left: minX, top: minY });
                    }
                }

                if (pair1Parallel || pair2Parallel) {
                    const tCut = w * 0.2;
                    return new fabric.Polygon([
                        { x: tCut, y: 0 },
                        { x: w - tCut, y: 0 },
                        { x: w, y: h },
                        { x: 0, y: h }
                    ], { ...commonProps, left: minX, top: minY });
                }

                return new fabric.Rect({ ...commonProps, left: minX, top: minY, width: w, height: h });
            }

            return null;
        }

        function isHanddrawnSector(corners, points) {
            return corners.length === 3;
        }

        function simplifyDouglasPeucker(points, epsilon) {
            if (points.length <= 2) return points;

            let maxDist = 0;
            let index = 0;
            const end = points.length - 1;

            for (let i = 1; i < end; i++) {
                const dist = getPerpendicularDistance(points[i], points[0], points[end]);
                if (dist > maxDist) {
                    index = i;
                    maxDist = dist;
                }
            }

            if (maxDist > epsilon) {
                const results1 = simplifyDouglasPeucker(points.slice(0, index + 1), epsilon);
                const results2 = simplifyDouglasPeucker(points.slice(index), epsilon);
                return results1.slice(0, results1.length - 1).concat(results2);
            } else {
                return [points[0], points[end]];
            }
        }

        function getPerpendicularDistance(p, lineStart, lineEnd) {
            const dx = lineEnd.x - lineStart.x;
            const dy = lineEnd.y - lineStart.y;
            if (dx === 0 && dy === 0) {
                return Math.sqrt(Math.pow(p.x - lineStart.x, 2) + Math.pow(p.y - lineStart.y, 2));
            }
            const t = ((p.x - lineStart.x) * dx + (p.y - lineStart.y) * dy) / (dx * dx + dy * dy);
            if (t < 0) {
                return Math.sqrt(Math.pow(p.x - lineStart.x, 2) + Math.pow(p.y - lineStart.y, 2));
            } else if (t > 1) {
                return Math.sqrt(Math.pow(p.x - lineEnd.x, 2) + Math.pow(p.y - lineEnd.y, 2));
            }
            const closestPoint = { x: lineStart.x + t * dx, y: lineStart.y + t * dy };
            return Math.sqrt(Math.pow(p.x - closestPoint.x, 2) + Math.pow(p.y - closestPoint.y, 2));
        }

        // =========================================================================
        // 7. 雷射筆輔助特效
        // =========================================================================
        function drawLaserDot(pointer) {
            if (!canvas) return;
            const laserDot = new fabric.Circle({
                left: pointer.x - 6,
                top: pointer.y - 6,
                radius: 6,
                fill: '#ef4444',
                opacity: 0.9,
                id: 'laser-dot',
                selectable: false,
                evented: false,
                timestamp: Date.now()
            });

            if (laserPoints.length > 0) {
                const lastPoint = laserPoints[laserPoints.length - 1];
                const laserLine = new fabric.Line([lastPoint.x, lastPoint.y, pointer.x, pointer.y], {
                    stroke: '#ef4444',
                    strokeWidth: 4,
                    opacity: 0.8,
                    id: 'laser-line',
                    selectable: false,
                    evented: false,
                    timestamp: Date.now()
                });
                canvas.add(laserLine);
            }

            canvas.add(laserDot);
            laserPoints.push({ x: pointer.x, y: pointer.y, time: Date.now() });
            canvas.renderAll();
        }

        function fadeLaserPoints() {
            if (!canvas) return;
            const now = Date.now();
            const delay = 600;
            const objects = canvas.getObjects();

            let needsRender = false;
            objects.forEach(obj => {
                if (obj.id === 'laser-line' || obj.id === 'laser-dot') {
                    const elapsed = now - obj.timestamp;
                    if (elapsed > delay) {
                        canvas.remove(obj);
                        needsRender = true;
                    } else {
                        obj.set({ opacity: (1 - elapsed / delay) });
                        needsRender = true;
                    }
                }
            });

            laserPoints = laserPoints.filter(p => now - p.time < delay);

            if (needsRender) {
                canvas.renderAll();
            }
        }

        // =========================================================================
        // 8. 局部放大鏡 (Magnifier) 實作
        // =========================================================================
        function renderMagnifier(e) {
            const lens = document.getElementById('magnifier-lens');
            const magCanvas = document.getElementById('magnifier-canvas');
            if (!lens || !magCanvas || !canvas) return;

            const mCtx = magCanvas.getContext('2d');

            const zoom = 2.2;
            const size = 180;

            const coords = getEventCoords(e);
            const mouseX = coords.clientX;
            const mouseY = coords.clientY;

            lens.style.left = `${mouseX - size / 2}px`;
            lens.style.top = `${mouseY - size / 2}px`;

            mCtx.clearRect(0, 0, size, size);

            const fCanvasEl = canvas.getElement();
            const rect = fCanvasEl.getBoundingClientRect();

            const scaleX = fCanvasEl.width / rect.width;
            const scaleY = fCanvasEl.height / rect.height;

            mCtx.save();
            mCtx.beginPath();
            mCtx.arc(size / 2, size / 2, size / 2 - 2, 0, Math.PI * 2);
            mCtx.clip();

            const localX = mouseX - rect.left;
            const localY = mouseY - rect.top;

            const sx = (localX - (size / (2 * zoom))) * scaleX;
            const sy = (localY - (size / (2 * zoom))) * scaleY;
            const sWidth = (size / zoom) * scaleX;
            const sHeight = (size / zoom) * scaleY;

            mCtx.drawImage(fCanvasEl, sx, sy, sWidth, sHeight, 0, 0, size, size);
            mCtx.restore();
        }

        // =========================================================================
        // 9. 教學聚光燈 (Spotlight) 實作
        // =========================================================================
        function initSpotlightCanvas() {
            const spotlightCanvas = document.getElementById('spotlight-overlay');
            if (!spotlightCanvas) return;
            spotlightCanvas.width = window.innerWidth;
            spotlightCanvas.height = window.innerHeight;
            renderSpotlight(null);
        }

        function renderSpotlight(e) {
            const spotlightCanvas = document.getElementById('spotlight-overlay');
            if (!spotlightCanvas || spotlightCanvas.style.display === 'none') return;

            const ctx = spotlightCanvas.getContext('2d');
            const w = spotlightCanvas.width;
            const h = spotlightCanvas.height;

            const coords = getEventCoords(e);
            const x = coords.clientX;
            const y = coords.clientY;
            const radius = 130;

            ctx.clearRect(0, 0, w, h);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.65)';
            ctx.fillRect(0, 0, w, h);

            ctx.save();
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();

            const gradient = ctx.createRadialGradient(x, y, radius - 20, x, y, radius + 10);
            gradient.addColorStop(0, 'rgba(0,0,0,1)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;

            ctx.arc(x, y, radius + 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // =========================================================================
        // 10. UI 狀態管理 (全螢幕、隱藏面板)
        // =========================================================================
        function toggleUI() {
            isUiHidden = !isUiHidden;
            const header = document.getElementById('top-header');
            const nav = document.getElementById('bottom-nav');
            const toggleIcon = document.getElementById('ui-toggle-icon');

            if (isUiHidden) {
                if (header) {
                    header.classList.remove('translate-y-0', 'opacity-100');
                    header.classList.add('-translate-y-24', 'opacity-0');
                }
                if (nav) {
                    nav.classList.remove('translate-y-0', 'opacity-100');
                    nav.classList.add('translate-y-32', 'opacity-0');
                }
                if (toggleIcon) {
                    toggleIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" />
                    `;
                }
                showToast("工具列已隱藏，按 'H' 鍵或點擊右側按鈕可再次顯示。");
            } else {
                if (header) {
                    header.classList.remove('-translate-y-24', 'opacity-0');
                    header.classList.add('translate-y-0', 'opacity-100');
                }
                if (nav) {
                    nav.classList.remove('translate-y-32', 'opacity-0');
                    nav.classList.add('translate-y-0', 'opacity-100');
                }
                if (toggleIcon) {
                    toggleIcon.innerHTML = `
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    `;
                }
                showToast("工具列已恢復顯示");
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    showToast(`無法啟動全螢幕模式: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function handleFullscreenChange() {
            const fsText = document.getElementById('fs-text');
            const fsIconPath = document.getElementById('fs-icon-path');
