            if (!fsText || !fsIconPath) return;
            if (document.fullscreenElement) {
                fsText.innerText = "退出全螢幕";
                fsIconPath.setAttribute('d', 'M4 4h4v4M20 4h-4v4M4 20h4v-4M20 20h-4v-4');
                showToast("已進入全螢幕教學模式");
            } else {
                fsText.innerText = "全螢幕";
                fsIconPath.setAttribute('d', 'M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4');
                showToast("已退出全螢幕");
            }
        }

        // =========================================================================
        // 11. 檔案與匯出、快照系統
        // =========================================================================
        function handleFileImport(e) {
            const file = e.target.files[0];
            if (file) loadImageToCanvas(file);
        }

        function loadImageToCanvas(file) {
            if (!canvas) return;
            const reader = new FileReader();
            reader.onload = function (event) {
                const imgObj = new Image();
                imgObj.src = event.target.result;
                imgObj.onload = function () {
                    const fabImage = new fabric.Image(imgObj);

                    const maxAllowedWidth = window.innerWidth * 0.6;
                    const maxAllowedHeight = window.innerHeight * 0.6;
                    let scaleFactor = 1;

                    if (fabImage.width > maxAllowedWidth || fabImage.height > maxAllowedHeight) {
                        scaleFactor = Math.min(maxAllowedWidth / fabImage.width, maxAllowedHeight / fabImage.height);
                    }

                    fabImage.set({
                        left: window.innerWidth / 2 - (fabImage.width * scaleFactor) / 2,
                        top: window.innerHeight / 2 - (fabImage.height * scaleFactor) / 2,
                        scaleX: scaleFactor,
                        scaleY: scaleFactor,
                        cornerStyle: 'circle',
                        cornerColor: '#3b82f6',
                        transparentCorners: false,
                        cornerSize: 10
                    });

                    canvas.add(fabImage);
                    fabImage.setCoords();
                    canvas.setActiveObject(fabImage);
                    setMode('select');
                    canvas.renderAll();
                    saveState();
                    showToast("圖檔匯入成功！您可以自由旋轉縮放。");
                };
            };
            reader.readAsDataURL(file);
        }


        // =========================================================================
        // 12. 歷史紀錄系統 (Undo/Redo Stack)
        // =========================================================================
        function saveState() {
            if (isRedoing || !canvas) return;

            const json = canvas.toJSON();

            if (historyIndex < stateHistory.length - 1) {
                stateHistory.splice(historyIndex + 1);
            }

            stateHistory.push(JSON.stringify(json));
            if (stateHistory.length > maxHistory) {
                stateHistory.shift();
            }
            historyIndex = stateHistory.length - 1;

            updateUndoRedoButtons();
        }

        function undo() {
            if (historyIndex > 0 && canvas) {
                isRedoing = true;
                historyIndex--;
                const state = stateHistory[historyIndex];
                canvas.loadFromJSON(state, function () {
                    canvas.renderAll();
                    isRedoing = false;
                    updateUndoRedoButtons();
                    showToast("已回復至上一步動作");
                });
            }
        }

        // 重做
        function redo() {
            if (historyIndex < stateHistory.length - 1 && canvas) {
                isRedoing = true;
                historyIndex++;
                const state = stateHistory[historyIndex];
                canvas.loadFromJSON(state, function () {
                    canvas.renderAll();
                    isRedoing = false;
                    updateUndoRedoButtons();
                    showToast("已重做下一步動作");
                });
            }
        }

        function updateUndoRedoButtons() {
            const undoBtn = document.getElementById('btn-undo');
            const redoBtn = document.getElementById('btn-redo');
            if (undoBtn) undoBtn.disabled = (historyIndex <= 0);
            if (redoBtn) redoBtn.disabled = (historyIndex >= stateHistory.length - 1);
        }

        function clearBoard() {
            const confirmBox = document.createElement('div');
            confirmBox.className = "fixed inset-0 bg-slate-950/70 backdrop-blur-sm z-50 flex items-center justify-center";
            confirmBox.innerHTML = `
                <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl max-w-sm w-full mx-4 shadow-2xl">
                    <h3 class="text-white font-bold text-lg mb-2">確定清空白板？</h3>
                    <p class="text-slate-400 text-sm mb-6">這將會清除當前白板內的所有內容，此操作無法完全回復。</p>
                    <div class="flex gap-3 justify-end">
                        <button id="cf-cancel" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs font-semibold rounded-lg transition">取消</button>
                        <button id="cf-ok" class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white text-xs font-semibold rounded-lg transition">確認清空</button>
                    </div>
                </div>
            `;
            document.body.appendChild(confirmBox);

            document.getElementById('cf-cancel').onclick = () => confirmBox.remove();
            document.getElementById('cf-ok').onclick = () => {
                if (canvas) {
                    canvas.clear();
                    setupBackground(backgroundColor === '#FFFFFF' ? 'white' : (backgroundColor === '#1E3F20' ? 'green' : 'sepia'));
                }
                confirmBox.remove();
                showToast("白板已完全清空");
            };
        }


        // =========================================================================
        // 13. 快照導出
        // =========================================================================
        function exportSnapshot() {
            if (!canvas) return;
            showToast("正在生成高清快照圖檔，準備匯出...");

            setTimeout(() => {
                const dataURL = canvas.toDataURL({
                    format: 'png',
                    quality: 1.0
                });

                const link = document.createElement('a');
                const date = new Date();
                const timestamp = date.getFullYear() +
                    String(date.getMonth() + 1).padStart(2, '0') +
                    String(date.getDate()).padStart(2, '0') + "_" +
                    String(date.getHours()).padStart(2, '0') +
                    String(date.getMinutes()).padStart(2, '0') +
                    String(date.getSeconds()).padStart(2, '0');

                link.download = `智慧白板課堂筆記_${timestamp}.png`;
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast("高解析度課堂快照已成功下載！");
            }, 100);
        }
    </script>
</body>
