<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小拼圖遊戲 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 避免行動裝置選取文字與下拉更新 */
        body {
            overscroll-behavior-y: contain;
        }

        .puzzle-piece {
            cursor: grab;
            transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
            touch-action: none;
            user-select: none;
            box-sizing: border-box;
            /* 將實體邊框改為內陰影，避免干擾背景圖片定位精度 */
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .puzzle-piece:active {
            cursor: grabbing;
        }

        .dragging {
            opacity: 0.8;
            transform: scale(1.05);
            z-index: 50;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4) !important;
        }

        .drop-target {
            outline: 3px dashed #3b82f6;
            outline-offset: -3px;
            background-color: rgba(59, 130, 246, 0.2);
        }

        /* 修正新舊圖片並存問題：只有在沒有 hidden 類別時才設定 grid */
        #puzzle-container:not(.hidden) {
            display: grid;
        }

        #puzzle-container {
            /* 移除 gap 以確保數學分割 100% 吻合 */
            background-color: #9ca3af;
            border: 4px solid #1e293b;
            border-radius: 0.5rem;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
            /* 強制內容盒模型，確保計算 clientWidth 時不受 border 影響 */
            box-sizing: content-box;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.4s ease, box-shadow 0.4s ease;
        }

        /* 拼圖成功時的極簡質感視覺特效 (明顯發光與微放大) */
        .puzzle-solved {
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.65) !important;
            border-color: #10b981 !important;
            transform: scale(1.02);
            /* 完成時有微微浮起的「卡榫」感 */
        }

        /* 隱藏拼圖碎片邊框，達成「完美融合」視覺，並強制鎖定游標 */
        .puzzle-solved .puzzle-piece {
            box-shadow: none !important;
            border: none !important;
            cursor: default !important;
            /* 游標變回普通的箭頭，視覺提示鎖定 */
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #6366f1;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background-color: rgba(0, 0, 0, 0.8);
            display: none;
            backdrop-filter: blur(4px);
        }

        #preview-overlay img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 拖曳上傳區的互動樣式 */
        .drop-zone-active {
            border-color: #6366f1 !important;
            background-color: #e0e7ff !important;
            transform: scale(1.01);
        }
    </style>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-800 transition-colors duration-300" id="mainBody">

    <div class="max-w-5xl mx-auto p-3 md:p-6 flex flex-col h-screen" id="appContainer">

        <header id="appHeader" class="text-center mb-4 flex-shrink-0">
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 mb-1 tracking-tight">🧩 小拼圖遊戲</h1>
            <p class="text-slate-500 text-xs md:text-sm">拖曳圖片上傳，設定難度，長按眼睛對照原圖</p>
        </header>

        <!-- 控制區域 -->
        <div id="controlPanel"
            class="bg-white p-4 rounded-2xl shadow-sm mb-4 grid grid-cols-1 md:grid-cols-12 gap-4 items-end border border-slate-200 flex-shrink-0">
            <div class="md:col-span-5 space-y-1">
                <label class="block text-xs font-bold text-slate-700">1. 選擇或拖曳圖片</label>
                <input type="file" id="imageInput" accept="image/*"
                    class="block w-full text-sm text-slate-500 file:mr-3 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-indigo-50 file:text-indigo-600 hover:file:bg-indigo-100 transition-all cursor-pointer bg-slate-50 rounded-xl border border-slate-200">
            </div>

            <div class="md:col-span-4 grid grid-cols-2 gap-3">
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">橫向格數</label>
                    <input type="number" id="colsInput" value="3" min="2" max="10"
                        class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold bg-slate-50">
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase">縱向格數</label>
                    <input type="number" id="rowsInput" value="3" min="2" max="10"
                        class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold bg-slate-50">
                </div>
            </div>

            <div class="md:col-span-3">
                <button id="startBtn"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md active:scale-95 disabled:bg-slate-300 disabled:cursor-not-allowed">
                    開始挑戰
                </button>
            </div>
        </div>

        <!-- 數據儀表板 -->
        <div class="flex justify-between items-center mb-3 px-1 flex-shrink-0">
            <div class="flex items-center space-x-2 md:space-x-3">
                <!-- 計時器 -->
                <div
                    class="flex items-center space-x-2 bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-xl shadow-sm border border-slate-200">
                    <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span id="timer"
                        class="font-mono font-bold text-slate-700 text-lg md:text-xl tracking-wider">00:00</span>
                </div>

                <!-- 預覽按鈕 -->
                <button id="previewBtn"
                    class="flex items-center space-x-1 md:space-x-2 bg-white px-3 py-1.5 md:px-4 md:py-2 rounded-xl shadow-sm border border-slate-200 hover:bg-indigo-50 active:scale-95 transition-all disabled:opacity-40 disabled:cursor-not-allowed text-slate-600 group"
                    disabled title="按住查看原圖">
                    <svg class="w-5 h-5 group-hover:text-indigo-600 transition-colors" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                    <span id="previewCounter" class="font-mono font-bold text-slate-500 text-lg md:text-xl">0</span>
                </button>
            </div>

            <div class="flex items-center space-x-2">
                <div id="gameStatus" class="hidden text-emerald-600 font-black animate-pulse text-sm md:text-base mr-2">
                    ✨ 完美匹配！
                </div>
                <!-- 全螢幕按鈕 -->
                <button id="fullscreenBtn"
                    class="p-2 bg-white rounded-xl shadow-sm border border-slate-200 hover:bg-slate-50 active:scale-95 transition-all text-slate-600"
                    title="全螢幕模式">
                    <svg id="fsIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 遊戲主區域 (兼作拖曳上傳區) -->
        <div id="gameArea"
            class="flex-1 relative bg-white/50 p-4 md:p-6 rounded-2xl shadow-inner flex items-center justify-center border-2 border-dashed border-slate-300 transition-all duration-300 min-h-[300px]">

            <!-- 初始/拖曳提示狀態 -->
            <div id="placeholderText"
                class="text-center transition-all duration-300 w-full h-full flex flex-col items-center justify-center pointer-events-none">
                <div id="statusBox"
                    class="bg-white p-6 md:p-8 rounded-2xl shadow-sm inline-flex flex-col items-center justify-center border border-slate-100 max-w-sm w-full mx-4">
                    <div id="uploadIcon" class="mb-4">
                        <svg class="w-16 h-16 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                    </div>
                    <!-- 即時縮圖預覽 -->
                    <div id="thumbnailContainer"
                        class="hidden mb-4 relative w-32 h-32 md:w-48 md:h-48 rounded-xl overflow-hidden border-2 border-indigo-100 shadow-inner bg-slate-100">
                        <img id="thumbnailImg" src="" class="w-full h-full object-contain" alt="Thumbnail">
                        <div class="absolute inset-0 bg-indigo-900/10"></div>
                    </div>
                    <p class="font-bold text-slate-700 text-lg mb-1" id="statusTitle">上傳圖片</p>
                    <p class="text-slate-500 text-sm" id="statusMessage">點擊上方選擇或直接拖曳圖片至此處</p>
                </div>
            </div>

            <!-- 拼圖容器 -->
            <div id="puzzle-container" class="hidden relative">
                <div id="preview-overlay">
                    <img id="preview-img" src="" alt="Preview">
                </div>
            </div>
        </div>

        <!-- 成功彈窗 -->
        <div id="successModal"
            class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center hidden z-[9999] p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-white p-8 rounded-3xl shadow-2xl text-center max-w-sm w-full transform scale-95 transition-transform duration-300"
                id="successCard">
                <div
                    class="w-24 h-24 bg-gradient-to-br from-emerald-100 to-teal-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h2 class="text-3xl font-black text-slate-800 mb-2">挑戰成功！</h2>
                <p class="text-slate-500 mb-6">拼圖已鎖定，恭喜完成</p>
                <div class="bg-slate-50 rounded-2xl p-4 space-y-2 mb-8 border border-slate-100">
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-sm font-medium">總耗時</span>
                        <span id="finalTime" class="font-bold text-indigo-600 text-lg"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-slate-500 text-sm font-medium">對照次數</span>
                        <span class="font-bold text-amber-600 text-lg"><span id="finalPreviews"></span> 次</span>
                    </div>
                </div>
                <button onclick="closeModal()"
                    class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold hover:bg-slate-900 transition-all shadow-lg active:scale-95">
                    完成並關閉
                </button>
            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const imageInput = document.getElementById('imageInput');
        const rowsInput = document.getElementById('rowsInput');
        const colsInput = document.getElementById('colsInput');
        const startBtn = document.getElementById('startBtn');
        const previewBtn = document.getElementById('previewBtn');
        const previewCounter = document.getElementById('previewCounter');
        const puzzleContainer = document.getElementById('puzzle-container');
        const previewOverlay = document.getElementById('preview-overlay');
        const previewImg = document.getElementById('preview-img');
        const timerDisplay = document.getElementById('timer');
        const statusTitle = document.getElementById('statusTitle');
        const statusMessage = document.getElementById('statusMessage');
        const placeholderText = document.getElementById('placeholderText');
        const uploadIcon = document.getElementById('uploadIcon');
        const thumbnailContainer = document.getElementById('thumbnailContainer');
        const thumbnailImg = document.getElementById('thumbnailImg');
        const gameArea = document.getElementById('gameArea');
        const successModal = document.getElementById('successModal');
        const successCard = document.getElementById('successCard');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const fsIcon = document.getElementById('fsIcon');
        const appHeader = document.getElementById('appHeader');
        const controlPanel = document.getElementById('controlPanel');

        // 🚨 關鍵修復點：補齊先前遺漏的彈窗數據節點宣告
        const finalTimeDisplay = document.getElementById('finalTime');
        const finalPreviewsDisplay = document.getElementById('finalPreviews');

        // State Variables
        let originalImage = null;
        let timerInterval = null;
        let secondsElapsed = 0;
        let previewCount = 0;
        let isGameRunning = false;
        let draggedPieceId = null;
        let pieces = [];

        // --------------------------------------------------------
        // 圖片處理與上傳邏輯
        // --------------------------------------------------------

        async function processAndResizeImage(file) {
            return new Promise((resolve, reject) => {
                if (!file.type.startsWith('image/')) {
                    reject(new Error('非支援的圖片格式'));
                    return;
                }
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const MAX_SIZE = 1600;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height = Math.round((height * MAX_SIZE) / width);
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width = Math.round((width * MAX_SIZE) / height);
                                height = MAX_SIZE;
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const optimizedImg = new Image();
                        optimizedImg.onload = () => resolve(optimizedImg);
                        optimizedImg.src = canvas.toDataURL('image/jpeg', 0.9);
                    };
                    img.onerror = () => reject(new Error('圖片讀取失敗'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('檔案讀取失敗'));
                reader.readAsDataURL(file);
            });
        }

        async function handleImageUpload(file) {
            if (!file) return;

            resetGameState();

            startBtn.disabled = true;
            statusTitle.innerHTML = `處理中...`;
            statusMessage.innerHTML = `<span class="loader"></span> 正在最佳化高畫質影像`;

            try {
                originalImage = await processAndResizeImage(file);

                previewImg.src = originalImage.src;
                thumbnailImg.src = originalImage.src;

                uploadIcon.classList.add('hidden');
                thumbnailContainer.classList.remove('hidden');
                statusTitle.innerHTML = `<span class="text-indigo-600">圖片載入成功！</span>`;
                statusMessage.innerText = "調整難度後，點擊「開始挑戰」";

                previewBtn.disabled = false;
                startBtn.disabled = false;

                startBtn.classList.add('animate-pulse');
                setTimeout(() => startBtn.classList.remove('animate-pulse'), 2000);

            } catch (err) {
                alert(err.message);
                statusTitle.innerText = "上傳失敗";
                statusMessage.innerText = "請重新選擇有效的圖片檔案。";
            } finally {
                if (!originalImage) startBtn.disabled = true;
            }
        }

        imageInput.addEventListener('change', (e) => handleImageUpload(e.target.files[0]));

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            gameArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            gameArea.addEventListener(eventName, (e) => {
                if (e.dataTransfer && e.dataTransfer.types.includes('Files')) {
                    gameArea.classList.add('drop-zone-active');
                }
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            gameArea.addEventListener(eventName, () => {
                gameArea.classList.remove('drop-zone-active');
            }, false);
        });

        gameArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            if (dt && dt.files && dt.files.length > 0) {
                const files = dt.files;
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(files[0]);
                imageInput.files = dataTransfer.files;
                handleImageUpload(files[0]);
            }
        }, false);


        // --------------------------------------------------------
        // 遊戲核心邏輯
        // --------------------------------------------------------

        function resetGameState() {
            isGameRunning = false;
            clearInterval(timerInterval);
            secondsElapsed = 0;
            previewCount = 0;
            updateTimerDisplay();
            previewCounter.innerText = "0";

            document.getElementById('gameStatus').classList.add('hidden');
            puzzleContainer.classList.add('hidden');
            puzzleContainer.classList.remove('puzzle-solved');
            placeholderText.classList.remove('hidden');
        }

        startBtn.addEventListener('click', () => {
            if (!originalImage) return alert('請先上傳圖片！');
            initGame();
        });

        function initGame() {
            const rows = parseInt(rowsInput.value);
            const cols = parseInt(colsInput.value);

            clearInterval(timerInterval);
            secondsElapsed = 0;
            previewCount = 0;
            previewCounter.innerText = "0";
            updateTimerDisplay();
            isGameRunning = true;
            document.getElementById('gameStatus').classList.add('hidden');
            puzzleContainer.classList.remove('puzzle-solved');

            placeholderText.classList.add('hidden');
            puzzleContainer.classList.remove('hidden');

            const dimensions = calculateAndSetDimensions();

            pieces = [];
            for (let i = 0; i < rows * cols; i++) {
                pieces.push({ id: i, currentPos: i });
            }

            do { shuffleArray(pieces); } while (checkIfAlreadyWin(pieces));

            renderPuzzle(rows, cols, dimensions.w, dimensions.h);

            timerInterval = setInterval(() => {
                secondsElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function calculateAndSetDimensions() {
            if (!originalImage) return { w: 0, h: 0 };

            const computedStyle = window.getComputedStyle(gameArea);
            const pLeft = parseFloat(computedStyle.paddingLeft) || 0;
            const pRight = parseFloat(computedStyle.paddingRight) || 0;
            const pTop = parseFloat(computedStyle.paddingTop) || 0;
            const pBottom = parseFloat(computedStyle.paddingBottom) || 0;

            const maxWidth = gameArea.clientWidth - pLeft - pRight;
            const maxHeight = gameArea.clientHeight - pTop - pBottom;

            const imgRatio = originalImage.width / originalImage.height;
            const containerRatio = maxWidth / maxHeight;

            let finalW, finalH;

            if (imgRatio > containerRatio) {
                finalW = maxWidth;
                finalH = maxWidth / imgRatio;
            } else {
                finalH = maxHeight;
                finalW = maxHeight * imgRatio;
            }

            finalW = Math.min(Math.max(finalW, 100), maxWidth);
            finalH = finalW / imgRatio;

            if (finalH > maxHeight) {
                finalH = Math.min(finalH, maxHeight);
                finalW = finalH * imgRatio;
            }

            puzzleContainer.style.width = `${finalW}px`;
            puzzleContainer.style.height = `${finalH}px`;
            puzzleContainer.style.gridTemplateColumns = `repeat(${colsInput.value}, 1fr)`;
            puzzleContainer.style.gridTemplateRows = `repeat(${rowsInput.value}, 1fr)`;

            return { w: finalW, h: finalH };
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const temp = arr[i].currentPos;
                arr[i].currentPos = arr[j].currentPos;
                arr[j].currentPos = temp;
            }
        }

        function checkIfAlreadyWin(arr) {
            return arr.every(p => parseInt(p.id) === parseInt(p.currentPos));
        }

        function renderPuzzle(rows, cols, forceW, forceH) {
            const existingPieces = puzzleContainer.querySelectorAll('.puzzle-piece');
            existingPieces.forEach(p => p.remove());

            const w = forceW || puzzleContainer.clientWidth;
            const h = forceH || puzzleContainer.clientHeight;
            const pieceW = w / cols;
            const pieceH = h / rows;
            const sorted = [...pieces].sort((a, b) => a.currentPos - b.currentPos);

            sorted.forEach((piece) => {
                const div = document.createElement('div');
                div.className = 'puzzle-piece rounded-sm';
                div.draggable = isGameRunning;
                div.dataset.id = piece.id;

                const correctR = Math.floor(piece.id / cols);
                const correctC = piece.id % cols;
                div.style.backgroundImage = `url(${originalImage.src})`;
                div.style.backgroundSize = `${w}px ${h}px`;
                div.style.backgroundPosition = `-${correctC * pieceW}px -${correctR * pieceH}px`;

                div.addEventListener('dragstart', (e) => {
                    if (!isGameRunning) { e.preventDefault(); return; }
                    draggedPieceId = parseInt(piece.id);
                    setTimeout(() => div.classList.add('dragging'), 0);
                });
                div.addEventListener('dragover', (e) => {
                    if (!isGameRunning) return;
                    e.preventDefault();
                    if (draggedPieceId !== parseInt(piece.id)) e.dataTransfer.dropEffect = 'move';
                });
                div.addEventListener('dragenter', () => {
                    if (!isGameRunning) return;
                    if (draggedPieceId !== null && draggedPieceId !== parseInt(piece.id)) div.classList.add('drop-target');
                });
                div.addEventListener('dragleave', () => div.classList.remove('drop-target'));
                div.addEventListener('drop', (e) => {
                    if (!isGameRunning) return;
                    e.preventDefault();
                    div.classList.remove('drop-target');
                    handleSwap(draggedPieceId, parseInt(piece.id));
                });
                div.addEventListener('dragend', () => div.classList.remove('dragging'));

                div.addEventListener('touchstart', handleTouchStart, { passive: false });
                div.addEventListener('touchmove', handleTouchMove, { passive: false });
                div.addEventListener('touchend', handleTouchEnd, { passive: false });

                puzzleContainer.appendChild(div);
            });
        }

        function handleSwap(srcId, destId) {
            if (srcId === null || destId === null || srcId === destId) return;

            const parsedSrcId = parseInt(srcId);
            const parsedDestId = parseInt(destId);

            const p1 = pieces.find(p => p.id === parsedSrcId);
            const p2 = pieces.find(p => p.id === parsedDestId);

            if (!p1 || !p2) return;

            const temp = p1.currentPos;
            p1.currentPos = p2.currentPos;
            p2.currentPos = temp;

            renderPuzzle(parseInt(rowsInput.value), parseInt(colsInput.value), puzzleContainer.clientWidth, puzzleContainer.clientHeight);
            checkWin();
        }

        let touchTarget = null;
        function handleTouchStart(e) {
            if (!isGameRunning) return;
            touchTarget = this;
            this.classList.add('dragging');
            draggedPieceId = parseInt(this.dataset.id);
        }

        function handleTouchMove(e) {
            if (!isGameRunning || !touchTarget) return;
            e.preventDefault();
            const touch = e.touches[0];

            const elem = document.elementFromPoint(touch.clientX, touch.clientY);
            document.querySelectorAll('.puzzle-piece').forEach(p => p.classList.remove('drop-target'));
            if (elem && elem.classList.contains('puzzle-piece') && elem !== touchTarget) {
                elem.classList.add('drop-target');
            }
        }

        function handleTouchEnd(e) {
            if (!isGameRunning || !touchTarget) return;
            this.classList.remove('dragging');
            const touch = e.changedTouches[0];
            const elem = document.elementFromPoint(touch.clientX, touch.clientY);

            if (elem && elem.classList.contains('puzzle-piece') && elem !== touchTarget) {
                handleSwap(draggedPieceId, parseInt(elem.dataset.id));
            }

            document.querySelectorAll('.puzzle-piece').forEach(p => p.classList.remove('drop-target'));
            draggedPieceId = null;
            touchTarget = null;
        }

        function checkWin() {
            if (checkIfAlreadyWin(pieces)) {

                // 1. 停止遊戲狀態
                isGameRunning = false;
                clearInterval(timerInterval);
                document.getElementById('gameStatus').classList.remove('hidden');

                // 🚨 此處為先前靜默崩潰點：現在已安全讀取到變數
                if (finalTimeDisplay) finalTimeDisplay.innerText = formatTime(secondsElapsed);
                if (finalPreviewsDisplay) finalPreviewsDisplay.innerText = previewCount;

                // 2. 極簡視覺回饋：微放大、無縫融合與綠色發光
                puzzleContainer.classList.add('puzzle-solved');

                // 3. 完美鎖定：拔除可拖曳屬性，視覺上也將指標還原，不讓使用者認為還可以動
                document.querySelectorAll('.puzzle-piece').forEach(p => {
                    p.draggable = false;
                    p.style.cursor = 'default';
                });

                // 4. 輕微的成功震動回饋 (使用 try-catch 防止舊版瀏覽器安全政策阻擋)
                try {
                    if (navigator.vibrate) navigator.vibrate([150]);
                } catch (e) { }

                // 5. 稍微延遲後彈出結算視窗
                setTimeout(() => {
                    successModal.classList.remove('hidden');
                    requestAnimationFrame(() => {
                        successModal.classList.remove('opacity-0');
                        successCard.classList.remove('scale-95');
                    });
                }, 800);
            }
        }

        // --------------------------------------------------------
        // 輔助功能 (預覽、全螢幕、UI 更新)
        // --------------------------------------------------------

        const showPreview = () => {
            if (isGameRunning) {
                if (previewOverlay.style.display !== 'block') {
                    previewCount++;
                    previewCounter.innerText = previewCount;
                }
                previewOverlay.style.display = 'block';
            }
        };
        const hidePreview = () => { previewOverlay.style.display = 'none'; };

        previewBtn.addEventListener('mousedown', showPreview);
        previewBtn.addEventListener('mouseup', hidePreview);
        previewBtn.addEventListener('mouseleave', hidePreview);
        previewBtn.addEventListener('touchstart', (e) => { e.preventDefault(); showPreview(); }, { passive: false });
        previewBtn.addEventListener('touchend', hidePreview);
        previewBtn.addEventListener('touchcancel', hidePreview);

        function updateTimerDisplay() { timerDisplay.innerText = formatTime(secondsElapsed); }
        function formatTime(s) { return `${Math.floor(s / 60).toString().padStart(2, '0')}:${(s % 60).toString().padStart(2, '0')}`; }

        function closeModal() {
            successModal.classList.add('opacity-0');
            successCard.classList.add('scale-95');
            setTimeout(() => {
                successModal.classList.add('hidden');
            }, 300);
        }

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                appHeader.classList.add('hidden');
                controlPanel.classList.add('hidden');
                fsIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 3v3a2 2 0 01-2 2H3m18 0h-3a2 2 0 01-2-2V3m0 18v-3a2 2 0 012-2h3M3 16h3a2 2 0 012 2v3"></path>`;
            } else {
                appHeader.classList.remove('hidden');
                controlPanel.classList.remove('hidden');
                fsIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>`;
            }
            setTimeout(() => handleResize(), 150);
        });

        let resizeTimeout;
        function handleResize() {
            if (isGameRunning && originalImage) {
                const dimensions = calculateAndSetDimensions();
                renderPuzzle(parseInt(rowsInput.value), parseInt(colsInput.value), dimensions.w, dimensions.h);
            }
        }

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(handleResize, 150);
        });

    </script>
</body>
