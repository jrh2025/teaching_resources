<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulletin Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --border-color: #e5e7eb;
            --header-bg: #f3f4f6;
            --highlight-bg: #e0f2fe;
            --accent-color: #3b82f6;
        }

        .theme-whiteboard {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --border-color: #dee2e6;
            --header-bg: #e9ecef;
            --highlight-bg: #cff4fc;
            --accent-color: #0d6efd;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 100% 150%, var(--bg-color) 24%, var(--border-color) 25%, var(--border-color) 28%, var(--bg-color) 29%, var(--bg-color) 36%, var(--border-color) 36%, var(--border-color) 40%, transparent 40%, transparent),
                radial-gradient(circle at 0 150%, var(--bg-color) 24%, var(--border-color) 25%, var(--border-color) 28%, var(--bg-color) 29%, var(--bg-color) 36%, var(--border-color) 36%, var(--border-color) 40%, transparent 40%, transparent),
                radial-gradient(circle at 50% 100%, var(--bg-color) 10%, var(--border-color) 11%, var(--border-color) 23%, var(--bg-color) 24%, var(--bg-color) 30%, var(--border-color) 31%, var(--border-color) 43%, var(--bg-color) 44%, var(--bg-color) 50%, var(--border-color) 51%, var(--border-color) 63%, var(--bg-color) 64%, var(--bg-color) 71%, transparent 71%, transparent),
                radial-gradient(circle at 100% 50%, var(--bg-color) 5%, var(--border-color) 6%, var(--border-color) 15%, var(--bg-color) 16%, var(--bg-color) 20%, var(--border-color) 21%, var(--border-color) 30%, var(--bg-color) 31%, var(--bg-color) 35%, var(--border-color) 36%, var(--border-color) 45%, var(--bg-color) 46%, var(--bg-color) 49%, transparent 50%, transparent),
                radial-gradient(circle at 0 50%, var(--bg-color) 5%, var(--border-color) 6%, var(--border-color) 15%, var(--bg-color) 16%, var(--bg-color) 20%, var(--border-color) 21%, var(--border-color) 30%, var(--bg-color) 31%, var(--bg-color) 35%, var(--border-color) 36%, var(--border-color) 45%, var(--bg-color) 46%, var(--bg-color) 49%, transparent 50%, transparent);
            background-size: 10px 10px;
        }

        .theme-blackboard {
            --bg-color: #2F4F4F;
            --text-color: #f8f9fa;
            --border-color: #4a6c6c;
            --header-bg: #203636;
            --highlight-bg: #4a6c6c;
            --accent-color: #8fbc8f;
            background-color: var(--bg-color);
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .theme-wood {
            --bg-color: #D2B48C;
            --text-color: #3e2723;
            --border-color: #8D6E63;
            --header-bg: #A1887F;
            --highlight-bg: #BCAAA4;
            --accent-color: #5D4037;
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0, 0, 0, 0.05) 10px, rgba(0, 0, 0, 0.05) 20px);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s, color 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            max-w-7xl;
            margin: 0 auto;
            padding: 1rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            box-sizing: border-box;
        }

        .vertical-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            max-height: 60vh;
            overflow-x: auto;
            padding: 1rem;
            line-height: 2;
            letter-spacing: 0.1em;
        }

        .horizontal-text {
            writing-mode: horizontal-tb;
            max-height: 60vh;
            overflow-y: auto;
            padding: 1rem;
            line-height: 1.6;
        }

        /* Markdown Rendering Styles (Using logical properties to support vertical text) */
        #notice-content h1,
        #notice-content h2,
        #notice-content h3 {
            font-weight: bold;
            margin-block-start: 1em;
            margin-block-end: 0.5em;
        }

        #notice-content h1 {
            font-size: 1.5em;
        }

        #notice-content h2 {
            font-size: 1.25em;
        }

        #notice-content h3 {
            font-size: 1.1em;
        }

        #notice-content p {
            margin-block-end: 1em;
        }

        #notice-content ul {
            list-style-type: disc;
            padding-inline-start: 2em;
            margin-block-end: 1em;
        }

        #notice-content ol {
            list-style-type: decimal;
            padding-inline-start: 2em;
            margin-block-end: 1em;
        }

        #notice-content a {
            color: var(--accent-color);
            text-decoration: underline;
        }

        #notice-content blockquote {
            border-inline-start: 4px solid var(--border-color);
            padding-inline-start: 1em;
            color: inherit;
            opacity: 0.8;
            margin-block-end: 1em;
        }

        #notice-content code {
            background-color: rgba(128, 128, 128, 0.2);
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: monospace;
        }

        #notice-content pre {
            background-color: rgba(128, 128, 128, 0.1);
            padding: 1em;
            border-radius: 5px;
            overflow: auto;
            margin-block-end: 1em;
        }

        #notice-content.vertical-text ul,
        #notice-content.vertical-text ol {
            padding-inline-start: 1.5em;
            /* 調整直書的清單縮排 */
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            background-color: var(--border-color);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            overflow: hidden;
        }

        .calendar-cell {
            background-color: var(--bg-color);
            padding: 0.5rem;
            min-height: 80px;
            cursor: pointer;
            transition: background-color 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .calendar-cell:hover {
            background-color: var(--highlight-bg);
        }

        .calendar-cell.has-note::after {
            content: '';
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
        }

        .calendar-cell.future-date.guest-mode {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .calendar-header {
            text-align: center;
            font-weight: bold;
            padding: 0.5rem;
            background-color: var(--header-bg);
            color: var(--text-color);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border-color);
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 0.25rem;
            cursor: pointer;
            transition: opacity 0.2s;
            border: none;
            font-weight: 500;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }

        .btn-danger {
            background-color: #ef4444;
            color: white;
        }

        input[type="text"],
        input[type="password"],
        textarea,
        select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.25rem;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            box-sizing: border-box;
        }

        .theme-blackboard input[type="text"],
        .theme-blackboard input[type="password"],
        .theme-blackboard textarea,
        .theme-blackboard select {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flex-between {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #fullscreen-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>

<body class="theme-whiteboard" id="app-body">

    <div class="app-container" id="main-container">

        <!-- Header -->
        <header class="flex-between flex-wrap gap-4 mb-6 p-4 rounded-lg shadow-sm"
            style="background-color: var(--header-bg); border: 1px solid var(--border-color);">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z" />
                </svg>
                <span id="app-title-display">班級布告欄</span>
            </h1>

            <div class="flex items-center gap-3 flex-wrap">
                <!-- Theme Selector -->
                <select id="theme-select" class="p-2 rounded border border-gray-300 w-auto mb-0 text-sm"
                    style="background-color: white; color: black;">
                    <option value="theme-whiteboard">白板模式</option>
                    <option value="theme-blackboard">黑板模式</option>
                    <option value="theme-wood">木紋模式</option>
                </select>

                <!-- Font Size Selector -->
                <select id="font-size-select" class="p-2 rounded border border-gray-300 w-auto mb-0 text-sm"
                    style="background-color: white; color: black;">
                    <option value="text-lg">字體：一般</option>
                    <option value="text-xl">字體：較大</option>
                    <option value="text-2xl">字體：很大</option>
                    <option value="text-3xl">字體：超大</option>
                    <option value="text-4xl">字體：極大</option>
                </select>

                <!-- Text Direction Toggle -->
                <button id="text-dir-btn" class="btn btn-secondary text-sm" title="切換文字方向">橫書</button>

                <!-- Toggle Calendar -->
                <button id="toggle-calendar-btn" class="btn btn-secondary text-sm" title="隱藏/顯示日曆">隱藏日曆</button>

                <!-- Fullscreen Toggle -->
                <button id="fullscreen-btn" class="btn btn-secondary text-sm flex items-center justify-center p-2"
                    title="全螢幕">
                    <svg viewBox="0 0 24 24">
                        <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                    </svg>
                </button>

                <!-- Admin / Guest Toggle -->
                <div id="auth-controls" class="flex gap-2">
                    <button id="login-btn" class="btn btn-primary text-sm">管理員登入</button>
                    <div id="admin-tools" class="hidden flex gap-2">
                        <span
                            class="flex items-center text-sm font-semibold text-red-500 bg-red-100 px-2 py-1 rounded">管理模式</span>
                        <button id="change-title-btn" class="btn btn-primary text-sm" title="設定標題">設定標題</button>
                        <button id="sys-settings-btn" class="btn btn-primary text-sm" title="系統設定">系統設定</button>
                        <button id="change-pwd-btn" class="btn btn-primary text-sm" title="修改密碼">修改密碼</button>
                        <button id="export-btn" class="btn btn-secondary text-sm" title="匯出資料">匯出</button>
                        <button id="import-btn-trigger" class="btn btn-secondary text-sm" title="匯入資料">匯入</button>
                        <input type="file" id="import-file" class="hidden" accept=".json">
                        <button id="clear-all-btn" class="btn btn-danger text-sm" title="清空所有資料">清空公告</button>
                        <button id="logout-btn" class="btn btn-secondary text-sm">登出</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-6 flex-grow">

            <!-- Calendar Section -->
            <div id="calendar-section" class="w-full lg:w-1/2 flex flex-col transition-all duration-300">
                <div class="flex-between mb-4">
                    <button id="prev-month" class="btn btn-secondary p-2">&lt;</button>
                    <h2 id="current-month-year" class="text-xl font-bold"></h2>
                    <button id="next-month" class="btn btn-secondary p-2">&gt;</button>
                </div>

                <div class="calendar-grid mb-2">
                    <div class="calendar-header">日</div>
                    <div class="calendar-header">一</div>
                    <div class="calendar-header">二</div>
                    <div class="calendar-header">三</div>
                    <div class="calendar-header">四</div>
                    <div class="calendar-header">五</div>
                    <div class="calendar-header">六</div>
                </div>
                <div id="calendar-days" class="calendar-grid flex-grow">
                    <!-- Days will be generated here by JS -->
                </div>
                <p class="text-xs mt-2 opacity-75">* 點擊日期查看或編輯公告。一般模式無法查看未來公告。</p>
            </div>

            <!-- Notice Display Section -->
            <div id="notice-section"
                class="w-full lg:w-1/2 flex flex-col p-4 rounded-lg shadow-sm transition-all duration-300"
                style="background-color: var(--bg-color); border: 2px dashed var(--border-color);">
                <div class="flex-between border-b pb-2 mb-4" style="border-color: var(--border-color);">
                    <h3 id="selected-date-display" class="text-xl font-bold flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        請選擇日期
                    </h3>
                    <div class="flex gap-2">
                        <button id="copy-notice-btn" class="btn btn-secondary text-sm" title="複製公告內容">複製</button>
                        <button id="edit-notice-btn" class="btn btn-primary hidden text-sm">編輯公告</button>
                    </div>
                </div>

                <div id="notice-content" class="horizontal-text flex-grow text-lg">
                    <!-- Notice text will appear here -->
                    <p class="opacity-50 text-center mt-10">點擊左側日曆查看當日公告。</p>
                </div>
            </div>
        </div>

    </div>


    <!-- Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4">管理員登入</h2>
            <p class="text-sm mb-2 opacity-75">預設密碼：admin (若未修改)</p>
            <p class="text-sm mb-4 text-red-500 font-bold">⚠️ 提示：請確認您的輸入法已切換至「英數」模式</p>
            <input type="password" id="admin-password" placeholder="請輸入密碼" class="w-full" style="ime-mode: disabled;"
                autocomplete="off">
            <div class="flex justify-end gap-2 mt-4">
                <button id="cancel-login" class="btn btn-secondary">取消</button>
                <button id="confirm-login" class="btn btn-primary">登入</button>
            </div>
        </div>
    </div>

    <!-- Change Password Modal -->
    <div id="change-pwd-modal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4">修改管理者密碼</h2>
            <p class="text-sm mb-4 text-red-500 font-bold">⚠️ 提示：請確認您的輸入法已切換至「英數」模式</p>
            <input type="password" id="old-password" placeholder="請輸入舊密碼" class="w-full mb-2"
                style="ime-mode: disabled;" autocomplete="off">
            <input type="password" id="new-password" placeholder="請輸入新密碼" class="w-full mb-2"
                style="ime-mode: disabled;" autocomplete="off">
            <input type="password" id="confirm-new-password" placeholder="請再次輸入新密碼" class="w-full mb-4"
                style="ime-mode: disabled;" autocomplete="off">
            <div class="flex justify-end gap-2 mt-4">
                <button id="cancel-change-pwd" class="btn btn-secondary">取消</button>
                <button id="confirm-change-pwd" class="btn btn-primary">確認修改</button>
            </div>
        </div>
    </div>

    <!-- Edit Notice Modal -->
    <div id="edit-modal" class="modal">
        <div class="modal-content" style="max-width: 600px; width: 95%;">
            <h2 id="edit-modal-title" class="text-xl font-bold mb-4">編輯公告</h2>

            <!-- Markdown Toolbar -->
            <div class="flex flex-wrap gap-2 mb-2 border-b pb-2 border-gray-300" id="md-toolbar">
                <button type="button" class="btn btn-secondary text-sm px-3 py-1 font-bold" data-prefix="**"
                    data-suffix="**" title="粗體">B</button>
                <button type="button" class="btn btn-secondary text-sm px-3 py-1 italic" data-prefix="*" data-suffix="*"
                    title="斜體">I</button>
                <button type="button" class="btn btn-secondary text-sm px-3 py-1" data-prefix="### " data-suffix=""
                    title="加入標題">H</button>
                <button type="button" class="btn btn-secondary text-sm px-3 py-1" data-prefix="- " data-suffix=""
                    title="無序清單">List</button>
                <button type="button" class="btn btn-secondary text-sm px-3 py-1" data-prefix="[連結文字](" data-suffix=")"
                    title="插入連結">Link</button>
            </div>

            <textarea id="notice-input" rows="10" placeholder="請輸入公告內容...支援 Markdown 語法及多行輸入"
                class="w-full p-2 border rounded resize-y text-black font-mono"
                style="background-color: white; color: black;"></textarea>
            <div class="flex justify-between mt-4">
                <button id="delete-notice" class="btn btn-danger">刪除公告</button>
                <div class="flex gap-2">
                    <button id="cancel-edit" class="btn btn-secondary">取消</button>
                    <button id="save-notice" class="btn btn-primary">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- System Settings Modal -->
    <div id="sys-settings-modal" class="modal">
        <div class="modal-content" style="max-width: 400px;">
            <h2 class="text-xl font-bold mb-6">系統設定</h2>

            <div class="flex items-center justify-between mb-4 border-b pb-4 border-gray-200">
                <span class="font-medium">顯示時，第1行自動帶入日期與星期</span>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" id="auto-date-toggle" class="sr-only peer">
                    <div
                        class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500">
                    </div>
                </label>
            </div>

            <div class="flex justify-end gap-2 mt-6">
                <button id="close-sys-settings" class="btn btn-primary">完成</button>
            </div>
        </div>
    </div>

    <!-- Change Title Modal -->
    <div id="change-title-modal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4">設定布告欄標題</h2>
            <input type="text" id="new-title-input" placeholder="請輸入自訂標題 (例如：二年三班布告欄)" class="w-full mb-4">
            <div class="flex justify-end gap-2 mt-4">
                <button id="cancel-change-title" class="btn btn-secondary">取消</button>
                <button id="confirm-change-title" class="btn btn-primary">確認修改</button>
            </div>
        </div>
    </div>

    <!-- Custom Alert/Message Modal -->
    <div id="message-modal" class="modal" style="z-index: 100;">
        <div class="modal-content text-center" style="max-width: 300px;">
            <p id="message-text" class="text-lg mb-6"></p>
            <button id="close-message" class="btn btn-primary w-full">確定</button>
        </div>
    </div>

    <script>
        // 設定 Marked.js (啟用換行轉換為 <br>)
        marked.use({ breaks: true });

        // === UI Preference State (Loaded from localStorage) ===
        let savedTheme = localStorage.getItem('bulletin_theme') || 'theme-whiteboard';
        let isVertical = localStorage.getItem('bulletin_text_dir') === 'true';
        let isCalendarHidden = localStorage.getItem('bulletin_cal_hidden') === 'true';
        let savedFontSize = localStorage.getItem('bulletin_font_size') || 'text-lg';

        // Settings cached state
        let autoInsertDateEnabled = false;

        // Apply initial UI states
        document.body.className = savedTheme;
        document.getElementById('theme-select').value = savedTheme;
        document.getElementById('font-size-select').value = savedFontSize;

        // DOM Elements
        const calendarDaysEl = document.getElementById('calendar-days');
        const monthYearEl = document.getElementById('current-month-year');
        const noticeContentEl = document.getElementById('notice-content');
        const selectedDateDisplay = document.getElementById('selected-date-display');
        const editNoticeBtn = document.getElementById('edit-notice-btn');
        const textDirBtn = document.getElementById('text-dir-btn');
        const appTitleDisplay = document.getElementById('app-title-display');
        const calendarSection = document.getElementById('calendar-section');
        const noticeSection = document.getElementById('notice-section');
        const toggleCalendarBtn = document.getElementById('toggle-calendar-btn');

        // Helper function to update notice content classes dynamically
        function updateNoticeContentClasses() {
            const dirClass = isVertical ? 'vertical-text' : 'horizontal-text';
            noticeContentEl.className = `${dirClass} flex-grow transition-all duration-300 ${savedFontSize}`;
        }

        // Apply text direction and font size preference
        updateNoticeContentClasses();
        if (isVertical) {

        if (isCalendarHidden) {
            calendarSection.classList.add('hidden');
            noticeSection.classList.remove('lg:w-1/2');
            noticeSection.classList.add('lg:w-full');
            toggleCalendarBtn.textContent = '顯示日曆';
        }

        // === Database Setup (IndexedDB) ===
        const dbName = 'ClassBulletinDB';
        const dbVersion = 2;
        const storeName = 'notices';
        const settingsStoreName = 'settings';
        let db;

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, dbVersion);

                request.onerror = (event) => {
                    console.error("IndexedDB error:", event.target.error);
                    reject("資料庫開啟失敗");
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    resolve();
                    loadNotices(); // Load notices to mark calendar
                };

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        db.createObjectStore(storeName, { keyPath: 'date' });
                    }
                    if (!db.objectStoreNames.contains(settingsStoreName)) {
                        db.createObjectStore(settingsStoreName, { keyPath: 'key' });
                    }
                };
            });
        }

        // --- Settings DB Operations ---
        function getSettingFromDB(key) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([settingsStoreName], 'readonly');
                const store = transaction.objectStore(settingsStoreName);
                const request = store.get(key);

                request.onsuccess = () => resolve(request.result ? request.result.value : null);
                request.onerror = () => reject("讀取設定失敗");
            });
        }

        function saveSettingToDB(key, value) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([settingsStoreName], 'readwrite');
                const store = transaction.objectStore(settingsStoreName);
                const request = store.put({ key: key, value: value });

                request.onsuccess = () => resolve();
                request.onerror = () => reject("儲存設定失敗");
            });
        }

        async function getAdminPassword() {
            let pwd = await getSettingFromDB('adminPassword');
            if (!pwd) {
                await saveSettingToDB('adminPassword', 'admin');
                return 'admin';
            }
            return pwd;
        }

        async function loadSystemSettings() {
            let autoDate = await getSettingFromDB('autoInsertDate');
            autoInsertDateEnabled = autoDate === true; // Convert to boolean safely
            document.getElementById('auto-date-toggle').checked = autoInsertDateEnabled;
        }

        // --- Notice DB Operations ---
        function saveNoticeToDB(date, content) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.put({ date: date, content: content });

                request.onsuccess = () => resolve();
                request.onerror = () => reject("儲存失敗");
            });
        }

        function getNoticeFromDB(date) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.get(date);

                request.onsuccess = () => resolve(request.result ? request.result.content : null);
                request.onerror = () => reject("讀取失敗");
            });
        }

        function deleteNoticeFromDB(date) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.delete(date);

                request.onsuccess = () => resolve();
                request.onerror = () => reject("刪除失敗");
            });
        }

        function getAllNoticesFromDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readonly');
                const store = transaction.objectStore(storeName);
                const request = store.getAll();

                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject("讀取全部資料失敗");
            });
        }

        async function clearAllNoticesDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([storeName], 'readwrite');
                const store = transaction.objectStore(storeName);
                const request = store.clear();
                request.onsuccess = resolve;
                request.onerror = reject;
            });
        }

        // === Application State ===
        let currentDate = new Date();
        let selectedDateStr = null;
        let isAdmin = false;
        let noticeDataCache = {};

        // Utility: Format Date to YYYY-MM-DD
        function formatDate(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getDateInfoString(dateStr) {
            const [y, m, d] = dateStr.split('-');
            const dateObj = new Date(y, m - 1, d);
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            return `${y}年${m}月${d}日 ${days[dateObj.getDay()]}`;
        }

        // Custom Alert
        function showMessage(msg) {
            document.getElementById('message-text').innerText = msg;
            document.getElementById('message-modal').style.display = 'flex';
        }
        document.getElementById('close-message').addEventListener('click', () => {
            document.getElementById('message-modal').style.display = 'none';
        });

        // === Calendar Logic ===
        async function loadNotices() {
            try {
                const allNotices = await getAllNoticesFromDB();
                noticeDataCache = {};
                allNotices.forEach(n => {
                    noticeDataCache[n.date] = true;
                });
                renderCalendar();
            } catch (e) {
                console.error(e);
            }
        }

        function renderCalendar() {
            calendarDaysEl.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const todayStr = formatDate(new Date());

            monthYearEl.textContent = `${year}年 ${month + 1}月`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'calendar-cell opacity-30';
                calendarDaysEl.appendChild(emptyCell);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const cellDate = new Date(year, month, day);
                const dateStr = formatDate(cellDate);
                const isFuture = cellDate > new Date(new Date().setHours(23, 59, 59, 999));

                const cell = document.createElement('div');
                cell.className = 'calendar-cell';

                if (dateStr === todayStr) {
                    cell.style.border = '2px solid var(--accent-color)';
                    cell.style.fontWeight = 'bold';
                }

                if (noticeDataCache[dateStr]) {
                    cell.classList.add('has-note');
                }

                if (!isAdmin && isFuture) {
                    cell.classList.add('future-date', 'guest-mode');
                }

                if (dateStr === selectedDateStr) {
                    cell.style.backgroundColor = 'var(--highlight-bg)';
                }

                const daySpan = document.createElement('span');
                daySpan.textContent = day;
                daySpan.className = 'text-lg';
                cell.appendChild(daySpan);

                cell.addEventListener('click', () => {
                    if (!isAdmin && isFuture) {
                        showMessage('一般瀏覽模式無法查看未來日期的公告。');
                        return;
                    }
                    selectDate(dateStr);
                });

                calendarDaysEl.appendChild(cell);
            }
        }

        // === Notice Logic ===
        async function selectDate(dateStr) {
            selectedDateStr = dateStr;
            renderCalendar();

            selectedDateDisplay.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                ${dateStr} 公告
            `;

            try {
                const content = await getNoticeFromDB(dateStr);
                if (content) {
                    // 基礎 HTML 跳脫避免惡意語法，同時保留 Markdown 解析
                    let escapedContent = content.replace(/</g, "&lt;").replace(/>/g, "&gt;");

                    // 檢查是否需要自動帶入日期與星期
                    if (autoInsertDateEnabled) {
                        const datePrefix = `### ${getDateInfoString(dateStr)}\n\n`;
                        escapedContent = datePrefix + escapedContent;
                    }

                    // 使用 Marked.js 解析 Markdown 並渲染
                    noticeContentEl.innerHTML = marked.parse(escapedContent);
                } else {
                    noticeContentEl.innerHTML = '<p class="opacity-50 text-center mt-10">本日無公告事項。</p>';
                }

                if (isAdmin) {
                    editNoticeBtn.classList.remove('hidden');
                } else {
                    editNoticeBtn.classList.add('hidden');
                }
            } catch (e) {
                showMessage("讀取公告失敗");
            }
        }

        // Copy Notice functionality
        document.getElementById('copy-notice-btn').addEventListener('click', () => {
            const contentText = noticeContentEl.innerText.trim();
            if (!contentText || contentText === '點擊左側日曆查看當日公告。' || contentText === '本日無公告事項。') {
                showMessage("目前沒有可複製的公告內容。");

            // Create temporary textarea for execCommand('copy') support
            const textarea = document.createElement('textarea');

            document.body.appendChild(textarea);

                document.execCommand('copy');

        editNoticeBtn.addEventListener('click', async () => {

        // Markdown Toolbar Logic
        function insertAtCursor(myField, myValueBefore, myValueAfter = '') {
            if (document.selection) {
                myField.focus();
                let sel = document.selection.createRange();
                sel.text = myValueBefore + sel.text + myValueAfter;
            } else if (myField.selectionStart || myField.selectionStart == '0') {
                let startPos = myField.selectionStart;
                let endPos = myField.selectionEnd;
                let selectedText = myField.value.substring(startPos, endPos);

                myField.value = myField.value.substring(0, startPos)
                    + myValueBefore
                    + selectedText
                    + myValueAfter
                    + myField.value.substring(endPos, myField.value.length);

                // 修正游標位置，選取被包裹的文字
                myField.selectionStart = startPos + myValueBefore.length;
                myField.selectionEnd = startPos + myValueBefore.length + selectedText.length;
                myField.focus();
            } else {
                myField.value += myValueBefore + myValueAfter;
                myField.focus();
            }
        }

        // Theme Toggle (Saved to localStorage)

        // Font Size Toggle (Saved to localStorage)
        document.getElementById('font-size-select').addEventListener('change', (e) => {

        // Auth Logic

        // === Title Change Logic ===
        const changeTitleModal = document.getElementById('change-title-modal');

                }
                if (event.target == document.getElementById('change-title-modal')) {
                    document.getElementById('change-title-modal').style.display = "none";
                }
                if (event.target == document.getElementById('sys-settings-modal')) {
                    document.getElementById('sys-settings-modal').style.display = "none";
                }
            }
        };
    </script>
</body>
